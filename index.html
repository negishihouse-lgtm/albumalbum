<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
    padding-left:280px;
}

/* サイドバー */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    overflow-y:auto;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
}

.sidebar a:hover{
    background:#1a1a1a;
}

/* 上部 */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.page-title{
    font-size:48px;
    font-weight:700;
}

.back-btn,
.like-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
    border-radius:10px;
}

.back-btn:hover,
.like-btn:hover{
    background:#2a2a2a;
}

.like-btn.liked{
    background:#6fa8dc;
    color:white;
}

/* 投稿一覧（2列表示） */

.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1320px;
    margin:0 auto;
}

/* 投稿カード */

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    padding:20px;
    display:grid;
    grid-template-columns:180px minmax(0,1fr);
    gap:18px;
    overflow:hidden;
    cursor:pointer;
    align-items:start;
    border-radius:16px;
    transition:0.2s;
}

.album-card:hover{
    border-color:rgba(111,168,220,0.45);
    transform:translateY(-2px);
}

/* 左側 */

.album-left{
    min-width:0;
}

/* ジャケット画像 */

.cover{
    width:160px;
    aspect-ratio:1/1;
    object-fit:cover;
    margin-bottom:14px;
    background:#111;
    border-radius:10px;
}

/* タイトル */

.title{
    font-size:24px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:4px;
    word-break:break-word;
}

/* アーティスト名 */

.artist{
    font-size:18px;
    color:#6fa8dc;
    margin-bottom:10px;
    word-break:break-word;
}

/* 年 */

.meta{
    color:#aaa;
    margin-bottom:0;
}

/* 投稿者 */

.creator{
    margin-top:10px;
    color:#ccc;
    font-size:15px;
    line-height:1.5;
}

.creator a{
    color:#6fa8dc;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

/* いいね */

.like-area{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    color:#ddd;
}

.like-count{
    font-size:15px;
}

/* コメント数 */

.comment-count{
    margin-top:10px;
    color:#aaa;
    font-size:15px;
}

/* メーター全体 */

.meter-area{
    border:1px solid rgba(255,255,255,0.12);
    padding:14px;
    min-width:0;
    width:100%;
    align-self:start;
    border-radius:12px;
}

/* 各メーター */

.meter{
    display:grid;
    grid-template-columns:54px minmax(0,1fr) 54px;
    align-items:center;
    gap:6px;
    margin-bottom:12px;
    min-width:0;
}

.meter-label{
    font-size:14px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

/* メーターグラフィック */

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:3px;
    background:#4a5158;
    flex:1;
    min-width:0;
}

/* レベル色 */

.dot.active.level-1,
.connector.active.level-1{
    background:#3f8ec7;
    border-color:#3f8ec7;
}

.dot.active.level-2,
.connector.active.level-2{
    background:#4d9bd0;
    border-color:#4d9bd0;
}

.dot.active.level-3,
.connector.active.level-3{
    background:#5fa7d8;
    border-color:#5fa7d8;
}

.dot.active.level-4,
.connector.active.level-4{
    background:#73b6e3;
    border-color:#73b6e3;
}

.dot.active.level-5{
    background:#8bc8ef;
    border-color:#8bc8ef;
}

/* キーワード */

.keyword-box{
    margin-top:12px;
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:10px;
}

.keyword-title{
    color:#6fa8dc;
    font-size:14px;
    font-weight:700;
    margin-bottom:4px;
}

.keyword-text{
    color:#ddd;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
}

/* 紹介文 */

.description-wide{
    grid-column:1;
    margin-top:4px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,0.1);
    color:#ddd;
    line-height:1.6;
    word-break:break-word;
    font-size:15px;
}

/* 空状態 */

.empty{
    color:#777;
    font-size:28px;
}

/* タブレット */

@media(max-width:1200px){
    .album-grid{
        grid-template-columns:1fr;
    }
}

/* スマホ */

@media(max-width:900px){

    body{
        padding:22px;
        padding-left:22px;
    }

    .sidebar{
        position:static;
        width:100%;
        height:auto;
        margin-bottom:24px;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .page-title{
        font-size:34px;
    }

    .album-grid{
        grid-template-columns:1fr;
    }

    .album-card{
        grid-template-columns:1fr;
    }

    .cover{
        width:100%;
        max-width:260px;
    }

    .meter{
        grid-template-columns:48px minmax(0,1fr) 48px;
    }

    .meter-label{
        font-size:13px;
    }
}
</style>
</head>

<body>

<nav class="sidebar">
    <div class="logo">Album Collection</div>

    <a href="index.html">🏠 ホーム</a>
    <a href="editor.html">✍️ 投稿する</a>
    <a id="myPageLink" href="login.html">👤 マイページ</a>
    <a href="profile-edit.html">⚙️ プロフィール編集</a>
    <a href="login.html">🔐 ログイン</a>
</nav>

<div class="topbar">
    <h1 class="page-title">Album Collection</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button id="mypageBtn" class="back-btn" style="display:none;">
            マイページ
        </button>

        <button class="back-btn" onclick="location.href='./editor.html'">
            編集ページへ戻る
        </button>
    </div>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const albumGrid = document.getElementById("albumGrid");
const mypageBtn = document.getElementById("mypageBtn");

let currentUser = null;
let allLikes = [];
let allComments = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (user) {
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };
    } else {
        mypageBtn.style.display = "none";
    }

    const myPageLink = document.getElementById("myPageLink");

    if (myPageLink) {
        if (user) {
            myPageLink.href = `profile.html?uid=${user.uid}`;
        } else {
            myPageLink.href = "login.html";
        }
    }

    updateLikeDisplays();
    updateCommentDisplays();
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

/* いいね機能 */

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = `${count}件`;
        button.textContent = liked ? "♥ いいね済み" : "♡ いいね";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

/* コメント数表示 */

onSnapshot(collection(db, "comments"), (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    updateCommentDisplays();
});

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");

    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}

/* 投稿一覧 */

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

onSnapshot(q, (snapshot)=>{

    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML =
            `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((docSnap)=>{

        const a = docSnap.data();
        const albumId = docSnap.id;

        albumGrid.innerHTML += `
        <div class="album-card"
             onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">

            <div class="album-left">
                <img class="cover"
                     src="${escapeHTML(a.cover || "")}"
                     alt="">

                <div class="title">
                    ${escapeHTML(a.title || "")}
                </div>

                <div class="artist">
                    ${escapeHTML(a.artist || "")}
                </div>

                <div class="meta">
                    ${escapeHTML(a.year || "")}
                </div>

                <div class="creator">
                    投稿者：
                    <a href="profile.html?uid=${escapeHTML(a.userId || "")}"
                       onclick="event.stopPropagation();">
                        ${escapeHTML(
                            a.userName ||
                            a.userEmail ||
                            "匿名ユーザー"
                        )}
                    </a>
                </div>

                <div class="like-area"
                     data-like-area
                     data-album-id="${escapeHTML(albumId)}">
                    <button class="like-btn"
                            onclick="event.stopPropagation(); toggleLike('${escapeHTML(albumId)}')">
                        ♡ いいね
                    </button>
                    <span class="like-count">0件</span>
                </div>

                <div class="comment-count"
                     data-comment-count
                     data-album-id="${escapeHTML(albumId)}">
                    コメント 0件
                </div>
            </div>

            <div class="meter-area">

                ${meter("暗い", "明るい", a.darkness)}
                ${meter("静か", "激しい", a.intense)}
                ${meter("シンプル", "複雑", a.complex)}
                ${meter("絶望", "希望", a.hope)}
                ${meter("個人", "世界", a.world)}

                <div class="keyword-box">
                    <div class="keyword-title">キーワード</div>
                    <div class="keyword-text">
                        ${escapeHTML(a.keywords || "")}
                    </div>
                </div>

            </div>

            <div class="description-wide">
                ${escapeHTML(a.desc || "")}
            </div>

        </div>
        `;
    });

    updateLikeDisplays();
    updateCommentDisplays();

}, (error) => {
    albumGrid.innerHTML =
        `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});

</script>

</body>
</html>
