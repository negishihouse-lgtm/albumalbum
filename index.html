<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.page-title{
    font-size:48px;
    font-weight:700;
}

.back-btn,.like-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
}

.back-btn:hover,.like-btn:hover{
    background:#2a2a2a;
}

.like-btn.liked{
    background:#6fa8dc;
    color:white;
}

.like-area{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:12px;
    color:#ddd;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:30px;
    max-width:1700px;
    margin:auto;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    padding:26px;
    display:grid;
    grid-template-columns:240px minmax(0,1fr);
    gap:28px;
    overflow:hidden;
}

.album-left{ min-width:0; }

.cover{
    width:210px;
    aspect-ratio:1/1;
    object-fit:cover;
    margin-bottom:20px;
    background:#111;
}

.title{
    font-size:30px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:4px;
    word-break:break-word;
}

.artist{
    font-size:24px;
    color:#6fa8dc;
    margin-bottom:16px;
    word-break:break-word;
}

.meta{
    color:#aaa;
    margin-bottom:0;
}

.creator{
    margin-top:10px;
    color:#ccc;
}

.creator a{
    color:#6fa8dc;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.description-wide{
    margin-top:10px;
    padding-top:26px;
    border-top:1px solid rgba(255,255,255,0.1);
    grid-column:1/-1;
    color:#ddd;
    line-height:2;
    word-break:break-word;
}

.empty{
    color:#777;
    font-size:28px;
}

.meter-area{
    border:1px solid rgba(255,255,255,0.12);
    padding:22px 24px;
    min-width:0;
    width:100%;
}

.meter{
    display:grid;
    grid-template-columns:72px minmax(120px,1fr) 72px;
    align-items:center;
    gap:12px;
    margin-bottom:19px;
}

.meter-label{
    font-size:18px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{ text-align:right; }

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:3px;
    background:#4a5158;
    flex:1;
    min-width:6px;
}

.dot.active.level-1,.connector.active.level-1{ background:#3f8ec7; border-color:#3f8ec7; }
.dot.active.level-2,.connector.active.level-2{ background:#4d9bd0; border-color:#4d9bd0; }
.dot.active.level-3,.connector.active.level-3{ background:#5fa7d8; border-color:#5fa7d8; }
.dot.active.level-4,.connector.active.level-4{ background:#73b6e3; border-color:#73b6e3; }
.dot.active.level-5{ background:#8bc8ef; border-color:#8bc8ef; }

.keyword-box{
    margin-top:24px;
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:18px;
}

.keyword-title{
    color:#6fa8dc;
    font-size:17px;
    font-weight:700;
    margin-bottom:8px;
}

.keyword-text{
    color:#ddd;
    font-size:16px;
    line-height:1.8;
    word-break:break-word;
}

@media(max-width:1300px){
    .album-grid{ grid-template-columns:1fr; }
}

@media(max-width:800px){
    body{ padding:22px; }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .page-title{ font-size:34px; }

    .album-card{
        grid-template-columns:1fr;
        padding:22px;
    }

    .cover{
        width:100%;
        max-width:320px;
    }

    .title{ font-size:28px; }
    .artist{ font-size:22px; }
    .meter-area{ padding:20px; }

    .meter{
        grid-template-columns:68px minmax(120px,1fr) 68px;
        gap:10px;
        margin-bottom:18px;
    }

    .meter-label{ font-size:16px; }
    .dot{ width:16px; height:16px; }
    .connector{ height:3px; min-width:4px; }
    .keyword-title{ font-size:16px; }
    .keyword-text{ font-size:15px; }
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="page-title">Album Collection</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button id="mypageBtn" class="back-btn" style="display:none;">
            マイページ
        </button>

        <button class="back-btn" onclick="location.href='./editor.html'">
            編集ページへ戻る
        </button>
    </div>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const albumGrid = document.getElementById("albumGrid");
const mypageBtn = document.getElementById("mypageBtn");

let currentUser = null;
let allLikes = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (user) {
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };
    } else {
        mypageBtn.style.display = "none";
    }
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

const likesQuery = collection(db, "likes");

onSnapshot(likesQuery, (snapshot) => {
    allLikes = [];

    snapshot.forEach((doc) => {
        allLikes.push(doc.data());
    });

    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = `${count}件`;
        button.textContent = liked ? "♥ いいね済み" : "♡ いいね";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

onSnapshot(q, (snapshot)=>{

    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML =
            `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((docSnap)=>{

        const a = docSnap.data();
        const albumId = docSnap.id;

        albumGrid.innerHTML += `
        <div class="album-card">

            <div class="album-left">
                <img class="cover"
                     src="${escapeHTML(a.cover || "")}"
                     alt="">

                <div class="title">
                    ${escapeHTML(a.title || "")}
                </div>

                <div class="artist">
                    ${escapeHTML(a.artist || "")}
                </div>

                <div class="meta">
                    ${escapeHTML(a.year || "")}
                </div>

                <div class="creator">
                    投稿者：
                    <a href="profile.html?uid=${escapeHTML(a.userId || "")}">
                        ${escapeHTML(
                            a.userName ||
                            a.userEmail ||
                            "匿名ユーザー"
                        )}
                    </a>
                </div>

                <div class="like-area"
                     data-like-area
                     data-album-id="${escapeHTML(albumId)}">
                    <button class="like-btn"
                            onclick="toggleLike('${escapeHTML(albumId)}')">
                        ♡ いいね
                    </button>
                    <span class="like-count">0件</span>
                </div>
            </div>

            <div class="meter-area">

                ${meter("暗い", "明るい", a.darkness)}
                ${meter("静か", "激しい", a.intense)}
                ${meter("シンプル", "複雑", a.complex)}
                ${meter("絶望", "希望", a.hope)}
                ${meter("個人", "世界", a.world)}

                <div class="keyword-box">
                    <div class="keyword-title">キーワード</div>
                    <div class="keyword-text">
                        ${escapeHTML(a.keywords || "")}
                    </div>
                </div>

            </div>

            <div class="description-wide">
                ${escapeHTML(a.desc || "")}
            </div>

        </div>
        `;
    });

    updateLikeDisplays();

}, (error) => {
    albumGrid.innerHTML =
        `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});

</script>

</body>
</html>
