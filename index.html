<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
/* ============================================================
   Album Collection index.html
   CSS整理・安定版
   - PC版：2列カード / 左に投稿情報 / 右にメーター
   - スマホ版：1列表示 / カード内部はPC版に近い横型
   - メーター色：Pale Ice
   - 追加styleの多重上書きなし
============================================================ */

:root{
    --bg:#050505;
    --panel:#080909;
    --panel-2:#0b0d0e;
    --border:rgba(255,255,255,0.15);
    --border-soft:rgba(255,255,255,0.10);

    --text:#ffffff;
    --text-soft:#dce3e6;
    --muted:#aab3b8;

    --accent:#9fcdd9;
    --accent-hover:#b7dfe7;

    --pale-1:#7faebb;
    --pale-2:#9bc7d0;
    --pale-3:#b9dde3;
    --pale-4:#d7edf0;
    --pale-5:#edf8f9;

    --meter-off:#48555b;
    --meter-line-off:#333d42;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    padding:38px 30px 120px 252px;
}

a{
    color:inherit;
}

/* ===== Header ===== */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
}

.page-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-0.045em;
}

/* ===== Layout ===== */

.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1230px;
    margin:0;
}

.album-card{
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    overflow:hidden;
    display:grid;
    grid-template-columns:200px minmax(0, 1fr);
    gap:20px;
    align-items:stretch;
    box-shadow:none;
}

.album-card:hover{
    border-color:rgba(159,205,217,0.42);
    transform:translateY(-1px);
    transition:0.18s ease;
}

/* ===== Left side ===== */

.album-main{
    min-width:0;
    display:block;
}

.cover{
    width:160px;
    height:160px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:4px;
    margin:0 0 12px 0;
}

.album-text{
    min-width:0;
}

.title{
    font-size:25px;
    font-weight:900;
    line-height:1.06;
    letter-spacing:-0.045em;
    margin-bottom:5px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:var(--accent);
    font-size:15px;
    font-weight:800;
    line-height:1.25;
    margin-bottom:6px;
    word-break:break-word;
}

.meta{
    color:#c5cbd0;
    font-size:11px;
    line-height:1.35;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.description{
    color:var(--text-soft);
    font-size:11.5px;
    line-height:1.58;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.creator{
    color:var(--muted);
    font-size:11.5px;
    line-height:1.45;
    margin-bottom:7px;
    word-break:break-word;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:10px;
    color:#b6c0c4;
    font-size:11.5px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#b6c0c4;
    padding:0;
    font-size:16px;
    cursor:pointer;
    line-height:1;
}

.like-btn:hover,
.like-btn.liked{
    color:white;
}

.like-count,
.comment-count{
    font-size:11.5px;
    color:#b6c0c4;
}

/* ===== Right side: meter panel ===== */

.album-analysis{
    min-width:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;

    border:1px solid rgba(255,255,255,0.13);
    border-radius:14px;
    padding:17px 14px 14px;
    background:#070808;
}

.meter-list{
    display:block;
}

.meter{
    display:grid;
    grid-template-columns:52px minmax(0,1fr) 58px;
    align-items:center;
    gap:10px;
    margin-bottom:26px;
    min-width:0;
    width:100%;
}

.meter:last-of-type{
    margin-bottom:0;
}

.meter-label{
    color:#f3f7f8;
    font-size:13px;
    font-weight:800;
    line-height:1;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid var(--meter-off);
    background:transparent;
    flex:0 0 16px;
}

.connector{
    height:1px;
    background:var(--meter-line-off);
    flex:1;
    min-width:8px;
}

/* Pale Ice gradient */
.dot.active.level-1,
.connector.active.level-1{
    background:var(--pale-1);
    border-color:var(--pale-1);
}

.dot.active.level-2,
.connector.active.level-2{
    background:var(--pale-2);
    border-color:var(--pale-2);
}

.dot.active.level-3,
.connector.active.level-3{
    background:var(--pale-3);
    border-color:var(--pale-3);
}

.dot.active.level-4,
.connector.active.level-4{
    background:var(--pale-4);
    border-color:var(--pale-4);
}

.dot.active.level-5,
.connector.active.level-5{
    background:var(--pale-5);
    border-color:var(--pale-5);
}

.dot.active{
    box-shadow:0 0 16px rgba(159,205,217,0.14);
}

.keyword-box{
    margin-top:14px;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:9px 10px;

    display:grid;
    grid-template-columns:62px minmax(0,1fr);
    gap:10px;
    align-items:start;
}

.keyword-title{
    color:var(--accent);
    font-size:11px;
    font-weight:800;
}

.keyword-text{
    color:#dde6e8;
    font-size:10.5px;
    line-height:1.5;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* ===== Empty ===== */

.empty{
    color:#888;
    font-size:24px;
}

/* ===== PC Sidebar ===== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:220px;
    height:100vh;
    background:#060708;
    border-right:1px solid rgba(255,255,255,0.08);
    padding:28px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.04;
    margin-bottom:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:12px;
    font-size:15px;
}

.sidebar a:hover{
    background:#141617;
}

.sidebar a.active{
    background:#17191a;
    color:var(--accent);
}


/* ===== Mobile Feed Tabs ===== */

.mobile-feed-tabs{
    display:none;
}

.feed-tab{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    background:transparent;
    color:#7b858b;
    font:inherit;
    cursor:pointer;
}

@media(max-width:900px){
    .mobile-feed-tabs{
        display:grid;
        grid-template-columns:1fr 1fr;
        position:sticky;
        top:0;
        z-index:900;
        margin:-16px -16px 16px;
        padding-top:env(safe-area-inset-top);
        background:rgba(5,5,5,0.96);
        border-bottom:1px solid rgba(255,255,255,0.10);
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
    }

    .feed-tab{
        position:relative;
        height:54px;
        color:#7d858b;
        font-size:16px;
        font-weight:900;
        letter-spacing:-0.02em;
    }

    .feed-tab.active{
        color:#ffffff;
    }

    .feed-tab.active::after{
        content:"";
        position:absolute;
        left:50%;
        bottom:0;
        width:72px;
        height:4px;
        transform:translateX(-50%);
        border-radius:999px;
        background:#1d9bf0;
    }
}

/* ===== Mobile Tabbar ===== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:white;
    font-weight:700;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== Floating Post Button ===== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:var(--accent-hover);
}

/* ===== PC narrow ===== */

@media(min-width:901px) and (max-width:1280px){
    body{
        padding-left:236px;
        padding-right:20px;
    }

    .sidebar{
        width:210px;
    }

    .album-grid{
        max-width:none;
        width:100%;
    }

    .album-card{
        grid-template-columns:180px minmax(0,1fr);
        gap:16px;
        padding:16px;
    }

    .cover{
        width:150px;
        height:150px;
    }

    .title{
        font-size:22px;
    }

    .meter{
        grid-template-columns:48px minmax(0,1fr) 54px;
        gap:8px;
        margin-bottom:22px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:14px;
        height:14px;
        flex-basis:14px;
    }
}

/* ===== Smartphone ===== */

@media(max-width:900px){
    body{
        padding:16px;
        padding-left:16px;
        padding-bottom:110px;
    }

    .sidebar{
        display:none;
    }

    .topbar{
        margin-bottom:18px;
    }

    .page-title{
        font-size:30px;
    }

    .album-grid{
        grid-template-columns:1fr;
        gap:14px;
        width:100%;
        max-width:none;
        margin:0;
    }

    /*
      スマホは投稿自体は縦一列。
      カード内部はPC版に近く、左：投稿情報 / 右：メーター。
    */
    .album-card{
        grid-template-columns:minmax(0,0.94fr) minmax(0,1.06fr);
        gap:10px;
        align-items:stretch;
        padding:12px;
        border-radius:16px;
    }

    .album-main{
        display:grid;
        grid-template-columns:92px minmax(0,1fr);
        gap:9px;
        align-content:start;
        min-width:0;
    }

    .cover{
        width:92px;
        height:auto;
        border-radius:8px;
        margin:0;
    }

    .album-text{
        min-width:0;
    }

    .title{
        font-size:16px;
        line-height:1.12;
        margin-bottom:4px;
        -webkit-line-clamp:2;
    }

    .artist{
        font-size:13px;
        margin-bottom:3px;
    }

    .meta{
        font-size:10px;
        line-height:1.35;
        margin-bottom:5px;
    }

    .description{
        grid-column:1 / -1;
        font-size:11px;
        line-height:1.55;
        margin-top:0;
        margin-bottom:7px;
        -webkit-line-clamp:4;
    }

    .creator{
        grid-column:1 / -1;
        font-size:11px;
        margin-top:0;
        margin-bottom:5px;
    }

    .reaction-row{
        grid-column:1 / -1;
        gap:9px;
        font-size:11px;
        margin-top:5px;
    }

    .like-btn{
        font-size:16px;
    }

    .like-count,
    .comment-count{
        font-size:11px;
    }

    .album-analysis{
        height:100%;
        margin-top:0;
        padding:9px 9px 8px;
        border-radius:12px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        min-width:0;
    }

    .meter{
        grid-template-columns:32px minmax(0,1fr) 32px;
        gap:5px;
        margin-bottom:15px;
    }

    .meter:last-of-type{
        margin-bottom:0;
    }

    .meter-label{
        font-size:8px;
        font-weight:800;
    }

    .dot{
        width:10px;
        height:10px;
        border-width:1.4px;
        flex-basis:10px;
    }

    .connector{
        height:1px;
        min-width:4px;
    }

    .keyword-box{
        margin-top:10px;
        padding:7px;
        border-radius:8px;
        grid-template-columns:48px minmax(0,1fr);
        gap:6px;
    }

    .keyword-title{
        font-size:8px;
    }

    .keyword-text{
        font-size:8px;
        line-height:1.4;
    }

    .mobile-tabbar{
        display:grid;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        grid-template-columns:repeat(5,1fr);
        z-index:9999;
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
        padding-bottom:env(safe-area-inset-bottom);
    }

    .mobile-tabbar a{
        height:72px;
    }

    .fab,
    .floating-post-btn,
    .post-fab{
        display:none !important;
    }
}

/* ===== Narrow smartphone ===== */

@media(max-width:430px){
    .album-card{
        grid-template-columns:minmax(0,0.92fr) minmax(0,1.08fr);
        gap:8px;
        padding:10px;
    }

    .album-main{
        grid-template-columns:78px minmax(0,1fr);
        gap:8px;
    }

    .cover{
        width:78px;
    }

    .title{
        font-size:14px;
    }

    .artist{
        font-size:12px;
    }

    .description{
        font-size:10px;
        -webkit-line-clamp:4;
    }

    .meter{
        grid-template-columns:29px minmax(0,1fr) 29px;
        gap:4px;
        margin-bottom:13px;
    }

    .meter-label{
        font-size:7px;
    }

    .dot{
        width:9px;
        height:9px;
        flex-basis:9px;
    }

    .keyword-box{
        grid-template-columns:42px minmax(0,1fr);
        padding:6px;
    }

    .keyword-title,
    .keyword-text{
        font-size:7px;
    }
}

/* ===== Meter height sync fix =====
   メーター間隔を投稿カードの高さに連動させる。
   固定marginではなく、右メーター欄の残り高さに合わせて5本を均等配置。
*/
@media(min-width:901px){
    .album-analysis{
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        align-self:stretch;
        height:100%;
    }

    .meter-list{
        flex:1;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        min-height:0;
        padding-bottom:14px;
    }

    .meter{
        margin-bottom:0;
    }

    .keyword-box{
        flex-shrink:0;
        margin-top:0;
    }
}

@media(max-width:900px){
    .album-analysis{
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        align-self:stretch;
        height:100%;
    }

    .meter-list{
        flex:1;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        min-height:0;
        padding-bottom:8px;
    }

    .meter{
        margin-bottom:0;
    }

    .keyword-box{
        flex-shrink:0;
        margin-top:0;
    }
}


/* indexでは紹介文を表示しない */
.description{
    display:none !important;
}

</style>
</head>

        myPageLink.href = url;
    }

    if(mobileMyPageLink){
        mobileMyPageLink.href = url;
    }

    renderAlbums();
    updateLikeDisplays();
    updateCommentDisplays();
});
function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}


function getUserDisplayNameFromData(data){
    if(!data){
        return "";
    }

    return (
        data.displayName ||
        data.nickname ||
        data.nickName ||
        data.userName ||
        data.name ||
        ""
    );
}

async function getDisplayNameForAlbum(album){
    const uid = album?.userId || "";

    if(uid && userNameCache.has(uid)){
        return userNameCache.get(uid);
    }

    if(uid){
        try{
            const userSnap = await getDoc(doc(db, "users", uid));

            if(userSnap.exists()){
                const displayName = getUserDisplayNameFromData(userSnap.data());

                if(displayName){
                    userNameCache.set(uid, displayName);
                    return displayName;
                }
            }
        }catch(error){
            console.warn("投稿者名の取得に失敗しました", error);
        }
    }

    const fallbackName = album?.userName || album?.displayName || album?.nickname || "匿名ユーザー";

    if(uid){
        userNameCache.set(uid, fallbackName);
    }

    return fallbackName;
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink){
        return;
    }

    if(!user){
        mobileMyPageLink.href = "login.html";

        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }

        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }

        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if(!userSnap.exists()){
            return;
        }

        const iconUrl = getUserIconUrl(userSnap.data());

        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";
            mobileMyPageFallback.style.display = "none";

            mobileMyPageAvatar.onerror = () => {

                mobileMyPageFallback.style.display = "flex";
            };
        }
    }catch(error){
        console.warn("マイページアイコンの取得に失敗しました", error);
    }
}

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatPostDate(value){
    if(!value){
        return "";
    }

    let date = null;

    if(typeof value.toDate === "function"){
        date = value.toDate();
    } else if(value instanceof Date){
        date = value;
    } else if(typeof value === "number"){
        date = new Date(value);
    } else if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            date = parsed;
        }
    }

    if(!date || Number.isNaN(date.getTime())){
        return "";
    }

    const now = new Date();
    const diffMs = now.getTime() - date.getTime();
    const diffMinutes = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if(diffMinutes < 1){
        return "今";
    }

    if(diffMinutes < 60){
        return `${diffMinutes}分前`;
    }

    if(diffHours < 24){
        return `${diffHours}時間前`;
    }

    if(diffDays < 7){
        return `${diffDays}日前`;
    }

    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = count;
        button.textContent = liked ? "♥" : "♡";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

onSnapshot(collection(db, "comments"), (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    updateCommentDisplays();
});

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");

    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

function setupFollowingListener(user){
    if(unsubscribeFollowing){
        unsubscribeFollowing();
        unsubscribeFollowing = null;
    }

    followingIds = new Set();

    if(!user){
        renderAlbums();
        return;
    }

    const followQuery = query(
        collection(db, "follows"),
        where("followerId", "==", user.uid)
    );

    unsubscribeFollowing = onSnapshot(followQuery, (snapshot) => {
        followingIds = new Set();

        snapshot.forEach((docSnap) => {
            const follow = docSnap.data();
            if(follow.followingId){
                followingIds.add(follow.followingId);
            }
        });

        renderAlbums();
    }, (error) => {
        console.warn("フォロー情報の取得に失敗しました", error);
        followingIds = new Set();
        renderAlbums();
    });
}

function getVisibleAlbums(){
    const sortedAlbums = [...allAlbums].sort((a, b) => {
        const aTime = getPostTime(a.data.createdAt || a.data.updatedAt);
        const bTime = getPostTime(b.data.createdAt || b.data.updatedAt);
        return bTime - aTime;
    });

    if(currentFeedMode !== "following"){
        return sortedAlbums;
    }

    if(!currentUser){
        return [];
    }

    return sortedAlbums.filter((album) => {
        const userId = album.data.userId || "";
        return userId === currentUser.uid || followingIds.has(userId);
    });
}

function getPostTime(value){
    if(!value){
        return 0;
    }

    if(typeof value.toDate === "function"){
        return value.toDate().getTime();
    }

    if(value instanceof Date){
        return value.getTime();
    }

    if(typeof value === "number"){
        return value;
    }

    if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            return parsed.getTime();
        }
    }

    return 0;
}

function updateFeedTabs(){
    if(!recommendTab || !followingTab){
        return;
    }

    recommendTab.classList.toggle("active", currentFeedMode === "recommend");
    followingTab.classList.toggle("active", currentFeedMode === "following");
}

function setFeedMode(mode){
    if(mode !== "recommend" && mode !== "following"){
        return;
    }

    currentFeedMode = mode;
    updateFeedTabs();
    renderAlbums();
}

if(recommendTab){
    recommendTab.addEventListener("click", () => setFeedMode("recommend"));
}

if(followingTab){
    followingTab.addEventListener("click", () => setFeedMode("following"));
}

document.addEventListener("touchstart", (event) => {
    if(window.innerWidth > 900 || event.touches.length !== 1){
        return;
    }

    touchStartX = event.touches[0].clientX;
    touchStartY = event.touches[0].clientY;
}, { passive:true });

document.addEventListener("touchend", (event) => {
    if(window.innerWidth > 900 || !touchStartX || event.changedTouches.length !== 1){
        return;
    }

    const endX = event.changedTouches[0].clientX;
    const endY = event.changedTouches[0].clientY;
    const diffX = endX - touchStartX;
    const diffY = endY - touchStartY;

    touchStartX = 0;
    touchStartY = 0;

    if(Math.abs(diffX) < 70 || Math.abs(diffX) < Math.abs(diffY) * 1.25){
        return;
    }

    if(diffX < 0 && currentFeedMode === "recommend"){
        setFeedMode("following");
    } else if(diffX > 0 && currentFeedMode === "following"){
        setFeedMode("recommend");
    }
}, { passive:true });

async function renderAlbums(){
    updateFeedTabs();

    const visibleAlbums = getVisibleAlbums();

    albumGrid.innerHTML = "";

    if(visibleAlbums.length === 0){
        if(currentFeedMode === "following"){
            albumGrid.innerHTML = currentUser
                ? `<div class="empty">フォロー中の投稿がまだありません</div>`
                : `<div class="empty">ログインするとフォロー中TLを表示できます</div>`;
        } else {
            albumGrid.innerHTML = `<div class="empty">保存されたアルバムがありません</div>`;
        }
        return;
    }

    for (const item of visibleAlbums){

        const a = item.data;
        const albumId = item.id;
        const posterName = await getDisplayNameForAlbum(a);

        albumGrid.innerHTML += `
<div class="album-card"
     onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">

    <div class="album-main">
        <img class="cover"
             src="${escapeHTML(a.cover || "")}"
             alt="">

        <div class="album-text">
            <div class="title">${escapeHTML(a.title || "")}</div>
            <div class="artist">${escapeHTML(a.artist || "")}</div>

            <div class="meta">
                ${escapeHTML([a.year, a.country, a.genre].filter(Boolean).join(" / ") || a.year || "")}
            </div>
<div class="creator">
                投稿者：
                <a href="profile.html?uid=${escapeHTML(a.userId || "")}"
                   onclick="event.stopPropagation();">
                    ${escapeHTML(posterName)}
                </a>
            </div>

            <div class="reaction-row">
                <div class="like-area"
                     data-like-area
                     data-album-id="${escapeHTML(albumId)}">
                    <button class="like-btn"
                            onclick="event.stopPropagation(); toggleLike('${escapeHTML(albumId)}')">
                        ♡
                    </button>
                    <span class="like-count">0</span>
                </div>

                <div class="comment-count"
                     data-comment-count
                     data-album-id="${escapeHTML(albumId)}">
                    コメント 0件
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-post-date">
        ${formatPostDate(a.createdAt || a.updatedAt)}
    </div>

    <div class="album-analysis">
        <div class="meter-list">
            ${meter("暗い", "明るい", a.darkness)}
            ${meter("静か", "激しい", a.intense)}
            ${meter("シンプル", "複雑", a.complex)}
            ${meter("絶望", "希望", a.hope)}
            ${meter("個人", "世界", a.world)}
        </div>

        <div class="keyword-box">
            <div class="keyword-title">キーワード</div>
            <div class="keyword-text">
                ${escapeHTML(a.keywords || "")}
            </div>
        </div>
    </div>

</div>
        `;
    }

    updateLikeDisplays();
    updateCommentDisplays();
}

onSnapshot(q, (snapshot)=>{

    allAlbums = [];

    snapshot.forEach((docSnap) => {
        allAlbums.push({
            id: docSnap.id,
            data: docSnap.data()
        });
    });

    renderAlbums();

}, (error) => {
    albumGrid.innerHTML =
        `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});
</script>

<style>
/* ============================================================
   FINAL: スマホ版メーター完全固定版
   - PC版には影響しない
   - メーター線は1本の背景線
   - 値は選択ドット1個だけで表示
   - 5段階の位置はCSS Gridで固定
   - 左右端の未選択ドットだけでなく、中間の未選択ドットも非表示
   - これで列ズレ・点線化・途中の小さい点を防ぐ
============================================================ */
@media(max-width:900px){
    .meter-graphic{
        position:relative !important;
        display:grid !important;
        grid-template-columns:repeat(5, 1fr) !important;
        align-items:center !important;
        width:100% !important;
        height:18px !important;
        min-width:0 !important;
        overflow:visible !important;
    }

    .meter-graphic::before{
        content:"" !important;
        position:absolute !important;
        left:7px !important;
        right:7px !important;
        top:50% !important;
        height:2px !important;
        transform:translateY(-50%) !important;
        border-radius:999px !important;
        z-index:0 !important;
        background:linear-gradient(
            90deg,
            #162025 0%,
            #162025 25%,
            #405f69 25%,
            #405f69 50%,
            #8bb7c3 50%,
            #8bb7c3 75%,
            #d7edf0 75%,
            #d7edf0 100%
        ) !important;
    }

    .meter-graphic .connector{
        display:none !important;
    }

    .meter-graphic .dot{
        position:relative !important;
        z-index:1 !important;
        grid-row:1 !important;
        justify-self:center !important;
        align-self:center !important;

        width:16px !important;
        height:16px !important;
        flex:none !important;
        margin:0 !important;
        border-radius:50% !important;
        box-sizing:border-box !important;

        opacity:0 !important;
        transform:none !important;
        border:0 !important;
        box-shadow:none !important;
        background:transparent !important;
    }

    .meter-graphic .dot.level-1{ grid-column:1 !important; }
    .meter-graphic .dot.level-2{ grid-column:2 !important; }
    .meter-graphic .dot.level-3{ grid-column:3 !important; }
    .meter-graphic .dot.level-4{ grid-column:4 !important; }
    .meter-graphic .dot.level-5{ grid-column:5 !important; }

    .meter-graphic .dot.selected{
        opacity:1 !important;
        border:3px solid #f0fbfc !important;
        box-shadow:0 0 12px rgba(220,245,250,0.40) !important;
    }

    .meter-graphic .dot.selected.level-1{
        background:#162025 !important;
        border-color:#9fcdd9 !important;
    }

    .meter-graphic .dot.selected.level-2{
        background:#405f69 !important;
    }

    .meter-graphic .dot.selected.level-3{
        background:#8bb7c3 !important;
    }

    .meter-graphic .dot.selected.level-4{
        background:#d7edf0 !important;
    }

    .meter-graphic .dot.selected.level-5{
        background:#f0fbfc !important;
        border-color:#ffffff !important;
    }
}

@media(max-width:430px){
    .meter-graphic{
        height:17px !important;
    }

    .meter-graphic::before{
        left:7px !important;
        right:7px !important;
        height:2px !important;
    }

    .meter-graphic .dot{
        width:15px !important;
        height:15px !important;
    }
}
</style>
