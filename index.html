<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
    padding-left:280px;
}

/* サイドバー */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    overflow-y:auto;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
}

.sidebar a:hover{
    background:#1a1a1a;
}

/* 上部 */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.page-title{
    font-size:48px;
    font-weight:700;
}

.back-btn,
.like-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
    border-radius:10px;
}

.back-btn:hover,
.like-btn:hover{
    background:#2a2a2a;
}

.like-btn.liked{
    background:#6fa8dc;
    color:white;
}

/* 投稿一覧（2列表示） */

.album-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:22px;
    max-width:1600px;
    margin:0 auto;
}

.album-card{
    display:grid;
    grid-template-columns:42% 58%;
    gap:18px;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:18px;
    min-height:430px;
}

.cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    margin-bottom:16px;
}

.title{
    font-size:28px;
    font-weight:800;
    line-height:1.15;
}

.artist{
    color:#6fa8dc;
    font-size:18px;
    margin-top:6px;
}

.meta{
    color:#aaa;
    margin-top:8px;
    font-size:14px;
}

.description-wide{
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,0.1);
    font-size:14px;
    line-height:1.7;
    color:#ddd;
}

.meter-area{
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px;
    padding:16px;
}

.meter{
    grid-template-columns:56px minmax(0,1fr) 56px;
    gap:8px;
    margin-bottom:14px;
}

.keyword-box{
    margin-top:14px;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:12px;
    padding:14px;
}

@media(max-width:1400px){
    .album-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
    }
}

@media(max-width:900px){
    .album-grid{
        grid-template-columns:1fr;
    }

    .album-card{
        grid-template-columns:1fr;
    }
}

    .cover{
        width:100%;
        max-width:260px;
    }

    .meter{
        grid-template-columns:48px minmax(0,1fr) 48px;
    }

    .meter-label{
        font-size:13px;
    }
}
</style>
</head>

<body>

<nav class="sidebar">
    <div class="logo">Album Collection</div>

    <a href="index.html">🏠 ホーム</a>
    <a href="editor.html">✍️ 投稿する</a>
    <a id="myPageLink" href="login.html">👤 マイページ</a>
    <a href="profile-edit.html">⚙️ プロフィール編集</a>
    <a href="login.html">🔐 ログイン</a>
</nav>

<div class="topbar">
    <h1 class="page-title">Album Collection</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button id="mypageBtn" class="back-btn" style="display:none;">
            マイページ
        </button>

        <button class="back-btn" onclick="location.href='./editor.html'">
            編集ページへ戻る
        </button>
    </div>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const albumGrid = document.getElementById("albumGrid");
const mypageBtn = document.getElementById("mypageBtn");

let currentUser = null;
let allLikes = [];
let allComments = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (user) {
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };
    } else {
        mypageBtn.style.display = "none";
    }

    const myPageLink = document.getElementById("myPageLink");

    if (myPageLink) {
        if (user) {
            myPageLink.href = `profile.html?uid=${user.uid}`;
        } else {
            myPageLink.href = "login.html";
        }
    }

    updateLikeDisplays();
    updateCommentDisplays();
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

/* いいね機能 */

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = `${count}件`;
        button.textContent = liked ? "♥ いいね済み" : "♡ いいね";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

/* コメント数表示 */

onSnapshot(collection(db, "comments"), (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    updateCommentDisplays();
});

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");

    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}

/* 投稿一覧 */

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

onSnapshot(q, (snapshot)=>{

    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML =
            `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((docSnap)=>{

        const a = docSnap.data();
        const albumId = docSnap.id;

        albumGrid.innerHTML += `
       <div class="album-card">
    <div class="album-info">
        <img class="cover">
        <div class="title"></div>
        <div class="artist"></div>
        <div class="meta"></div>
        <div class="description"></div>
    </div>

    <div class="album-analysis">
        <div class="meter-area"></div>
        <div class="keyword-box"></div>
    </div>
</div>

            <div class="description-wide">
                ${escapeHTML(a.desc || "")}
            </div>

        </div>
        `;
    });

    updateLikeDisplays();
    updateCommentDisplays();

}, (error) => {
    albumGrid.innerHTML =
        `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});

</script>

</body>
</html>
