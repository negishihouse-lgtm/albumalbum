<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album Editor</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:30px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    background:#111;
    color:white;
    border:1px solid #333;
}

button{
    padding:14px;
    width:100%;
    background:#4caf50;
    color:white;
    border:none;
    cursor:pointer;
}

.album{
    margin-top:20px;
    padding:10px;
    border:1px solid #333;
}
img{
    width:100px;
    height:100px;
    object-fit:cover;
}
</style>
</head>

<body>

<h1>Album Editor</h1>

<input id="coverInput" type="file" accept="image/*">

<input id="titleInput" placeholder="アルバム名">
<input id="artistInput" placeholder="アーティスト">
<input id="yearInput" placeholder="年">
<textarea id="descInput" placeholder="説明"></textarea>
<input id="keywordsInput" placeholder="キーワード">

<button id="saveBtn">保存</button>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

function getForm(){
    return {
        title: document.getElementById("titleInput").value,
        artist: document.getElementById("artistInput").value,
        year: document.getElementById("yearInput").value,
        desc: document.getElementById("descInput").value,
        keywords: document.getElementById("keywordsInput").value
    };
}

document.getElementById("saveBtn").addEventListener("click", async () => {

    const file = document.getElementById("coverInput").files[0];

    let imageUrl = "";

    if(file){
        const storageRef = ref(storage, "covers/" + Date.now());
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    const data = getForm();
    data.cover = imageUrl;

    await addDoc(collection(db,"albums"), data);
});

const list = document.getElementById("list");

onSnapshot(collection(db,"albums"), (snap)=>{

    list.innerHTML = "";

    snap.forEach((d)=>{

        const a = d.data();

        list.innerHTML += `
        <div class="album">
            <img src="${a.cover}">
            <div>${a.title}</div>
            <div>${a.artist}</div>
            <button onclick="deleteItem('${d.id}')">削除</button>
        </div>
        `;
    });
});

window.deleteItem = async (id) => {
    await deleteDoc(doc(db,"albums",id));
};

</script>

</body>
</html>
