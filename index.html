<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
:root{
    --bg:#050505;
    --panel:#090b0c;
    --panel-2:#070809;
    --border:rgba(255,255,255,0.12);
    --border-soft:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#cfcfcf;
    --sub:#9aa3aa;
    --accent:#9fcdd9;
    --accent-deep:#7fb2c3;
    --inactive:#445158;
    --inactive-line:#333b40;
    --keyword:#a5d2de;
    --pale-1:#7fb2c3;
    --pale-2:#9bc9d6;
    --pale-3:#b8dde5;
    --pale-4:#d7edf0;
    --pale-5:#ecf7f8;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    padding:38px 30px 120px 272px;
}

a{color:inherit;}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
}

.page-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-0.045em;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:26px;
    max-width:1480px;
    margin:0 auto;
}

.album-card{
    background:linear-gradient(135deg,#0a0c0d 0%, #050505 62%, #090a0b 100%);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:22px;
    padding:18px;
    cursor:pointer;
    overflow:hidden;
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(340px,0.96fr);
    gap:18px;
    align-items:stretch;
    box-shadow:0 16px 36px rgba(0,0,0,0.28);
}

.album-card:hover{
    border-color:rgba(159,205,217,0.34);
    transform:translateY(-1px);
    transition:.18s ease;
}

.album-main{
    min-width:0;
    display:grid;
    grid-template-columns:170px minmax(0,1fr);
    gap:16px;
    align-content:start;
}

.cover{
    width:170px;
    max-width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:#111;
    display:block;
}

.album-text{min-width:0; align-self:start;}

.title{
    font-size:28px;
    font-weight:900;
    letter-spacing:-0.045em;
    line-height:1.07;
    margin-bottom:8px;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:var(--accent);
    font-size:18px;
    font-weight:800;
    margin-bottom:8px;
    word-break:break-word;
}

.meta{
    color:#d0d5d8;
    font-size:12px;
    line-height:1.45;
    margin-bottom:10px;
}

.description{
    color:#e2e6e8;
    font-size:14px;
    line-height:1.72;
    margin-bottom:12px;
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
    word-break:break-word;
}

.creator{
    color:#a8afb4;
    font-size:14px;
    line-height:1.5;
    margin-bottom:10px;
    word-break:break-word;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}
.creator a:hover{text-decoration:underline;}

.reaction-row{
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
    color:#aeb5ba;
    font-size:14px;
}

.like-area{display:flex;align-items:center;gap:6px;}
.like-btn{
    background:none;
    border:none;
    color:#b4bec3;
    padding:0;
    font-size:20px;
    cursor:pointer;
}
.like-btn:hover,.like-btn.liked{color:white;}
.like-count,.comment-count{font-size:14px;color:#b4bec3;}

.album-analysis{
    min-width:0;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:16px;
    padding:18px 16px 14px;
}

.meter-list{display:flex;flex-direction:column;gap:24px;}

.meter{
    display:grid;
    grid-template-columns:58px minmax(0,1fr) 58px;
    align-items:center;
    gap:12px;
    min-width:0;
}

.meter-label{
    color:#f4f7f8;
    font-size:14px;
    font-weight:800;
    white-space:nowrap;
}
.right-label{text-align:right;}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid var(--inactive);
    background:transparent;
    flex-shrink:0;
}

.connector{
    height:1px;
    background:var(--inactive-line);
    flex:1;
    min-width:0;
}

.dot.active.level-1, .connector.active.level-1{background:var(--pale-1); border-color:var(--pale-1);}
.dot.active.level-2, .connector.active.level-2{background:var(--pale-2); border-color:var(--pale-2);}
.dot.active.level-3, .connector.active.level-3{background:var(--pale-3); border-color:var(--pale-3);}
.dot.active.level-4, .connector.active.level-4{background:var(--pale-4); border-color:var(--pale-4);}
.dot.active.level-5, .connector.active.level-5{background:var(--pale-5); border-color:var(--pale-5);}

.keyword-box{
    margin-top:18px;
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:12px 14px;
    display:grid;
    grid-template-columns:88px 1fr;
    gap:12px;
    align-items:start;
}

.keyword-title{
    color:var(--keyword);
    font-size:13px;
    font-weight:800;
}

.keyword-text{
    color:#dde6e8;
    font-size:13px;
    line-height:1.7;
    word-break:break-word;
}

.empty{color:#888;font-size:24px;}

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:236px;
    height:100vh;
    background:#060708;
    border-right:1px solid rgba(255,255,255,0.08);
    padding:28px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.04;
    margin-bottom:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:12px;
    font-size:15px;
}

.sidebar a:hover{background:#141617;}
.sidebar a.active{background:#17191a;color:var(--accent);}

.mobile-tabbar{display:none;}
.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}
.mobile-tabbar a.active{color:white;font-weight:700;}
.mobile-tabbar .icon{font-size:22px;line-height:1;}
.mobile-tabbar .label{line-height:1;white-space:nowrap;}
.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}
.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}
.fab:hover{background:#b1d9e3;}

@media (max-width:1200px){
    body{padding-right:20px;padding-left:252px;}
    .album-card{grid-template-columns:minmax(0,1fr);}
}

@media (max-width:900px){
    body{
        padding:16px 16px 108px;
    }

    .sidebar{display:none;}

    .mobile-tabbar{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        display:grid;
        grid-template-columns:repeat(5,1fr);
        z-index:9999;
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
        padding-bottom:env(safe-area-inset-bottom);
    }

    .mobile-tabbar a{height:72px;}
    .fab{display:none !important;}

    .page-title{
        font-size:30px;
    }

    .topbar{margin-bottom:18px;}

    .album-grid{
        grid-template-columns:1fr;
        gap:14px;
    }

    .album-card{
        grid-template-columns:minmax(0,1fr) minmax(0,1fr);
        gap:10px;
        padding:12px;
        border-radius:16px;
        align-items:stretch;
    }

    .album-main{
        grid-template-columns:96px minmax(0,1fr);
        gap:10px;
    }

    .cover{
        width:96px;
        border-radius:8px;
    }

    .title{
        font-size:16px;
        margin-bottom:4px;
    }

    .artist{
        font-size:13px;
        margin-bottom:4px;
    }

    .meta{
        font-size:10px;
        margin-bottom:6px;
    }

    .description{
        font-size:11px;
        line-height:1.6;
        -webkit-line-clamp:5;
        margin-bottom:8px;
    }

    .creator,
    .reaction-row,
    .like-count,
    .comment-count{
        font-size:11px;
    }

    .like-btn{font-size:16px;}

    .album-analysis{
        padding:10px 10px 9px;
        border-radius:12px;
    }

    .meter-list{gap:14px;}

    .meter{
        grid-template-columns:34px minmax(0,1fr) 34px;
        gap:6px;
    }

    .meter-label{
        font-size:9px;
    }

    .dot{
        width:11px;
        height:11px;
        border-width:1.5px;
    }

    .connector{height:1px;}

    .keyword-box{
        margin-top:12px;
        grid-template-columns:50px 1fr;
        gap:8px;
        padding:8px;
        border-radius:8px;
    }

    .keyword-title,
    .keyword-text{
        font-size:9px;
        line-height:1.45;
    }
}

@media (max-width:430px){
    .album-card{
        grid-template-columns:minmax(0,0.98fr) minmax(0,1.02fr);
    }
    .album-main{
        grid-template-columns:88px minmax(0,1fr);
    }
    .cover{width:88px;}
    .title{font-size:15px;}
    .meter{grid-template-columns:30px minmax(0,1fr) 30px;gap:5px;}
    .meter-label{font-size:8px;}
    .dot{width:10px;height:10px;}
    .keyword-title,.keyword-text{font-size:8px;}
}
</style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">Album<br>Collection</div>
    <a href="index.html" class="active">ホーム</a>
    <a href="search.html">検索</a>
    <a href="editor.html">投稿する</a>
    <a href="notifications.html">通知</a>
    <a id="myPageLink" href="login.html">マイページ</a>
    <a href="profile-edit.html">プロフィール編集</a>
    <a href="login.html">ログイン</a>
</nav>

<nav class="mobile-tabbar">
    <a href="index.html" class="active">
        <span class="icon">⌂</span>
        <span class="label">ホーム</span>
    </a>
    <a href="search.html">
        <span class="icon">⌕</span>
        <span class="label">検索</span>
    </a>
    <a href="editor.html">
        <span class="icon">＋</span>
        <span class="label">投稿</span>
    </a>
    <a href="notifications.html">
        <span class="icon">♡</span>
        <span class="label">通知</span>
    </a>
    <a id="mobileMyPageLink" href="login.html">
        <img id="mobileMyPageAvatar" class="tab-avatar" src="" alt="">
        <span id="mobileMyPageFallback" class="mypage-icon-text">◯</span>
        <span class="label">マイページ</span>
    </a>
</nav>

<a href="editor.html" class="fab">＋</a>

<div class="topbar">
    <h1 class="page-title">Album Collection</h1>
    <div></div>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    getDoc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);
const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});
const auth = getAuth(app);

const albumGrid = document.getElementById("albumGrid");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");
const mobileMyPageAvatar = document.getElementById("mobileMyPageAvatar");
const mobileMyPageFallback = document.getElementById("mobileMyPageFallback");

let currentUser = null;
let allLikes = [];
let allComments = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;
    updateMobileMyPageTab(user);

    const url = user ? `profile.html?uid=${encodeURIComponent(user.uid)}` : "login.html";
    if(myPageLink) myPageLink.href = url;
    if(mobileMyPageLink) mobileMyPageLink.href = url;

    updateLikeDisplays();
    updateCommentDisplays();
});

function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink) return;

    if(!user){
        mobileMyPageLink.href = "login.html";
        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }
        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }
        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if(!userSnap.exists()) return;

        const iconUrl = getUserIconUrl(userSnap.data());
        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";
            mobileMyPageFallback.style.display = "none";
            mobileMyPageAvatar.onerror = () => {
                mobileMyPageAvatar.style.display = "none";
                mobileMyPageFallback.style.display = "flex";
            };
        }
    }catch(error){
        console.warn("マイページアイコンの取得に失敗しました", error);
    }
}

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `<div class="dot level-${i} ${i <= value ? "active" : ""}"></div>`;

        if(i < 5){
            graphicHTML += `<div class="connector level-${i} ${i < value ? "active" : ""}"></div>`;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;
    return allLikes.some(like => like.albumId === albumId && like.userId === currentUser.uid);
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];
    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });
    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");
    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");
        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);
        countSpan.textContent = count;
        button.textContent = liked ? "♥" : "♡";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

onSnapshot(collection(db, "comments"), (snapshot) => {
    allComments = [];
    snapshot.forEach((docSnap) => {
        allComments.push({ id: docSnap.id, ...docSnap.data() });
    });
    updateCommentDisplays();
});

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");
    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

onSnapshot(q, (snapshot) => {
    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML = `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((docSnap) => {
        const a = docSnap.data();
        const albumId = docSnap.id;

        albumGrid.innerHTML += `
<div class="album-card" onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">
    <div class="album-main">
        <img class="cover" src="${escapeHTML(a.cover || "")}" alt="">

        <div class="album-text">
            <div class="title">${escapeHTML(a.title || "")}</div>
            <div class="artist">${escapeHTML(a.artist || "")}</div>
            <div class="meta">${escapeHTML([a.year, a.country, a.genre].filter(Boolean).join(" / ") || a.year || "")}</div>
            <div class="description">${escapeHTML(a.desc || "")}</div>
            <div class="creator">
                投稿者：
                <a href="profile.html?uid=${escapeHTML(a.userId || "")}" onclick="event.stopPropagation();">
                    ${escapeHTML(a.userName || a.userEmail || "匿名ユーザー")}
                </a>
            </div>
            <div class="reaction-row">
                <div class="like-area" data-like-area data-album-id="${escapeHTML(albumId)}">
                    <button class="like-btn" onclick="event.stopPropagation(); toggleLike('${escapeHTML(albumId)}')">♡</button>
                    <span class="like-count">0</span>
                </div>
                <div class="comment-count" data-comment-count data-album-id="${escapeHTML(albumId)}">コメント 0件</div>
            </div>
        </div>
    </div>

    <div class="album-analysis">
        <div class="meter-list">
            ${meter("暗い", "明るい", a.darkness)}
            ${meter("静か", "激しい", a.intense)}
            ${meter("シンプル", "複雑", a.complex)}
            ${meter("絶望", "希望", a.hope)}
            ${meter("個人", "世界", a.world)}
        </div>
        <div class="keyword-box">
            <div class="keyword-title">キーワード</div>
            <div class="keyword-text">${escapeHTML(a.keywords || "")}</div>
        </div>
    </div>
</div>`;
    });

    updateLikeDisplays();
    updateCommentDisplays();
}, (error) => {
    albumGrid.innerHTML = `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});
</script>
</body>
</html>
