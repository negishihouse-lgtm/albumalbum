<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    padding:42px;
    padding-left:280px;
    padding-bottom:120px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.page-title{
    font-size:42px;
    font-weight:800;
    letter-spacing:-0.04em;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1480px;
    margin:0 auto;
}

.album-card{
    background:linear-gradient(135deg,#0b0d0f 0%,#050505 62%,#090909 100%);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:18px;
    padding:20px;
    cursor:pointer;
    overflow:hidden;
    display:block;
    box-shadow:0 14px 36px rgba(0,0,0,0.32);
}

.album-card:hover{
    border-color:rgba(111,168,220,0.6);
    transform:translateY(-1px);
    transition:0.18s ease;
}

.album-main{
    min-width:0;
    display:grid;
    grid-template-columns:170px minmax(0,1fr);
    gap:18px;
    align-items:start;
}

.cover{
    width:170px;
    max-width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
}

.title{
    font-size:28px;
    font-weight:900;
    line-height:1.08;
    letter-spacing:-0.035em;
    margin-top:0;
    margin-bottom:8px;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:#6fa8dc;
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
    word-break:break-word;
}

.meta{
    color:#cfcfcf;
    font-size:13px;
    line-height:1.5;
    margin-bottom:12px;
    word-break:break-word;
}

.description{
    grid-column:1 / -1;
    color:#e0e0e0;
    font-size:14px;
    line-height:1.7;
    margin-top:2px;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.creator{
    grid-column:1 / -1;
    margin-top:4px;
    color:#aaa;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
}

.creator a{
    color:#6fa8dc;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.reaction-row{
    grid-column:1 / -1;
    display:flex;
    align-items:center;
    gap:16px;
    color:#aaa;
    font-size:14px;
    flex-wrap:wrap;
    margin-top:12px;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#aaa;
    padding:0;
    font-size:21px;
    cursor:pointer;
}

.like-btn:hover,
.like-btn.liked{
    color:white;
}

.like-count,
.comment-count{
    font-size:14px;
    color:#aaa;
}

.album-analysis{
    min-width:0;
    margin-top:16px;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px;
    padding:14px;
}

.meter{
    display:grid;
    grid-template-columns:96px minmax(0,1fr) 96px;
    align-items:center;
    gap:14px;
    margin-bottom:27px;
    min-width:0;
}

.meter-label{
    font-size:15px;
    font-weight:800;
    color:#f0f0f0;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:38px;
    height:38px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.25);
    background:#080808;
    flex-shrink:0;
}

.connector{
    height:3px;
    background:rgba(255,255,255,0.23);
    flex:1;
    min-width:0;
}

.dot.active,
.connector.active{
    background:#6fa8dc;
    border-color:#6fa8dc;
    box-shadow:0 0 22px rgba(111,168,220,0.22);
}

.keyword-box{
    margin-top:4px;
    border:1px solid rgba(255,255,255,0.16);
    padding:18px 22px;
    display:grid;
    grid-template-columns:150px 1fr;
    gap:18px;
    align-items:start;
}

.keyword-title{
    color:#6fa8dc;
    font-size:21px;
    font-weight:800;
}

.keyword-text{
    color:#ddd;
    font-size:18px;
    line-height:1.65;
    word-break:break-word;
}

.empty{
    color:#777;
    font-size:28px;
}

/* ===== PCサイドバー ===== */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
    font-size:15px;
}

.sidebar a:hover{
    background:#1a1a1a;
}

.sidebar a.active{
    background:#1a1a1a;
    color:#6fa8dc;
}

/* ===== スマホ下部タブバー ===== */
.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#999;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:#6fa8dc;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:#84b7e4;
}

@media(max-width:1200px){

    <h1 class="page-title">Album Collection</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        
    </div>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    getDoc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const albumGrid = document.getElementById("albumGrid");
const mypageBtn = document.getElementById("mypageBtn");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");
const mobileMyPageAvatar = document.getElementById("mobileMyPageAvatar");
const mobileMyPageFallback = document.getElementById("mobileMyPageFallback");

let currentUser = null;
let allLikes = [];
let allComments = [];

onAuthStateChanged(auth, (user) => {
    updateMobileMyPageTab(user);
    currentUser = user;

    if(mypageBtn){
        if (user) {
            mypageBtn.style.display = "inline-block";
            mypageBtn.onclick = () => {
                location.href = `profile.html?uid=${user.uid}`;
            };
        } else {
            mypageBtn.style.display = "none";
        }
    }

    const url = user ? `profile.html?uid=${encodeURIComponent(user.uid)}` : "login.html";

    if(myPageLink){
        myPageLink.href = url;
    }

    if(mobileMyPageLink){
        mobileMyPageLink.href = url;
    }

    updateLikeDisplays();
    updateCommentDisplays();
});


function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink){
        return;
    }

    if(!user){
        mobileMyPageLink.href = "login.html";

        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }

        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }

        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if(!userSnap.exists()){
            return;
        }

        const iconUrl = getUserIconUrl(userSnap.data());

        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";
            mobileMyPageFallback.style.display = "none";

            mobileMyPageAvatar.onerror = () => {
                mobileMyPageAvatar.style.display = "none";
                mobileMyPageFallback.style.display = "flex";
            };
        }
    }catch(error){
        console.warn("マイページアイコンの取得に失敗しました", error);
    }
}

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    updateLikeDisplays();
});

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = count;
        button.textContent = liked ? "♥" : "♡";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

onSnapshot(collection(db, "comments"), (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    updateCommentDisplays();
});

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");

    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}

const q = query(
    collection(db, "albums"),
    where("isPublic", "==", true)
);

onSnapshot(q, (snapshot)=>{

    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML =
            `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((docSnap)=>{

        const a = docSnap.data();
        const albumId = docSnap.id;

        albumGrid.innerHTML += `
<div class="album-card"
     onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">

    <div class="album-main">
        <img class="cover"
             src="${escapeHTML(a.cover || '')}"
             alt="">

        <div class="album-text">
            <div class="title">${escapeHTML(a.title || '')}</div>
            <div class="artist">${escapeHTML(a.artist || '')}</div>
            <div class="meta">
                ${escapeHTML([a.year, a.country, a.genre].filter(Boolean).join(' / ') || a.year || '')}
            </div>
        </div>

        <div class="description">
            ${escapeHTML(a.desc || '')}
        </div>

        <div class="creator">
            投稿者：
            <a href="profile.html?uid=${escapeHTML(a.userId || '')}"
               onclick="event.stopPropagation();">
                ${escapeHTML(a.userName || a.userEmail || '匿名ユーザー')}
            </a>
        </div>

        <div class="reaction-row">
            <div class="like-area"
                 data-like-area
                 data-album-id="${escapeHTML(albumId)}">
                <button class="like-btn"
                        onclick="event.stopPropagation(); toggleLike('${escapeHTML(albumId)}')">
                    ♡
                </button>
                <span class="like-count">0</span>
            </div>

            <div class="comment-count"
                 data-comment-count
                 data-album-id="${escapeHTML(albumId)}">
                コメント 0件
            </div>
        </div>
    </div>

    <div class="album-analysis">
        ${meter("暗い", "明るい", a.darkness)}
        ${meter("静か", "激しい", a.intense)}
        ${meter("シンプル", "複雑", a.complex)}
        ${meter("絶望", "希望", a.hope)}
        ${meter("個人", "世界", a.world)}

        <div class="keyword-box">
            <div class="keyword-title">キーワード</div>
            <div class="keyword-text">
                ${escapeHTML(a.keywords || '')}
            </div>
        </div>
    </div>

</div>
        `;
    });

    updateLikeDisplays();
    updateCommentDisplays();

}, (error) => {
    albumGrid.innerHTML =
        `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`;
});

</script>
