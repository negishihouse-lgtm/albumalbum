<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>

<style>
/* ============================================================
   Album Collection index.html
   CSS整理・安定版
   - PC版：2列カード / 左に投稿情報 / 右にメーター
   - スマホ版：1列表示 / カード内部はPC版に近い横型
   - メーター色：Pale Ice
   - 追加styleの多重上書きなし
============================================================ */

:root{
    --bg:#050505;
    --panel:#080909;
    --panel-2:#0b0d0e;
    --border:rgba(255,255,255,0.15);
    --border-soft:rgba(255,255,255,0.10);

    --text:#ffffff;
    --text-soft:#dce3e6;
    --muted:#aab3b8;

    --accent:#9fcdd9;
    --accent-hover:#b7dfe7;

    --pale-1:#7faebb;
    --pale-2:#9bc7d0;
    --pale-3:#b9dde3;
    --pale-4:#d7edf0;
    --pale-5:#edf8f9;

    --meter-off:#48555b;
    --meter-line-off:#333d42;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    padding:38px 30px 120px 252px;
}

a{
    color:inherit;
}

/* ===== Header ===== */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
}

.page-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-0.045em;
}

/* ===== Layout ===== */

.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1230px;
    margin:0;
}

.album-card{
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    overflow:hidden;
    display:grid;
    grid-template-columns:200px minmax(0, 1fr);
    gap:20px;
    align-items:stretch;
    box-shadow:none;
}

.album-card:hover{
    border-color:rgba(159,205,217,0.42);
    transform:translateY(-1px);
    transition:0.18s ease;
}

/* ===== Left side ===== */

.album-main{
    min-width:0;
    display:block;
}

.cover{
    width:160px;
    height:160px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:4px;
    margin:0 0 12px 0;
}

.album-text{
    min-width:0;
}

.title{
    font-size:25px;
    font-weight:900;
    line-height:1.06;
    letter-spacing:-0.045em;
    margin-bottom:5px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:var(--accent);
    font-size:15px;
    font-weight:800;
    line-height:1.25;
    margin-bottom:6px;
    word-break:break-word;
}

.meta{
    color:#c5cbd0;
    font-size:11px;
    line-height:1.35;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.description{
    color:var(--text-soft);
    font-size:11.5px;
    line-height:1.58;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.creator{
    color:var(--muted);
    font-size:11.5px;
    line-height:1.45;
    margin-bottom:7px;
    word-break:break-word;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}


.creator-highlight{
    margin-bottom:10px;
}

.creator-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:0;
    border:none;
    border-radius:0;
    background:transparent;
    text-decoration:none;
    max-width:100%;
}

.creator-link:hover{
    background:transparent;
    text-decoration:none !important;
}

.creator-avatar,
.creator-avatar-fallback{
    width:30px;
    height:30px;
    border-radius:50%;
    flex:0 0 30px;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.12);
}

.creator-avatar{
    display:block;
    object-fit:cover;
}

.creator-avatar-fallback{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#edf8f9;
    font-size:13px;
    font-weight:700;
    letter-spacing:-0.03em;
}

.creator-text{
    display:inline-flex;
    align-items:baseline;
    gap:2px;
    min-width:0;
    max-width:100%;
}

.creator-prefix{
    color:#aab3b8;
    font-size:12px;
    font-weight:500;
    line-height:1.1;
    white-space:nowrap;
}

.creator-name{
    color:#ffffff;
    font-size:14px;
    font-weight:650;
    line-height:1.1;
    letter-spacing:-0.02em;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:10px;
    color:#b6c0c4;
    font-size:11.5px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#b6c0c4;
    padding:0;
    font-size:16px;
    cursor:pointer;
    line-height:1;
}

.like-btn:hover,
.like-btn.liked{
    color:white;
}

.like-count,
.comment-count{
    font-size:11.5px;
    color:#b6c0c4;
}



/* ===== Share button / Share sheet ===== */
.share-area{
    position:relative;
    display:flex;
    align-items:center;
}

.share-btn{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    background:rgba(255,255,255,0.055);
    color:#dbe4e7;
    font-family:inherit;
    font-size:11.5px;
    font-weight:700;
    line-height:1;
    border-radius:999px;
    padding:7px 10px;
    cursor:pointer;
}

.share-btn:hover{
    background:rgba(159,205,217,0.16);
    color:#ffffff;
}

.share-sheet{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background:rgba(0,0,0,0.58);
    z-index:20000;
    padding:18px;
}

.share-sheet.open{
    display:flex;
}

.share-panel{
    width:min(420px,100%);
    background:#0b0d0e;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:22px;
    padding:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.55);
}

.share-panel-title{
    font-size:16px;
    font-weight:900;
    margin-bottom:4px;
}

.share-panel-subtitle{
    color:#aab3b8;
    font-size:12px;
    line-height:1.45;
    margin-bottom:14px;
}

.share-actions{
    display:grid;
    gap:8px;
}

.share-action-btn{
    appearance:none;
    -webkit-appearance:none;
    width:100%;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.045);
    color:white;
    font-family:inherit;
    font-size:14px;
    font-weight:800;
    text-align:left;
    border-radius:14px;
    padding:13px 14px;
    cursor:pointer;
}

.share-action-btn:hover{
    border-color:rgba(159,205,217,0.42);
    background:rgba(159,205,217,0.10);
}

.share-close-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:transparent;
    color:#aab3b8;
    font-family:inherit;
    font-size:13px;
    font-weight:800;
    padding:12px;
    cursor:pointer;
}

.share-toast{
    position:fixed;
    left:50%;
    bottom:92px;
    transform:translateX(-50%) translateY(10px);
    background:#edf8f9;
    color:#050505;
    border-radius:999px;
    padding:10px 15px;
    font-size:13px;
    font-weight:900;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
    z-index:21000;
}

.share-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}


/* ===== Right side: meter panel ===== */

.album-analysis{
    min-width:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;

    border:1px solid rgba(255,255,255,0.13);
    border-radius:14px;
    padding:17px 14px 14px;
    background:#070808;
}

.meter-list{
    display:block;
}

.meter{
    display:grid;
    grid-template-columns:52px minmax(0,1fr) 58px;
    align-items:center;
    gap:10px;
    margin-bottom:26px;
    min-width:0;
    width:100%;
}

.meter:last-of-type{
    margin-bottom:0;
}

.meter-label{
    color:#f3f7f8;
    font-size:13px;
    font-weight:800;
    line-height:1;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid var(--meter-off);
    background:transparent;
    flex:0 0 16px;
}

.connector{
    height:1px;
    background:var(--meter-line-off);
    flex:1;
    min-width:8px;
}

/* Pale Ice gradient */
.dot.active.level-1,
.connector.active.level-1{
    background:var(--pale-1);
    border-color:var(--pale-1);
}

.dot.active.level-2,
.connector.active.level-2{
    background:var(--pale-2);
    border-color:var(--pale-2);
}

.dot.active.level-3,
.connector.active.level-3{
    background:var(--pale-3);
    border-color:var(--pale-3);
}

.dot.active.level-4,
.connector.active.level-4{
    background:var(--pale-4);
    border-color:var(--pale-4);
}

.dot.active.level-5,
.connector.active.level-5{
    background:var(--pale-5);
    border-color:var(--pale-5);
}

.dot.active{
    box-shadow:0 0 16px rgba(159,205,217,0.14);
}

.keyword-box{
    margin-top:14px;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:9px 10px;

    display:grid;
    grid-template-columns:62px minmax(0,1fr);
    gap:10px;
    align-items:start;
}

.keyword-title{
    color:var(--accent);
    font-size:11px;
    font-weight:800;
}

.keyword-text{
    color:#dde6e8;
    font-size:10.5px;
    line-height:1.5;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.keyword-tags{
    min-width:0;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    max-height:42px;
    overflow:hidden;
}

.keyword-tag{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    max-width:100%;
    color:#dde6e8;
    font-size:10.5px;
    line-height:1;
    text-decoration:none;
    word-break:break-word;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    padding:5px 8px;
    background:rgba(255,255,255,0.025);
}

.keyword-tag:hover{
    border-color:rgba(159,205,217,0.48);
    color:white;
}

/* ===== Empty ===== */

.empty{
    color:#888;
    font-size:24px;
}

/* ===== PC Sidebar ===== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:220px;
    height:100vh;
    background:#060708;
    border-right:1px solid rgba(255,255,255,0.08);
    padding:28px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.04;
    margin-bottom:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:12px;
    font-size:15px;
}

.sidebar a:hover{
    background:#141617;
}

.sidebar a.active{
    background:#17191a;
    color:var(--accent);
}


/* ===== Mobile Feed Tabs ===== */

.mobile-feed-tabs{
    display:none;
}

.feed-tab{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    background:transparent;
    color:#7b858b;
    font:inherit;
    cursor:pointer;
}

@media(max-width:900px){
    .mobile-feed-tabs{
        display:grid;
        grid-template-columns:1fr 1fr;
        position:sticky;
        top:0;
        z-index:900;
        margin:-16px -16px 16px;
        padding-top:env(safe-area-inset-top);
        background:rgba(5,5,5,0.96);
        border-bottom:1px solid rgba(255,255,255,0.10);
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
    }

    .feed-tab{
        position:relative;
        height:54px;
        color:#7d858b;
        font-size:16px;
        font-weight:900;
        letter-spacing:-0.02em;
    }

    .feed-tab.active{
        color:#ffffff;
    }

    .feed-tab.active::after{
        content:"";
        position:absolute;
        left:50%;
        bottom:0;
        width:72px;
        height:4px;
        transform:translateX(-50%);
        border-radius:999px;
        background:#1d9bf0;
    }
}

/* ===== Mobile Tabbar ===== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:white;
    font-weight:700;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== Floating Post Button ===== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:var(--accent-hover);
}

/* ===== PC narrow ===== */

@media(min-width:901px) and (max-width:1280px){
    body{
        padding-left:236px;
        padding-right:20px;
    }

    .sidebar{
        width:210px;
    }

    .album-grid{
        max-width:none;
        width:100%;
    }

    .album-card{
        grid-template-columns:180px minmax(0,1fr);
        gap:16px;
        padding:16px;
    }

    .cover{
        width:150px;
        height:150px;
    }

    .title{
        font-size:22px;
    }

    .meter{
        grid-template-columns:48px minmax(0,1fr) 54px;
        gap:8px;
        margin-bottom:22px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:14px;
        height:14px;
        flex-basis:14px;
    }
}

/* ===== Smartphone ===== */

@media(max-width:900px){
    .creator-highlight{
        margin-bottom:8px !important;
    }

    .creator-link{
        gap:6px !important;
        padding:0 !important;
        border:none !important;
        border-radius:0 !important;
        background:transparent !important;
    }

    .creator-text{
        gap:2px !important;
        min-width:0 !important;
    }

    .creator-avatar,
    .creator-avatar-fallback{
        width:28px !important;
        height:28px !important;
        flex-basis:28px !important;
        font-size:13px !important;
    }

    .creator-prefix{
        font-size:12px !important;
        font-weight:500 !important;
    }

    .creator-name{
        font-size:15px !important;
        font-weight:650 !important;
    }
}

@media(max-width:900px){
    body{
        padding:16px;
        padding-left:16px;
        padding-bottom:110px;
    }

    .sidebar{
        display:none;
    }

    .topbar{
        margin-bottom:18px;
    }

    .page-title{
        font-size:30px;
    }

    .album-grid{
        grid-template-columns:1fr;
        gap:14px;
        width:100%;
        max-width:none;
        margin:0;
    }

    /*
      スマホは投稿自体は縦一列。
      カード内部はPC版に近く、左：投稿情報 / 右：メーター。
    */
    .album-card{
        grid-template-columns:minmax(0,0.94fr) minmax(0,1.06fr);
        gap:10px;
        align-items:stretch;
        padding:12px;
        border-radius:16px;
    }

    .album-main{
        display:grid;
        grid-template-columns:92px minmax(0,1fr);
        gap:9px;
        align-content:start;
        min-width:0;
    }

    .cover{
        width:92px;
        height:auto;
        border-radius:8px;
        margin:0;
    }

    .album-text{
        min-width:0;
    }

    .title{
        font-size:16px;
        line-height:1.12;
        margin-bottom:4px;
        -webkit-line-clamp:2;
    }

    .artist{
        font-size:13px;
        margin-bottom:3px;
    }

    .meta{
        font-size:10px;
        line-height:1.35;
        margin-bottom:5px;
    }

    .description{
        grid-column:1 / -1;
        font-size:11px;
        line-height:1.55;
        margin-top:0;
        margin-bottom:7px;
        -webkit-line-clamp:4;
    }

    .creator{
        grid-column:1 / -1;
        font-size:11px;
        margin-top:0;
        margin-bottom:5px;
    }

    .reaction-row{
        grid-column:1 / -1;
        gap:9px;
        font-size:11px;
        margin-top:5px;
    }

    .like-btn{
        font-size:16px;
    }

    .like-count,
    .comment-count{
        font-size:11px;
    }

    .album-analysis{
        height:100%;
        margin-top:0;
        padding:9px 9px 8px;
        border-radius:12px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        min-width:0;
    }

    .meter{
        grid-template-columns:32px minmax(0,1fr) 32px;
        gap:5px;
        margin-bottom:15px;
    }

    .meter:last-of-type{
        margin-bottom:0;
    }

    .meter-label{
        font-size:8px;
        font-weight:800;
    }

    .dot{
        width:10px;
        height:10px;
        border-width:1.4px;
        flex-basis:10px;
    }

    .connector{
        height:1px;
        min-width:4px;
    }

    .keyword-box{
        margin-top:10px;
        padding:7px;
        border-radius:8px;
        grid-template-columns:48px minmax(0,1fr);
        gap:6px;
    }

    .keyword-title{
        font-size:8px;
    }

    .keyword-text{
        font-size:8px;
        line-height:1.4;
    }

    .mobile-tabbar{
        display:grid;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        grid-template-columns:repeat(5,1fr);
        z-index:9999;
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
        padding-bottom:env(safe-area-inset-bottom);
    }

    .mobile-tabbar a{
        height:72px;
    }

    .fab,
    .floating-post-btn,
    .post-fab{
        display:none !important;
    }
}

/* ===== Narrow smartphone ===== */

@media(max-width:430px){
    .album-card{
        grid-template-columns:minmax(0,0.92fr) minmax(0,1.08fr);
        gap:8px;
        padding:10px;
    }

    .album-main{
        grid-template-columns:78px minmax(0,1fr);
        gap:8px;
    }

    .cover{
        width:78px;

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    onSnapshot,
    query,
    where,
    doc,
    getDoc,
    addDoc,
    setDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const feedSwipe = document.getElementById("feedSwipe");
const recommendGrid = document.getElementById("recommendGrid");
const followingGrid = document.getElementById("followingGrid");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");
const mobileMyPageAvatar = document.getElementById("mobileMyPageAvatar");
const mobileMyPageFallback = document.getElementById("mobileMyPageFallback");
const recommendTab = document.getElementById("recommendTab");
const followingTab = document.getElementById("followingTab");
const shareSheet = document.getElementById("shareSheet");
const sharePanelSubtitle = document.getElementById("sharePanelSubtitle");
const shareToast = document.getElementById("shareToast");

let currentFeedMode = "recommend";
let allAlbums = [];
let followingIds = new Set();
let unsubscribeFollowing = null;
let touchStartX = 0;
let touchStartY = 0;

let currentUser = null;
let allLikes = [];
let allComments = [];
const userProfileCache = new Map();

onAuthStateChanged(auth, (user) => {
    updateMobileMyPageTab(user);
    currentUser = user;
    setupFollowingListener(user);

    const url = user ? `profile.html?uid=${encodeURIComponent(user.uid)}` : "login.html";

    if(myPageLink){
        myPageLink.href = url;
    }

    if(mobileMyPageLink){
        mobileMyPageLink.href = url;
    }

    renderAlbums();
    updateLikeDisplays();
    updateCommentDisplays();
});
function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}


function getUserDisplayNameFromData(data){
    if(!data){
        return "";
    }

    return (
        data.displayName ||
        data.nickname ||
        data.nickName ||
        data.userName ||
        data.name ||
        ""
    );
}

async function getPosterProfileForAlbum(album){
    const uid = album?.userId || "";

    if(uid && userProfileCache.has(uid)){
        return userProfileCache.get(uid);
    }

    const fallbackProfile = {
        name: album?.userName || album?.displayName || album?.nickname || "匿名ユーザー",
        iconUrl: album?.userIconUrl || album?.userPhotoURL || album?.photoURL || album?.avatarUrl || ""
    };

    if(uid){
        try{
            const userSnap = await getDoc(doc(db, "users", uid));

            if(userSnap.exists()){
                const userData = userSnap.data();
                const profile = {
                    name: getUserDisplayNameFromData(userData) || fallbackProfile.name,
                    iconUrl: getUserIconUrl(userData) || fallbackProfile.iconUrl
                };

                userProfileCache.set(uid, profile);
                return profile;
            }
        }catch(error){
            console.warn("投稿者プロフィールの取得に失敗しました", error);
        }
    }

    if(uid){
        userProfileCache.set(uid, fallbackProfile);
    }

    return fallbackProfile;
}

function getInitialLetter(name){
    const text = String(name || "匿名ユーザー").trim();

    if(!text){
        return "匿";
    }

    return Array.from(text)[0];
}

function creatorAvatarHTML(profile){
    const iconUrl = profile?.iconUrl || "";
    const initialLetter = getInitialLetter(profile?.name);

    if(iconUrl){
        return `<img class="creator-avatar" src="${escapeHTML(iconUrl)}" alt="${escapeHTML(initialLetter)}">`;
    }

    return `<span class="creator-avatar-fallback">${escapeHTML(initialLetter)}</span>`;
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink){
        return;
    }

    if(!user){
        mobileMyPageLink.href = "login.html";

        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }

        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }

        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if(!userSnap.exists()){
            return;
        }

        const iconUrl = getUserIconUrl(userSnap.data());

        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}


function getAlbumItemById(albumId){
    return allAlbums.find(item => item.id === albumId) || null;
}

function getShareUrl(albumId){
    const url = new URL("detail.html", location.href);
    url.searchParams.set("id", albumId);
    return url.href;
}

function getShareText(albumId){
    const item = getAlbumItemById(albumId);
    const album = item?.data || {};
    const title = album.title || "Album Collectionの投稿";
    const artist = album.artist ? ` / ${album.artist}` : "";
    return `${title}${artist}`;
}

function getSpotifyUrlForAlbum(album){
    const directUrl =
        album?.spotifyUrl ||
        album?.spotifyURL ||
        album?.spotifyLink ||
        album?.spotifyTrackUrl ||
        album?.spotifyTrackURL ||
        album?.trackUrl ||
        album?.trackURL ||
        album?.musicUrl ||
        album?.musicURL ||
        "";

    if(directUrl){
        return directUrl;
    }

    const queryText = [album?.title, album?.artist]
        .filter(Boolean)
        .join(" ");

    if(!queryText){
        return "https://open.spotify.com/search";
    }

    return `https://open.spotify.com/search/${encodeURIComponent(queryText)}`;
}

function openSpotifyTrack(albumId){

function loadImageForCanvas(src){
    return new Promise((resolve) => {
        if(!src){
            resolve(null);
            return;
        }

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
    });
}

function roundRect(ctx, x, y, width, height, radius){
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + width, y, x + width, y + height, r);
    ctx.arcTo(x + width, y + height, x, y + height, r);
    ctx.arcTo(x, y + height, x, y, r);
    ctx.arcTo(x, y, x + width, y, r);
    ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
    const chars = Array.from(String(text || ""));
    let line = "";
    let lines = [];

    for(const char of chars){
        const testLine = line + char;
        if(ctx.measureText(testLine).width > maxWidth && line){
            lines.push(line);
            line = char;
        }else{
            line = testLine;
        }
    }

    if(line){
        lines.push(line);
    }

    lines = lines.slice(0, maxLines);

    lines.forEach((lineText, index) => {
        const isLast = index === maxLines - 1 && lines.length === maxLines;
        let output = lineText;

        if(isLast && ctx.measureText(output).width > maxWidth){
            while(output.length > 0 && ctx.measureText(output + "…").width > maxWidth){
                output = output.slice(0, -1);
            }
            output += "…";
        }

        ctx.fillText(output, x, y + (index * lineHeight));
    });
}

function canvasToBlob(canvas){
    return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), "image/png", 0.95);
    });
}

async function generateInstagramStoryImage(){
    if(!selectedShareAlbumId){
        return;
    }

    const item = getAlbumItemById(selectedShareAlbumId);
    if(!item){
        showShareToast("投稿データを取得できませんでした");
        return;
    }

    const album = item.data || {};
    const posterProfile = await getPosterProfileForAlbum(album);
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1920;

    const ctx = canvas.getContext("2d");

    function fillRoundRect(x, y, width, height, radius, color){
        ctx.save();
        roundRect(ctx, x, y, width, height, radius);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
    }

    function strokeRoundRect(x, y, width, height, radius, color, lineWidth = 1){
        ctx.save();
        roundRect(ctx, x, y, width, height, radius);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
        ctx.restore();
    }

    function splitWrappedLines(textValue, maxWidth, maxLines){
        const chars = Array.from(String(textValue || ""));
        let line = "";
        let lines = [];

        for(const char of chars){
            const testLine = line + char;
            if(ctx.measureText(testLine).width > maxWidth && line){
                lines.push(line);
                line = char;
            }else{
                line = testLine;
            }
        }

        if(line){
            lines.push(line);
        }

        if(lines.length > maxLines){
            lines = lines.slice(0, maxLines);
            let lastLine = lines[maxLines - 1];
            while(lastLine.length > 0 && ctx.measureText(lastLine + "…").width > maxWidth){
                lastLine = lastLine.slice(0, -1);
            }
            lines[maxLines - 1] = lastLine + "…";
        }

        return lines;
    }

    function drawCenteredWrappedText(textValue, centerX, topY, maxWidth, lineHeight, maxLines){
        const lines = splitWrappedLines(textValue, maxWidth, maxLines);
        lines.forEach((lineText, index) => {
            const width = ctx.measureText(lineText).width;
            ctx.fillText(lineText, centerX - (width / 2), topY + (index * lineHeight));
        });
        return lines.length;
    }

    function drawMeterRow(y, leftIcon, leftLabel, rightIcon, rightLabel, value){
        const safeValue = Math.max(1, Math.min(5, Number(value) || 3));
        const leftIconCenterX = 110;
        const leftLabelX = 144;
        const lineLeft = 272;
        const lineRight = 820;
        const rightIconCenterX = 876;
        const rightAreaRight = 980;
        const step = (lineRight - lineLeft) / 4;
        const selectedX = lineLeft + ((safeValue - 1) * step);

        ctx.save();
        ctx.fillStyle = "#f0d6a8";
        ctx.font = "700 34px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(leftIcon, leftIconCenterX, y);

        ctx.font = "700 30px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(rightIcon, rightIconCenterX, y);
        ctx.restore();

        ctx.fillStyle = "rgba(255,245,228,0.96)";
        ctx.font = "700 24px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(leftLabel, leftLabelX, y + 10);

        const rightWidth = ctx.measureText(rightLabel).width;
        ctx.fillText(rightLabel, rightAreaRight - rightWidth, y + 10);

        const lineGradient = ctx.createLinearGradient(lineLeft, y, lineRight, y);
        lineGradient.addColorStop(0, "rgba(102,136,186,0.82)");
        lineGradient.addColorStop(0.5, "rgba(205,208,215,0.74)");
        lineGradient.addColorStop(1, "rgba(246,155,107,0.90)");
        ctx.strokeStyle = lineGradient;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(lineLeft, y);
        ctx.lineTo(lineRight, y);
        ctx.stroke();

        ctx.save();
        ctx.shadowColor = "rgba(255,255,255,0.42)";
        ctx.shadowBlur = 18;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(selectedX, y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawKeywordChip(textValue, x, y){
        const label = `#${String(textValue || "").replace(/^#+/, "")}`;
        ctx.font = "600 21px -apple-system, BlinkMacSystemFont, sans-serif";
        const width = Math.ceil(ctx.measureText(label).width) + 44;
        fillRoundRect(x, y, width, 54, 27, "rgba(20,22,25,0.42)");
        strokeRoundRect(x, y, width, 54, 27, "rgba(255,255,255,0.18)", 1.6);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x + 22, y + 34);
        return width;
    }

    function getDisplayDescription(){
        return (
            album.desc ||
            album.description ||
            album.comment ||
            album.review ||
            "この音楽の魅力を、Album Collectionで記録しよう。"
        );
    }

    function getKeywordList(){
        return normalizeKeywords(album.keywords ?? []).filter(Boolean).slice(0, 4);
    }

    const coverImage = await loadImageForCanvas(album.cover || "");

    if(coverImage){
        try{
            ctx.save();
            ctx.filter = "blur(34px)";
            ctx.globalAlpha = 0.58;
            const scale = Math.max(canvas.width / coverImage.width, canvas.height / coverImage.height);
            const drawW = coverImage.width * scale;
            const drawH = coverImage.height * scale;
            const drawX = (canvas.width - drawW) / 2;
            const drawY = (canvas.height - drawH) / 2;
            ctx.drawImage(coverImage, drawX, drawY, drawW, drawH);
            ctx.restore();
        }catch(error){
            console.warn("背景画像の描画に失敗しました", error);
        }
    }

    const bgGradient = ctx.createLinearGradient(0, 0, 0, 1920);
    bgGradient.addColorStop(0, "rgba(40,30,18,0.16)");
    bgGradient.addColorStop(0.26, "rgba(15,18,24,0.30)");
    bgGradient.addColorStop(0.60, "rgba(9,12,17,0.60)");
    bgGradient.addColorStop(1, "rgba(5,7,10,0.92)");
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, 1080, 1920);

    const darkGradient = ctx.createLinearGradient(0, 220, 0, 1920);
    darkGradient.addColorStop(0, "rgba(255,255,255,0.00)");
    darkGradient.addColorStop(0.38, "rgba(8,11,16,0.24)");
    darkGradient.addColorStop(1, "rgba(5,7,10,0.72)");
    ctx.fillStyle = darkGradient;
    ctx.fillRect(0, 0, 1080, 1920);

    ctx.fillStyle = "rgba(255,255,255,0.34)";
    ctx.beginPath();
    ctx.arc(120, 84, 2.5, 0, Math.PI * 2);
    ctx.arc(212, 66, 1.8, 0, Math.PI * 2);
    ctx.arc(932, 145, 3.0, 0, Math.PI * 2);
    ctx.arc(845, 110, 2.0, 0, Math.PI * 2);
    ctx.fill();

    const coverSize = 540;
    const coverX = (1080 - coverSize) / 2;
    const coverY = 108;

    fillRoundRect(coverX - 6, coverY + 14, coverSize + 12, coverSize + 12, 36, "rgba(0,0,0,0.16)");

    ctx.save();
    roundRect(ctx, coverX, coverY, coverSize, coverSize, 34);
    ctx.clip();
    ctx.fillStyle = "rgba(255,255,255,0.94)";
    ctx.fillRect(coverX, coverY, coverSize, coverSize);

    if(coverImage){
        try{
            const sourceSize = Math.min(coverImage.width, coverImage.height);
            const sx = (coverImage.width - sourceSize) / 2;
            const sy = (coverImage.height - sourceSize) / 2;
            ctx.drawImage(coverImage, sx, sy, sourceSize, sourceSize, coverX, coverY, coverSize, coverSize);
        }catch(error){
            console.warn("ジャケット画像の描画に失敗しました", error);
            ctx.fillStyle = "#f5f1eb";
            ctx.fillRect(coverX, coverY, coverSize, coverSize);
        }
    }

    ctx.restore();
    strokeRoundRect(coverX, coverY, coverSize, coverSize, 34, "rgba(255,255,255,0.70)", 2.2);

    const centerX = 540;

    ctx.fillStyle = "#ffffff";
    ctx.font = "900 76px -apple-system, BlinkMacSystemFont, sans-serif";
    const titleTop = 760;
    const titleLineCount = drawCenteredWrappedText(album.title || "Untitled", centerX, titleTop, 770, 84, 2);

    const artistTop = titleTop + (titleLineCount * 84) + 12;
    ctx.fillStyle = "#f1d39b";
    ctx.font = "800 38px -apple-system, BlinkMacSystemFont, sans-serif";
    drawCenteredWrappedText(album.artist || "Unknown Artist", centerX, artistTop, 760, 48, 2);

    drawMeterRow(960, "☾", "暗い", "☼", "明るい", album.darkness);
    drawMeterRow(1032, "♪", "静か", "✹", "激しい", album.intense);
    drawMeterRow(1104, "◯", "シンプル", "◈", "複雑", album.complex);
    drawMeterRow(1176, "✩", "絶望", "✦", "希望", album.hope);
    drawMeterRow(1248, "◉", "個人", "◎", "世界", album.world);

    const description = getDisplayDescription();
    ctx.font = "500 25px -apple-system, BlinkMacSystemFont, sans-serif";
    const descLines = splitWrappedLines(description, 730, 4);
    const reviewBoxX = 92;
    const reviewBoxY = 1308;
    const reviewBoxW = 896;
    const reviewBoxH = Math.max(166, 62 + (descLines.length * 44));

    fillRoundRect(reviewBoxX, reviewBoxY, reviewBoxW, reviewBoxH, 32, "rgba(18,20,24,0.46)");
    strokeRoundRect(reviewBoxX, reviewBoxY, reviewBoxW, reviewBoxH, 32, "rgba(255,255,255,0.12)", 1.8);

    ctx.fillStyle = "rgba(255,255,255,0.96)";
    ctx.font = "500 25px -apple-system, BlinkMacSystemFont, sans-serif";
    descLines.forEach((lineText, index) => {
        ctx.fillText(lineText, 132, reviewBoxY + 62 + (index * 44));
    });

    const keywords = getKeywordList();
    let avatarY;

    if(keywords.length > 0){
        let chipX = 128;
        const chipY = reviewBoxY + reviewBoxH + 28;
        keywords.forEach((keyword) => {
            const width = drawKeywordChip(keyword, chipX, chipY);
            chipX += width + 16;
        });
        avatarY = chipY + 96;
    }else{
        avatarY = reviewBoxY + reviewBoxH + 38;
    }

    const avatarX = 188;
    const avatarSize = 70;
    const avatarImage = posterProfile?.iconUrl ? await loadImageForCanvas(posterProfile.iconUrl) : null;

    ctx.save();
    ctx.beginPath();
    ctx.arc(avatarX + (avatarSize / 2), avatarY + (avatarSize / 2), avatarSize / 2, 0, Math.PI * 2);
    ctx.clip();

    if(avatarImage){
        try{
            ctx.drawImage(avatarImage, avatarX, avatarY, avatarSize, avatarSize);
        }catch(error){
            console.warn("アバター描画に失敗しました", error);
            fillRoundRect(avatarX, avatarY, avatarSize, avatarSize, 35, "rgba(255,255,255,0.88)");
        }
    }else{
        fillRoundRect(avatarX, avatarY, avatarSize, avatarSize, 35, "rgba(255,255,255,0.88)");
        ctx.fillStyle = "#1d2430";
        ctx.font = "800 28px -apple-system, BlinkMacSystemFont, sans-serif";
        const initial = getInitialLetter(posterProfile?.name || "匿");
        const initialWidth = ctx.measureText(initial).width;
        ctx.fillText(initial, avatarX + (avatarSize / 2) - (initialWidth / 2), avatarY + 44);
    }

    ctx.restore();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(avatarX + (avatarSize / 2), avatarY + (avatarSize / 2), (avatarSize / 2) - 1, 0, Math.PI * 2);
    ctx.stroke();

    const displayName = posterProfile?.name || "music_lover";
    const handleBase = String(displayName)
        .trim()
        .replace(/^@+/, "")
        .replace(/\s+/g, "_")
        .replace(/[^a-zA-Z0-9_ぁ-んァ-ヶ一-龠]/g, "") || "music_lover";

    ctx.fillStyle = "rgba(255,255,255,0.98)";
    ctx.font = "500 27px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText(`by @${handleBase}`, 280, avatarY + 43);

    const logoCenterY = Math.min(avatarY + 154, 1852);
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    const logoBaseX = 340;
    [24, 52, 78, 52, 24].forEach((height, index) => {
        const x = logoBaseX + (index * 18);
        ctx.beginPath();
        ctx.moveTo(x, logoCenterY - (height / 2));
        ctx.lineTo(x, logoCenterY + (height / 2));
        ctx.stroke();
    });

    ctx.fillStyle = "rgba(255,255,255,0.98)";
    ctx.font = "500 38px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText("Album Collection", 438, logoCenterY + 8);

    const blob = await canvasToBlob(canvas);

    if(!blob){
        showShareToast("画像生成に失敗しました");
        return;
    }

    const fileName = `album-collection-story-${selectedShareAlbumId}.png`;
    const file = new File([blob], fileName, { type:"image/png" });

    if(navigator.canShare && navigator.canShare({ files:[file] }) && navigator.share){
        try{
            await navigator.share({
                files:[file],
                title:"Album Collection",
                text:"ストーリー用画像"
            });
            closeShareMenu();
            return;
        }catch(error){
            if(error?.name !== "AbortError"){
                console.warn("画像共有に失敗しました", error);
            }
        }
    }

    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = objectUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(objectUrl);

    showShareToast("ストーリー用画像を生成しました");
    closeShareMenu();
}

function formatPostDate(value){
    if(!value){
        return "";
    }

    let date = null;

    if(typeof value.toDate === "function"){
        date = value.toDate();
    } else if(value instanceof Date){
        date = value;
    } else if(typeof value === "number"){
        date = new Date(value);
    } else if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            date = parsed;
        }
    }

    if(!date || Number.isNaN(date.getTime())){
        return "";
    }

    const now = new Date();
    const diffMs = now.getTime() - date.getTime();
    const diffMinutes = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if(diffMinutes < 1){
        return "今";
    }

    if(diffMinutes < 60){
        return `${diffMinutes}分前`;
    }

    if(diffHours < 24){
        return `${diffHours}時間前`;
    }

    if(diffDays < 7){
        return `${diffDays}日前`;
    }

    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });

        await notifyLike(db, currentUser, albumId);
    }
}

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = count;
        button.textContent = liked ? "♥" : "♡";

        if(liked){
            button.classList.add("liked");

function setupFollowingListener(user){
    if(unsubscribeFollowing){
        unsubscribeFollowing();
        unsubscribeFollowing = null;
    }

    followingIds = new Set();

    if(!user){
        renderAlbums();
        return;
    }

    const followQuery = query(
        collection(db, "follows"),
        where("followerId", "==", user.uid)
    );

    unsubscribeFollowing = onSnapshot(followQuery, (snapshot) => {
        followingIds = new Set();

        snapshot.forEach((docSnap) => {
            const follow = docSnap.data();
            if(follow.followingId){
                followingIds.add(follow.followingId);
            }
        });

        renderAlbums();
    }, (error) => {
        console.warn("フォロー情報の取得に失敗しました", error);
        followingIds = new Set();
        renderAlbums();
    });
}

function normalizeKeywords(value){
    if(Array.isArray(value)){
        return value
            .map(keyword => String(keyword ?? "").trim())
            .filter(Boolean);
    }

    if(typeof value === "string"){
        return value
            .split(/[\s,、#]+/)
            .map(keyword => keyword.trim())
            .filter(Boolean);
    }

    return [];
}

function renderKeywordTags(value){
    const keywords = normalizeKeywords(value);

    if(keywords.length === 0){
        return `<span class="keyword-empty">なし</span>`;
    }

    return keywords.map((keyword) => {
        const safeKeyword = escapeHTML(keyword);
        const encodedKeyword = encodeURIComponent(keyword);

        return `
            <button
                type="button"
                class="keyword-tag"
                data-keyword="${encodedKeyword}"
            >#${safeKeyword}</button>
        `;
    }).join("");
}

document.addEventListener("click", (event) => {
    const keywordButton = event.target.closest(".keyword-tag");

    if(!keywordButton){
        return;
    }

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    const keyword = decodeURIComponent(keywordButton.dataset.keyword || "").trim();

    if(!keyword){
        return;
    }

    location.href = `./search.html?q=${encodeURIComponent(keyword)}`;
}, true);

function getSortedAlbums(){
    return [...allAlbums].sort((a, b) => {
        const aTime = getPostTime(a.data.createdAt || a.data.updatedAt);
        const bTime = getPostTime(b.data.createdAt || b.data.updatedAt);
        return bTime - aTime;
    });
}

function getRecommendAlbums(){
    return getSortedAlbums();
}

function getFollowingAlbums(){
    if(!currentUser){
        return [];
    }

    return getSortedAlbums().filter((album) => {
        const userId = album.data.userId || "";
        return userId !== currentUser.uid && followingIds.has(userId);
    });
}

function getPostTime(value){
    if(!value){ return 0; }
    if(typeof value.toDate === "function"){ return value.toDate().getTime(); }
    if(value instanceof Date){ return value.getTime(); }
    if(typeof value === "number"){ return value; }
    if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){ return parsed.getTime(); }
    }
    return 0;
}

function getFeedProgress(){
    if(!feedSwipe || window.innerWidth > 900){
        return currentFeedMode === "following" ? 1 : 0;
    }

    return Math.max(0, Math.min(1, feedSwipe.scrollLeft / Math.max(1, feedSwipe.clientWidth)));
}

function updateFeedTabs(progress = null){
    if(!recommendTab || !followingTab){
        return;
    }

    if(progress === null){
        progress = getFeedProgress();
    }

    progress = Math.max(0, Math.min(1, progress));

    const nextMode = progress >= 0.5 ? "following" : "recommend";
    currentFeedMode = nextMode;

    recommendTab.classList.toggle("active", nextMode === "recommend");
    followingTab.classList.toggle("active", nextMode === "following");

    const tabs = document.getElementById("mobileFeedTabs");

    if(tabs){
        tabs.style.setProperty("--feed-progress", progress.toFixed(4));
        tabs.style.setProperty("--recommend-tab-opacity", String(1 - (progress * 0.42)));
        tabs.style.setProperty("--following-tab-opacity", String(0.58 + (progress * 0.42)));
    }

    const recommendPanel = document.querySelector('[data-feed-panel="recommend"]');
    const followingPanel = document.querySelector('[data-feed-panel="following"]');

    if(recommendPanel){
        recommendPanel.classList.toggle("is-visible", progress < 0.5);
    }

    if(followingPanel){
        followingPanel.classList.toggle("is-visible", progress >= 0.5);
    }
}

function scrollFeedTo(mode){
    if(mode !== "recommend" && mode !== "following"){
        return;
    }

    currentFeedMode = mode;
    updateFeedTabs(mode === "following" ? 1 : 0);

    if(feedSwipe && window.innerWidth <= 900){
        feedSwipe.scrollTo({
            left: mode === "following" ? feedSwipe.clientWidth : 0,
            behavior:"smooth"
        });
    }
}

if(recommendTab){
    recommendTab.addEventListener("click", () => scrollFeedTo("recommend"));
}

if(followingTab){
    followingTab.addEventListener("click", () => scrollFeedTo("following"));
}

let feedScrollTicking = false;
let feedTouchStartX = 0;
let feedTouchStartY = 0;
let feedGestureDirection = null;
let unlockVerticalGestureTimer = null;

function lockFeedForVerticalGesture(){
    if(!feedSwipe){
        return;
    }

    feedSwipe.classList.add("vertical-gesture");
}

function unlockFeedGestureSoon(){
    if(!feedSwipe){
        return;
    }

    clearTimeout(unlockVerticalGestureTimer);

    unlockVerticalGestureTimer = setTimeout(() => {
        feedSwipe.classList.remove("vertical-gesture");
        feedGestureDirection = null;
    }, 180);
}

if(feedSwipe){
    feedSwipe.addEventListener("touchstart", (event) => {
        if(window.innerWidth > 900 || !event.touches || event.touches.length !== 1){
            return;
        }

        clearTimeout(unlockVerticalGestureTimer);
        feedSwipe.classList.remove("vertical-gesture");

        feedTouchStartX = event.touches[0].clientX;
        feedTouchStartY = event.touches[0].clientY;
        feedGestureDirection = null;
    }, { passive:true });

    feedSwipe.addEventListener("touchmove", (event) => {
        if(window.innerWidth > 900 || !event.touches || event.touches.length !== 1){
            return;
        }

        const dx = event.touches[0].clientX - feedTouchStartX;
        const dy = event.touches[0].clientY - feedTouchStartY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        if(!feedGestureDirection && Math.max(absX, absY) > 8){
            feedGestureDirection = absY > absX + 6 ? "vertical" : "horizontal";

            if(feedGestureDirection === "vertical"){
                lockFeedForVerticalGesture();
            }
        }
    }, { passive:true });

    feedSwipe.addEventListener("touchend", unlockFeedGestureSoon, { passive:true });
    feedSwipe.addEventListener("touchcancel", unlockFeedGestureSoon, { passive:true });

    feedSwipe.addEventListener("scroll", () => {
        if(window.innerWidth > 900){
            return;
        }

        if(feedScrollTicking){
            return;
        }

        feedScrollTicking = true;

        requestAnimationFrame(() => {
            updateFeedTabs(getFeedProgress());
            feedScrollTicking = false;
        });
    }, { passive:true });
}

window.addEventListener("resize", () => {
    updateFeedTabs();
});

async function renderGrid(targetGrid, items, emptyHTML){
    if(!targetGrid){ return; }
    if(items.length === 0){ targetGrid.innerHTML = emptyHTML; return; }
    const cards = [];
    for(const item of items){
        const posterProfile = await getPosterProfileForAlbum(item.data);
        cards.push(albumCardHTML(item, posterProfile));
    }
    targetGrid.innerHTML = cards.join("");
}

async function renderAlbums(){
    updateFeedTabs();
    await renderGrid(recommendGrid, getRecommendAlbums(), `<div class="empty">保存されたアルバムがありません</div>`);
    await renderGrid(followingGrid, getFollowingAlbums(), currentUser ? `<div class="empty">フォロー中の投稿がまだありません</div>` : `<div class="empty">ログインするとフォロー中TLを表示できます</div>`);
    updateLikeDisplays();
    updateCommentDisplays();
}

onSnapshot(q, async (snapshot)=>{
    allAlbums = [];
    snapshot.forEach((docSnap) => {
        allAlbums.push({ id: docSnap.id, data: docSnap.data() });
    });
    await renderAlbums();
}, (error) => {
    if(recommendGrid){ recommendGrid.innerHTML = `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`; }
    if(followingGrid){ followingGrid.innerHTML = `<div class="empty">読み込みエラー：${escapeHTML(error.message)}</div>`; }
});

</script>

<!-- 初回チュートリアル -->
<div class="tutorial-overlay" id="tutorialOverlay">
    <div class="tutorial-card">
        <button class="tutorial-close" type="button" onclick="closeTutorial(true)">×</button>

        <div class="tutorial-icon" id="tutorialIcon">🎧</div>

        <div class="tutorial-title" id="tutorialTitle">
            ようこそ Album Collection（仮）へ
        </div>

        <div class="tutorial-text" id="tutorialText">
            Album Collection（仮）は、聴いた音楽を記録して、感想や気分を共有できるサービスです。
        </div>

        <div class="tutorial-dots" id="tutorialDots"></div>

        <div class="tutorial-actions">
            <button class="tutorial-btn back" type="button" id="tutorialBackBtn" onclick="prevTutorialSlide()">
                戻る
            </button>

            <button class="tutorial-btn next" type="button" id="tutorialNextBtn" onclick="nextTutorialSlide()">
                次へ
            </button>
        </div>
    </div>
</div>

<script>
const tutorialSlides = [
    {
        icon:"🎧",
        title:"ようこそ Album Collection（仮）へ",
        text:"Album Collection（仮）は、聴いた音楽を記録して、感想や気分を共有できるサービスです。"
    },
    {
        icon:"🏠",
        title:"投稿を見てみよう",
        text:"ホームでは、みんなの音楽投稿が流れてきます。気になる投稿を押すと、詳しい感想を見られます。"
    },
    {
        icon:"🔍",
        title:"検索して探そう",
        text:"曲名・アーティスト名・キーワードから投稿を探せます。"
    },
    {
        icon:"✍️",
        title:"自分でも投稿しよう",
        text:"好きな音楽について、感想・気分メーター・キーワードをつけて記録できます。"
    },
    {
        icon:"👤",
        title:"マイページを育てよう",
        text:"自分の投稿を一覧で見たり、気になる人をフォローできます。"
    }
];

let tutorialIndex = 0;

function renderTutorial(){
    const slide = tutorialSlides[tutorialIndex];

    const iconEl = document.getElementById("tutorialIcon");
    const titleEl = document.getElementById("tutorialTitle");
    const textEl = document.getElementById("tutorialText");
    const dotsEl = document.getElementById("tutorialDots");
    const backBtn = document.getElementById("tutorialBackBtn");
    const nextBtn = document.getElementById("tutorialNextBtn");

    if(!iconEl || !titleEl || !textEl || !dotsEl || !backBtn || !nextBtn){
        return;
    }

    iconEl.textContent = slide.icon;
    titleEl.textContent = slide.title;
    textEl.textContent = slide.text;

    dotsEl.innerHTML = "";

    tutorialSlides.forEach((_, index) => {
        const dot = document.createElement("div");
        dot.className = "tutorial-dot" + (index === tutorialIndex ? " active" : "");
        dotsEl.appendChild(dot);
    });

    backBtn.style.visibility = tutorialIndex === 0 ? "hidden" : "visible";
    nextBtn.textContent = tutorialIndex === tutorialSlides.length - 1 ? "はじめる" : "次へ";
}

function openTutorial(){
    const overlay = document.getElementById("tutorialOverlay");

    if(!overlay){
        return;
    }

    tutorialIndex = 0;
    renderTutorial();
    overlay.classList.add("is-active");
}

function closeTutorial(saveSeen = false){
    const overlay = document.getElementById("tutorialOverlay");

    if(overlay){
        overlay.classList.remove("is-active");
    }

    if(saveSeen){
        localStorage.setItem("albumCollectionTutorialSeen", "true");
    }
}

function nextTutorialSlide(){
    if(tutorialIndex < tutorialSlides.length - 1){
        tutorialIndex++;
        renderTutorial();
    }else{
        closeTutorial(true);
    }
}

function prevTutorialSlide(){
    if(tutorialIndex > 0){
        tutorialIndex--;
        renderTutorial();
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const seen = localStorage.getItem("albumCollectionTutorialSeen");

    if(!seen){
        openTutorial();
    }
});
</script>

   - 変な尻尾つきCSS吹き出しをやめて、細いSVG吹き出しに変更
   - 背景の丸カプセル感を弱めて、いいね・共有と並べても自然にする
============================================================ */
.comment-icon-wrap{
    background:transparent !important;
    border:none !important;
    color:#b6c0c4 !important;
    width:auto !important;
    min-width:auto !important;
    height:28px !important;
    min-height:28px !important;
    padding:0 !important;
    gap:4px !important;
    border-radius:0 !important;
}

.comment-icon-wrap:hover{
    color:#ffffff !important;
    background:transparent !important;
}

.comment-icon-clean{
    width:19px !important;
    height:19px !important;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    flex:0 0 19px !important;
    color:inherit !important;
}

.comment-icon-clean svg{
    width:19px !important;
    height:19px !important;
    display:block !important;
}

.comment-count-number{
    color:inherit !important;
    font-size:12px !important;
    font-weight:700 !important;
    line-height:1 !important;
}

@media(max-width:900px){
    .comment-icon-wrap{
        height:24px !important;
        min-height:24px !important;
        background:transparent !important;
        padding:0 !important;
        gap:4px !important;
    }

    .comment-icon-clean,
    .comment-icon-clean svg{
        width:18px !important;
        height:18px !important;
    }

    .comment-count-number{
        font-size:12px !important;
    }
}
</style>
