<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album Editor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* =====================
   PC Sidebar
===================== */

.sidebar{
    width:300px;
    background:#111;
    border-right:1px solid rgba(255,255,255,0.08);
    min-height:100vh;
    position:sticky;
    top:0;
}

.sidebar-header{
    padding:25px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.sidebar-title{
    font-size:26px;
    font-weight:700;
}

.login-status-sidebar{
    color:#aaa;
    font-size:14px;
    margin-top:10px;
    line-height:1.6;
    word-break:break-word;
}

.side-menu{
    padding:15px;
}

.side-menu button{
    width:100%;
    padding:13px;
    margin-bottom:10px;
    border:none;
    background:#1c1c1c;
    color:white;
    cursor:pointer;
    font-size:15px;
    text-align:left;
    border-radius:10px;
}

.side-menu button:hover{
    background:#2a2a2a;
}

.side-menu .active{
    background:#6fa8dc;
}

/* =====================
   Main
===================== */

.main{
    flex:1;
    padding:40px;
}

.form-area{
    width:560px;
    max-width:100%;
    background:#151515;
    padding:30px;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
}

.page-title{
    font-size:28px;
    font-weight:800;
    margin-bottom:10px;
}

.page-subtitle{
    color:#aaa;
    font-size:14px;
    line-height:1.7;
    margin-bottom:24px;
}

.mode-badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#222;
    color:#ddd;
    font-size:13px;
    margin-bottom:18px;
}

.mode-badge.edit{
    background:#315b7a;
    color:white;
}

.section-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:18px;
}

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#aaa;
    font-size:14px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    background:#0f0f0f;
    border:1px solid #333;
    color:white;
    font-size:15px;
    border-radius:10px;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    border-color:#6fa8dc;
}

textarea{
    height:160px;
    resize:none;
    line-height:1.8;
}

.char-count{
    margin-top:6px;
    text-align:right;
    color:#888;
    font-size:13px;
}

.char-count.warning{
    color:#f5c76a;
}

.char-count.limit{
    color:#ff7777;
}

.slider-label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    color:#aaa;
    font-size:14px;
}

button{
    width:100%;
    padding:15px;
    margin-top:12px;
    border:none;
    cursor:pointer;
    color:white;
    font-size:16px;
    border-radius:12px;
}

button:disabled{
    opacity:0.45;
    cursor:not-allowed;
}

.view-btn{
    background:#6fa8dc;
}

.save-btn{
    background:#4caf50;
}

.clear-btn{
    background:#444;
}

.profile-btn{
    background:#333;
}

.login-status{
    margin:12px 0 22px;
    color:#aaa;
    font-size:14px;
    line-height:1.6;
    word-break:break-word;
}

.notice{
    color:#aaa;
    font-size:13px;
    line-height:1.7;
    margin-bottom:22px;
    padding:14px;
    background:#101010;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
}

.error-box{
    display:none;
    color:#ff9999;
    background:#241111;
    border:1px solid rgba(255,120,120,0.3);
    padding:14px;
    border-radius:12px;
    margin-bottom:18px;
    line-height:1.7;
    font-size:14px;
}

.loading-box{
    color:#aaa;
    background:#101010;
    border:1px solid rgba(255,255,255,0.08);
    padding:14px;
    border-radius:12px;
    margin-bottom:18px;
    line-height:1.7;
    font-size:14px;
}


/* =====================
   Spotify Search
===================== */

.spotify-box{
    background:#101010;
    border:1px solid rgba(111,168,220,0.28);
    border-radius:16px;
    padding:18px;
    margin-bottom:24px;
}

.spotify-search-row{
    display:flex;
    gap:10px;
    align-items:center;
}

.spotify-search-row input{
    flex:1;
}

.spotify-search-row button{
    width:120px;
    margin-top:0;
    background:#1db954;
    padding:14px;
    font-size:15px;
}

.spotify-status{
    color:#aaa;
    font-size:13px;
    line-height:1.6;
    margin-top:10px;
}

.spotify-results{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:14px;
}

.spotify-result-card{
    display:grid;
    grid-template-columns:64px 1fr 88px;
    gap:12px;
    align-items:center;
    background:#171717;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:10px;
}

.spotify-result-card img{
    width:64px;
    height:64px;
    object-fit:cover;
    border-radius:10px;
    background:#222;
}

.spotify-result-title{
    font-size:14px;
    font-weight:700;
    line-height:1.4;
    margin-bottom:4px;
}

.spotify-result-meta{
    color:#aaa;
    font-size:12px;
    line-height:1.5;
}

.spotify-select-btn{
    width:88px;
    margin-top:0;
    padding:10px;
    font-size:13px;
    background:#6fa8dc;
    border-radius:10px;
}

.spotify-selected{
    display:none;
    margin-top:12px;
    color:#9fd3ff;
    font-size:13px;
    line-height:1.6;
    background:#0d1720;
    border:1px solid rgba(111,168,220,0.25);
    border-radius:12px;
    padding:10px;
}

/* =====================
   Floating Post Button
===================== */

.floating-post-btn{
    position:fixed;
    right:28px;
    bottom:28px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:300;
    text-decoration:none;
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
    z-index:50;
}

/* =====================
   Mobile Bottom Tab
===================== */

.bottom-tab{
    display:none;
}

/* =====================
   Mobile
===================== */

@media(max-width:900px){
    body{
        padding-bottom:86px;
    }

    .wrapper{
        display:block;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:18px;
    }

    .form-area{
        width:100%;
        padding:22px;
        border-radius:16px;
    }

    .page-title{
        font-size:24px;
    }

    .floating-post-btn{
        right:18px;
        bottom:86px;
        width:54px;
        height:54px;
        font-size:32px;
    }


    .spotify-search-row{
        display:block;
    }

    .spotify-search-row button{
        width:100%;
        margin-top:10px;
    }

    .spotify-result-card{
        grid-template-columns:56px 1fr;
    }

    .spotify-result-card img{
        width:56px;
        height:56px;
    }

    .spotify-select-btn{
        grid-column:1 / -1;
        width:100%;
    }

    .bottom-tab{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:68px;
        background:#111;
        border-top:1px solid rgba(255,255,255,0.1);
        display:flex;
        justify-content:space-around;
        align-items:center;
        z-index:100;
    }

    .bottom-tab button{
        width:auto;
        flex:1;
        height:68px;
        margin:0;
        padding:6px 0;
        background:transparent;
        color:#aaa;
        border-radius:0;
        font-size:11px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:4px;
    }

    .bottom-tab button.active{
        color:#6fa8dc;
    }

    .tab-icon{
        font-size:20px;
        line-height:1;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Album Collection</div>
            <div class="login-status-sidebar" id="sidebarLoginStatus">未ログイン</div>
        </div>

        <div class="side-menu">
            <button onclick="location.href='./index.html'">ホーム</button>
            <button onclick="location.href='./search.html'">さがす</button>
            <button class="active" onclick="location.href='./editor.html'">投稿作成</button>
            <button onclick="location.href='./notifications.html'">通知</button>
            <button id="myPageBtn">マイページ</button>
            <button onclick="location.href='./profile-edit.html'">プロフィール編集</button>
            <button onclick="location.href='./login.html'">ログイン / 新規登録</button>
        </div>
    </aside>

    <main class="main">

        <div class="form-area">

            <div class="page-title" id="pageTitle">投稿作成</div>
            <div class="page-subtitle" id="pageSubtitle">
                新しいアルバム・曲のコレクションを作成します。
            </div>

            <div class="mode-badge" id="modeBadge">新規投稿モード</div>

            <div class="login-status" id="loginStatus">ログイン状態を確認中...</div>

            <div class="notice">
                過去の投稿を編集・削除する場合は、マイページから自分の投稿を開いてください。
                自分の投稿には「編集」「削除」ボタンが表示される想定です。
            </div>

            <div class="loading-box" id="loadingBox" style="display:none;">
                投稿データを読み込み中...
            </div>

            <div class="error-box" id="errorBox"></div>


            <div class="spotify-box">
                <div class="section-title">Spotify Search</div>

                <div class="input-group" style="margin-bottom:0;">
                    <label>Spotifyでアルバム検索</label>

                    <div class="spotify-search-row">
                        <input
                            id="spotifySearchInput"
                            type="text"
                            placeholder="例：RADWIMPS 君の名は"
                        >
                        <button type="button" id="spotifySearchBtn">検索</button>
                    </div>

                    <div class="spotify-status" id="spotifyStatus">
                        アルバム名やアーティスト名で検索できます。選択するとフォームに自動入力されます。
                    </div>

                    <div class="spotify-selected" id="spotifySelectedBox"></div>

                    <div class="spotify-results" id="spotifyResults"></div>
                </div>
            </div>

            <div class="section-title">Album Form</div>

            <div class="input-group">
                <label>ジャケット画像URL</label>
                <input id="coverInput" type="text" placeholder="https://...">
            </div>

            <div class="input-group">
                <label>曲名 / アルバム名</label>
                <input id="titleInput" type="text" placeholder="例：HELP EVER HURT NEVER">
            </div>

            <div class="input-group">
                <label>アーティスト名</label>
                <input id="artistInput" type="text" placeholder="例：藤井風">
            </div>

            <div class="input-group">
                <label>紹介文</label>

                <textarea
                    id="descInput"
                    maxlength="200"
                    placeholder="紹介文を200字以内で入力"
                ></textarea>

                <div class="char-count" id="descCountBox">
                    <span id="descCount">0</span> / 200
                </div>
            </div>

            <div class="input-group">
                <label>キーワード</label>
                <input id="keywordsInput" type="text" placeholder="例：都会的, 管楽器, 明るい">
            </div>

            <div class="input-group">
                <label>公開設定</label>
                <select id="isPublicInput">
                    <option value="true">公開</option>
                    <option value="false">非公開</option>
                </select>
            </div>

            <div class="input-group">
                <div class="slider-label">
                    <span>暗い</span><span>明るい</span>
                </div>
                <input id="darknessInput" type="range" min="1" max="5" value="3">
            </div>

            <div class="input-group">
                <div class="slider-label">
                    <span>静か</span><span>激しい</span>
                </div>
                <input id="intenseInput" type="range" min="1" max="5" value="3">
            </div>

            <div class="input-group">
                <div class="slider-label">
                    <span>シンプル</span><span>複雑</span>
                </div>
                <input id="complexInput" type="range" min="1" max="5" value="3">
            </div>

            <div class="input-group">
                <div class="slider-label">
                    <span>絶望</span><span>希望</span>
                </div>
                <input id="hopeInput" type="range" min="1" max="5" value="3">
            </div>

            <div class="input-group">
                <div class="slider-label">
                    <span>個人</span><span>世界</span>
                </div>
                <input id="worldInput" type="range" min="1" max="5" value="3">
            </div>

            <button class="view-btn" onclick="location.href='./index.html'">
                ホームへ
            </button>

            <button class="profile-btn" id="goMyPageBtn">
                マイページへ
            </button>

            <button class="save-btn" id="saveBtn">
                保存
            </button>

            <button class="clear-btn" id="clearBtn">
                入力欄をクリア
            </button>

        </div>

    </main>

</div>

<a class="floating-post-btn" href="./editor.html" aria-label="投稿作成">＋</a>

<nav class="bottom-tab">
    <button type="button" onclick="location.href='./index.html'">
        <span class="tab-icon">⌂</span>
        <span>ホーム</span>
    </button>

    <button type="button" onclick="location.href='./search.html'">
        <span class="tab-icon">⌕</span>
        <span>さがす</span>
    </button>

    <button type="button" class="active" onclick="location.href='./editor.html'">
        <span class="tab-icon">＋</span>
        <span>投稿</span>
    </button>

    <button type="button" onclick="location.href='./notifications.html'">
        <span class="tab-icon">♡</span>
        <span>通知</span>
    </button>

    <button type="button" id="bottomMyPageBtn">
        <span class="tab-icon">◯</span>
        <span>マイページ</span>
    </button>
</nav>

<script type="module">

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    addDoc,
    doc,
    getDoc,
    updateDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const editingIdFromUrl = params.get("id");

const pageTitle = document.getElementById("pageTitle");
const pageSubtitle = document.getElementById("pageSubtitle");
const modeBadge = document.getElementById("modeBadge");

const loginStatus = document.getElementById("loginStatus");
const sidebarLoginStatus = document.getElementById("sidebarLoginStatus");
const errorBox = document.getElementById("errorBox");
const loadingBox = document.getElementById("loadingBox");

const myPageBtn = document.getElementById("myPageBtn");
const bottomMyPageBtn = document.getElementById("bottomMyPageBtn");
const goMyPageBtn = document.getElementById("goMyPageBtn");

const coverInput = document.getElementById("coverInput");
const titleInput = document.getElementById("titleInput");
const artistInput = document.getElementById("artistInput");
const descInput = document.getElementById("descInput");
const keywordsInput = document.getElementById("keywordsInput");
const isPublicInput = document.getElementById("isPublicInput");

const darknessInput = document.getElementById("darknessInput");
const intenseInput = document.getElementById("intenseInput");
const complexInput = document.getElementById("complexInput");
const hopeInput = document.getElementById("hopeInput");
const worldInput = document.getElementById("worldInput");

const saveBtn = document.getElementById("saveBtn");
const clearBtn = document.getElementById("clearBtn");

const descCount = document.getElementById("descCount");
const descCountBox = document.getElementById("descCountBox");


const spotifySearchInput = document.getElementById("spotifySearchInput");
const spotifySearchBtn = document.getElementById("spotifySearchBtn");
const spotifyStatus = document.getElementById("spotifyStatus");
const spotifySelectedBox = document.getElementById("spotifySelectedBox");
const spotifyResults = document.getElementById("spotifyResults");

const SPOTIFY_API_BASE = "https://album-spotify-api.minanegi3710.workers.dev";

let editingId = editingIdFromUrl;
let currentLoadedAlbum = null;
let selectedSpotifyAlbum = null;
let authReady = false;

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function showError(message){
    errorBox.style.display = "block";
    errorBox.innerHTML = escapeHTML(message);
}

function clearError(){
    errorBox.style.display = "none";
    errorBox.innerHTML = "";
}

function setLoading(isLoading){
    loadingBox.style.display = isLoading ? "block" : "none";
}

function updateDescCount(){
    const length = descInput.value.length;

    descCount.textContent = length;
    descCountBox.classList.remove("warning", "limit");

    if(length >= 180 && length < 200){
        descCountBox.classList.add("warning");
    }

    if(length >= 200){
        descCountBox.classList.add("limit");
    }
}

descInput.addEventListener("input", updateDescCount);

function setPageMode(){
    if(editingId){
        pageTitle.textContent = "投稿を編集";
        pageSubtitle.textContent = "マイページから選択した投稿を編集します。";
        modeBadge.textContent = "編集モード";
        modeBadge.classList.add("edit");
        saveBtn.textContent = "更新";
    }else{
        pageTitle.textContent = "投稿作成";
        pageSubtitle.textContent = "新しいアルバム・曲のコレクションを作成します。";
        modeBadge.textContent = "新規投稿モード";
        modeBadge.classList.remove("edit");
        saveBtn.textContent = "保存";
    }
}

function getRedirectLoginUrl(){
    const currentUrl = location.pathname.split("/").pop() + location.search;
    return `./login.html?redirect=${encodeURIComponent(currentUrl)}`;
}

function goLoginWithRedirect(){
    location.href = getRedirectLoginUrl();
}

function getFormData(){
    const user = auth.currentUser;

    if(!user){
        throw new Error("ログインしてください");
    }

    const descText = descInput.value.slice(0, 200);

    return {
        userId: user.uid,
        userEmail: user.email,
        cover: coverInput.value.trim(),
        title: titleInput.value.trim(),
        artist: artistInput.value.trim(),
        desc: descText,
        keywords: keywordsInput.value.trim(),
        isPublic: isPublicInput.value === "true",
        darkness: Number(darknessInput.value),
        intense: Number(intenseInput.value),
        complex: Number(complexInput.value),
        hope: Number(hopeInput.value),
        world: Number(worldInput.value),
        spotifyId: selectedSpotifyAlbum?.spotifyId || "",
        spotifyUrl: selectedSpotifyAlbum?.spotifyUrl || "",
        spotifyUri: selectedSpotifyAlbum?.spotifyUri || "",
        spotifyReleaseDate: selectedSpotifyAlbum?.releaseDate || "",
        spotifyAlbumType: selectedSpotifyAlbum?.albumType || "",
        spotifyTotalTracks: selectedSpotifyAlbum?.totalTracks || 0,
        source: selectedSpotifyAlbum?.spotifyId ? "spotify" : "manual",
        updatedAt: serverTimestamp()
    };
}

function setFormData(album){
    coverInput.value = album.cover || "";
    titleInput.value = album.title || "";
    artistInput.value = album.artist || "";
    descInput.value = (album.desc || "").slice(0, 200);
    keywordsInput.value = album.keywords || "";
    isPublicInput.value = album.isPublic === false ? "false" : "true";

    darknessInput.value = album.darkness || 3;
    intenseInput.value = album.intense || 3;
    complexInput.value = album.complex || 3;
    hopeInput.value = album.hope || 3;
    worldInput.value = album.world || 3;

    if(album.spotifyId){
        selectedSpotifyAlbum = {
            spotifyId: album.spotifyId || "",
            spotifyUrl: album.spotifyUrl || "",
            spotifyUri: album.spotifyUri || "",
            releaseDate: album.spotifyReleaseDate || "",
            albumType: album.spotifyAlbumType || "",
            totalTracks: album.spotifyTotalTracks || 0,
            title: album.title || "",
            artist: album.artist || "",
            year: album.spotifyReleaseDate ? String(album.spotifyReleaseDate).slice(0, 4) : "",
            cover: album.cover || ""
        };
        updateSpotifySelectedBox();
    }else{
        selectedSpotifyAlbum = null;
        updateSpotifySelectedBox();
    }

    updateDescCount();
}

function clearForm(){
    if(editingId){
        const ok = confirm("編集中の内容を初期状態に戻しますか？");
        if(!ok){
            return;
        }

        if(currentLoadedAlbum){
            setFormData(currentLoadedAlbum);
        }

        return;
    }

    coverInput.value = "";
    titleInput.value = "";
    artistInput.value = "";
    descInput.value = "";
    keywordsInput.value = "";
    isPublicInput.value = "true";
    selectedSpotifyAlbum = null;
    updateSpotifySelectedBox();

    darknessInput.value = 3;
    intenseInput.value = 3;
    complexInput.value = 3;
    hopeInput.value = 3;
    worldInput.value = 3;

    updateDescCount();
}


function setSpotifyStatus(message){
    spotifyStatus.textContent = message;
}

function updateSpotifySelectedBox(){
    if(!selectedSpotifyAlbum || !selectedSpotifyAlbum.spotifyId){
        spotifySelectedBox.style.display = "none";
        spotifySelectedBox.innerHTML = "";
        return;
    }

    spotifySelectedBox.style.display = "block";
    spotifySelectedBox.innerHTML = `
        Spotify選択中：${escapeHTML(selectedSpotifyAlbum.title || titleInput.value)}
        / ${escapeHTML(selectedSpotifyAlbum.artist || artistInput.value)}
    `;
}

function renderSpotifyResults(albums){
    spotifyResults.innerHTML = "";

    if(!albums.length){
        setSpotifyStatus("検索結果が見つかりませんでした。別のキーワードで試してください。");
        return;
    }

    albums.forEach((album) => {
        const card = document.createElement("div");
        card.className = "spotify-result-card";

        const imageSrc = album.cover || "";

        card.innerHTML = `
            <img src="${escapeHTML(imageSrc)}" alt="">
            <div>
                <div class="spotify-result-title">${escapeHTML(album.title)}</div>
                <div class="spotify-result-meta">
                    ${escapeHTML(album.artist)}<br>
                    ${escapeHTML(album.year || "")}
                    ${album.totalTracks ? `・${escapeHTML(album.totalTracks)}曲` : ""}
                </div>
            </div>
            <button type="button" class="spotify-select-btn">選択</button>
        `;

        const selectBtn = card.querySelector(".spotify-select-btn");
        selectBtn.addEventListener("click", () => {
            selectedSpotifyAlbum = album;

            coverInput.value = album.cover || "";
            titleInput.value = album.title || "";
            artistInput.value = album.artist || "";

            updateSpotifySelectedBox();
            setSpotifyStatus("Spotifyのアルバム情報をフォームに反映しました。紹介文・キーワード・メーターを入力して保存してください。");
        });

        spotifyResults.appendChild(card);
    });

    setSpotifyStatus(`${albums.length}件の候補を表示しています。該当するアルバムを選択してください。`);
}

async function searchSpotifyAlbums(){
    const q = spotifySearchInput.value.trim();

    if(!q){
        alert("検索キーワードを入力してください");
        return;
    }

    spotifySearchBtn.disabled = true;
    spotifyResults.innerHTML = "";
    setSpotifyStatus("Spotifyで検索中...");

    try{
        const url = `${SPOTIFY_API_BASE}/search-albums?q=${encodeURIComponent(q)}`;
        const res = await fetch(url);

        if(!res.ok){
            const errorText = await res.text();
            throw new Error(`Spotify検索に失敗しました：${res.status} ${errorText}`);
        }

        const albums = await res.json();
        renderSpotifyResults(albums);

    }catch(e){
        setSpotifyStatus("Spotify検索でエラーが出ました。Cloudflare Workerや通信状況を確認してください。");
        showError(e.message);
    }finally{
        spotifySearchBtn.disabled = false;
    }
}

spotifySearchBtn.addEventListener("click", searchSpotifyAlbums);

spotifySearchInput.addEventListener("keydown", (event) => {
    if(event.key === "Enter"){
        event.preventDefault();
        searchSpotifyAlbums();
    }
});


clearBtn.addEventListener("click", clearForm);

async function loadEditAlbum(user){
    if(!editingId){
        return;
    }

    clearError();
    setLoading(true);

    try {
        const ref = doc(db, "albums", editingId);
        const snap = await getDoc(ref);

        if(!snap.exists()){
            showError("編集対象の投稿が見つかりません。削除された可能性があります。");
            saveBtn.disabled = true;
            return;
        }

        const album = snap.data();

        if(album.userId !== user.uid){
            showError("この投稿はあなたの投稿ではないため、編集できません。");
            saveBtn.disabled = true;
            return;
        }

        currentLoadedAlbum = album;
        setFormData(album);
        saveBtn.disabled = false;

    } catch (e) {
        showError(`読み込みエラー：${e.message}`);
        saveBtn.disabled = true;
    } finally {
        setLoading(false);
    }
}

saveBtn.addEventListener("click", async () => {
    try {
        clearError();

        const user = auth.currentUser;

        if(!user){
            alert("ログインしてください");
            goLoginWithRedirect();
            return;
        }

        if(!titleInput.value.trim()){
            alert("曲名 / アルバム名を入力してください");
            return;
        }

        const data = getFormData();

        if(editingId){
            const ref = doc(db, "albums", editingId);

            const latestSnap = await getDoc(ref);

            if(!latestSnap.exists()){
                alert("編集対象の投稿が見つかりません");
                return;
            }

            const latestAlbum = latestSnap.data();

            if(latestAlbum.userId !== user.uid){
                alert("この投稿はあなたの投稿ではないため、更新できません");
                return;
            }

            await updateDoc(ref, data);
            alert("更新しました");

            location.href = `./profile.html?uid=${encodeURIComponent(user.uid)}`;

        }else{
            await addDoc(collection(db, "albums"), {
                ...data,
                createdAt: serverTimestamp()
            });

            alert("保存しました");

            clearNewPostFormOnly();
        }

    } catch (e) {
        alert(e.message);
    }
});

function clearNewPostFormOnly(){
    coverInput.value = "";
    titleInput.value = "";
    artistInput.value = "";
    descInput.value = "";
    keywordsInput.value = "";
    isPublicInput.value = "true";
    selectedSpotifyAlbum = null;
    updateSpotifySelectedBox();
    spotifySearchInput.value = "";
    spotifyResults.innerHTML = "";
    spotifyStatus.textContent = "アルバム名やアーティスト名で検索できます。選択するとフォームに自動入力されます。";

    darknessInput.value = 3;
    intenseInput.value = 3;
    complexInput.value = 3;
    hopeInput.value = 3;
    worldInput.value = 3;

    updateDescCount();
}

function goMyPage(){
    const user = auth.currentUser;

    if(!user){
        location.href = "./login.html";
        return;
    }

    location.href = `./profile.html?uid=${encodeURIComponent(user.uid)}`;
}

myPageBtn.addEventListener("click", goMyPage);
bottomMyPageBtn.addEventListener("click", goMyPage);
goMyPageBtn.addEventListener("click", goMyPage);

onAuthStateChanged(auth, async (user) => {
    authReady = true;

    if(user){
        loginStatus.textContent = `ログイン中: ${user.email}`;
        sidebarLoginStatus.textContent = `ログイン中: ${user.email}`;

        saveBtn.disabled = false;
        clearBtn.disabled = false;

        if(editingId){
            await loadEditAlbum(user);
        }

    }else{
        loginStatus.textContent = "未ログイン：投稿するにはログインしてください";
        sidebarLoginStatus.textContent = "未ログイン";

        saveBtn.disabled = false;
        clearBtn.disabled = false;

        if(editingId){
            showError("編集するにはログインが必要です。ログイン後、このページに戻ります。");
        }
    }
});

setPageMode();
updateDescCount();

</script>
