<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments - Album Collection</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:32px;
    padding-bottom:32px;
}

button,input,textarea{
    font-family:inherit;
}

.topbar{
    max-width:760px;
    margin:0 auto 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
}

.page-title{
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.03em;
}

.top-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn,.like-btn,.comment-btn,.delete-comment-btn{
    background:#141414;
    color:white;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:999px;
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
}

.btn:hover,.like-btn:hover,.comment-btn:hover,.delete-comment-btn:hover{
    background:#222;
}

.like-btn.liked{
    background:#6fa8dc;
    border-color:#6fa8dc;
    color:#061018;
    font-weight:700;
}

.detail-wrap{
    max-width:760px;
    margin:0 auto;
}

.post-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:22px;
    overflow:hidden;
}

.post-summary{
    padding:18px;
    display:grid;
    grid-template-columns:92px 1fr;
    gap:15px;
    cursor:pointer;
}

.cover{
    width:92px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
}

.post-info{
    min-width:0;
}

.title{
    font-size:21px;
    font-weight:800;
    line-height:1.25;
    word-break:break-word;
    margin-bottom:4px;
}

.artist{
    font-size:16px;
    color:#6fa8dc;
    font-weight:700;
    word-break:break-word;
    margin-bottom:7px;
}

.meta-line{
    color:#aaa;
    font-size:13px;
    line-height:1.5;
    word-break:break-word;
}

.creator a{
    color:#ddd;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.review-preview{
    color:#d8d8d8;
    font-size:14px;
    line-height:1.65;
    margin-top:10px;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
    word-break:break-word;
}

.action-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 18px 16px 125px;
    color:#aaa;
    font-size:14px;
}

.count-text{
    color:#aaa;
}

.comment-section{
    margin-top:18px;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:22px;
    padding:20px;
}

.comment-header{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:18px;
}

.comment-title{
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.02em;
}

.comment-count{
    color:#aaa;
    font-size:14px;
}

.comment-form{
    display:grid;
    grid-template-columns:40px 1fr;
    gap:12px;
    margin-bottom:24px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#222;
    border:1px solid rgba(255,255,255,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-weight:800;
    flex-shrink:0;
}

.comment-input-wrap{
    min-width:0;
}

.comment-input{
    width:100%;
    min-height:44px;
    resize:vertical;
    background:transparent;
    color:white;
    border:0;
    border-bottom:1px solid rgba(255,255,255,0.24);
    padding:9px 0;
    font-size:15px;
    line-height:1.6;
    outline:none;
}

.comment-input:focus{
    border-bottom-color:#6fa8dc;
}

.comment-submit-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
}

.comment-btn{
    background:#6fa8dc;
    border-color:#6fa8dc;
    color:#061018;
    font-weight:800;
    padding:8px 16px;
}

.comment-list{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.comment-item{
    display:grid;
    grid-template-columns:40px 1fr;
    gap:12px;
}

.comment-body{
    min-width:0;
}

.comment-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:4px;
}

.comment-user{
    color:#f1f1f1;
    font-size:13px;
    font-weight:800;
    word-break:break-word;
}

.comment-time{
    color:#888;
    font-size:12px;
    font-weight:500;
    margin-left:6px;
}

.comment-text{
    color:#ddd;
    font-size:15px;
    line-height:1.75;
    word-break:break-word;
    white-space:pre-wrap;
}

.delete-comment-btn{
    padding:5px 9px;
    font-size:12px;
    background:#151515;
    color:#aaa;
}

.empty{
    color:#777;
    font-size:18px;
    text-align:center;
    padding:34px 0;
}

.mobile-tabbar{
    display:none;
}

@media(max-width:800px){
    body{
        padding:14px;
        padding-bottom:86px;
    }

    .topbar{
        margin-bottom:12px;
        padding:2px 2px 0;
    }

    .page-title{
        font-size:21px;
    }

    .top-actions{
        gap:7px;
    }

    .btn{
        padding:8px 11px;
        font-size:12px;
    }

    .post-card,
    .comment-section{
        border-radius:18px;
    }

    .post-summary{
        grid-template-columns:74px 1fr;
        gap:12px;
        padding:14px;
    }

    .cover{
        width:74px;
        border-radius:12px;
    }

    .title{
        font-size:17px;
        margin-bottom:3px;
    }

    .artist{
        font-size:14px;
        margin-bottom:5px;
    }

    .meta-line{
        font-size:12px;
    }

    .review-preview{
        font-size:13px;
        line-height:1.55;
        margin-top:7px;
        -webkit-line-clamp:2;
    }

    .action-row{
        padding:0 14px 14px 100px;
        gap:10px;
        font-size:13px;
    }

    .like-btn{
        padding:7px 11px;
        font-size:12px;
    }

    .comment-section{
        margin-top:12px;
        padding:16px 14px;
    }

    .comment-title{
        font-size:20px;
    }

    .comment-form,
    .comment-item{
        grid-template-columns:34px 1fr;
        gap:10px;
    }

    .avatar{
        width:34px;
        height:34px;
        font-size:13px;
    }

    .comment-input{
        font-size:14px;
    }

    .comment-text{
        font-size:14px;
        line-height:1.7;
    }

    .mobile-tabbar{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:66px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        display:grid;
        grid-template-columns:repeat(5,1fr);
        z-index:999;
        backdrop-filter:blur(12px);
    }

    .mobile-tabbar a{
        color:#aaa;
        text-decoration:none;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:3px;
        font-size:10px;
        font-weight:700;
    }

    .mobile-tabbar .icon{
        font-size:20px;
        line-height:1;
    }

    .mobile-tabbar a.active{
        color:#6fa8dc;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="page-title">Comments</h1>

    <div class="top-actions">
        <button class="btn" onclick="location.href='./index.html'">戻る</button>
        <button id="mypageBtn" class="btn" style="display:none;">マイページ</button>
    </div>
</div>

<div class="detail-wrap" id="detailWrap">
    <div class="empty">読み込み中...</div>
</div>

<nav class="mobile-tabbar">
    <a href="./index.html">
        <span class="icon">⌂</span>
        <span>ホーム</span>
    </a>
    <a href="./search.html">
        <span class="icon">⌕</span>
        <span>検索</span>
    </a>
    <a href="./editor.html">
        <span class="icon">＋</span>
        <span>投稿</span>
    </a>
    <a href="./notifications.html">
        <span class="icon">♡</span>
        <span>通知</span>
    </a>
    <a id="mobileMypageLink" href="./login.html">
        <span class="icon">◯</span>
        <span>マイページ</span>
    </a>
</nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const detailWrap = document.getElementById("detailWrap");
const mypageBtn = document.getElementById("mypageBtn");
const mobileMypageLink = document.getElementById("mobileMypageLink");

const params = new URLSearchParams(location.search);
const albumId = params.get("id");

let currentUser = null;
let albumData = null;
let allLikes = [];
let allComments = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if(user){
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };
        mobileMypageLink.href = `profile.html?uid=${user.uid}`;
    } else {
        mypageBtn.style.display = "none";
        mobileMypageLink.href = "./login.html";
    }

    renderDetail();
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe()){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

async function addComment(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const input = document.getElementById("commentInput");
    const text = input.value.trim();

    if(!text){
        alert("コメントを入力してください");
        return;
    }

    if(text.length > 200){
        alert("コメントは200文字以内にしてください");
        return;
    }

    await addDoc(collection(db, "comments"), {
        albumId: albumId,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        text: text,
        createdAt: serverTimestamp()
    });

    input.value = "";
}

window.addComment = addComment;

async function deleteComment(commentId){
    if(!currentUser) return;

    if(!confirm("このコメントを削除しますか？")){
        return;
    }

    await deleteDoc(doc(db, "comments", commentId));
}

window.deleteComment = deleteComment;

function getComments(){
    return allComments
        .filter(comment => comment.albumId === albumId)
        .sort((a,b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
        });
}

function firstLetter(text){
    const value = String(text || "?").trim();
    return escapeHTML(value.slice(0,1).toUpperCase() || "?");
}

function formatDate(timestamp){
    if(!timestamp?.seconds) return "";

    const date = new Date(timestamp.seconds * 1000);
    return date.toLocaleDateString("ja-JP", {
        year:"numeric",
        month:"short",
        day:"numeric"
    });
}

function renderComments(){
    const comments = getComments();

    if(comments.length === 0){
        return `<div class="empty">まだコメントはありません</div>`;
    }

    return comments.map((comment) => {
        const canDelete = currentUser && currentUser.uid === comment.userId;
        const userName = comment.userEmail || "匿名ユーザー";
        const dateText = formatDate(comment.createdAt);

        return `
            <div class="comment-item">
                <div class="avatar">${firstLetter(userName)}</div>

                <div class="comment-body">
                    <div class="comment-meta">
                        <div>
                            <span class="comment-user">${escapeHTML(userName)}</span>
                            ${dateText ? `<span class="comment-time">${escapeHTML(dateText)}</span>` : ""}
                        </div>

                        ${canDelete ? `
                            <button class="delete-comment-btn" onclick="deleteComment('${escapeHTML(comment.id)}')">
                                削除
                            </button>
                        ` : ""}
                    </div>

                    <div class="comment-text">${escapeHTML(comment.text || "")}</div>
                </div>
            </div>
        `;
    }).join("");
}

function renderDetail(){
    if(!albumId){
        detailWrap.innerHTML = `<div class="empty">投稿IDがありません</div>`;
        return;
    }

    if(!albumData){
        return;
    }

    const liked = isLikedByMe();
    const likeCount = getLikeCount();
    const comments = getComments();
    const creatorName = albumData.userName || albumData.userEmail || "匿名ユーザー";

    detailWrap.innerHTML = `
        <article class="post-card">
            <div class="post-summary" onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">
                <img class="cover" src="${escapeHTML(albumData.cover || "")}" alt="">

                <div class="post-info">
                    <div class="title">${escapeHTML(albumData.title || "")}</div>
                    <div class="artist">${escapeHTML(albumData.artist || "")}</div>

                    <div class="meta-line">
                        ${albumData.year ? `${escapeHTML(albumData.year)} ・ ` : ""}
                        <span class="creator">
                            投稿者：
                            <a href="profile.html?uid=${escapeHTML(albumData.userId || "")}" onclick="event.stopPropagation();">
                                ${escapeHTML(creatorName)}
                            </a>
                        </span>
                    </div>

                    <div class="review-preview">
                        ${escapeHTML(albumData.desc || "本文はありません")}
                    </div>
                </div>
            </div>

            <div class="action-row">
                <button class="like-btn ${liked ? "liked" : ""}" onclick="toggleLike()">
                    ${liked ? "♥" : "♡"} いいね
                </button>
                <span class="count-text">${likeCount}件</span>
                <span class="count-text">💬 ${comments.length}件</span>
            </div>
        </article>

        <section class="comment-section">
            <div class="comment-header">
                <div class="comment-title">コメント</div>
                <div class="comment-count">${comments.length}件</div>
            </div>

            <div class="comment-form">
                <div class="avatar">${currentUser ? firstLetter(currentUser.email) : "?"}</div>

                <div class="comment-input-wrap">
                    <textarea
                        id="commentInput"
                        class="comment-input"
                        maxlength="200"
                        placeholder="コメントを追加..."
                    ></textarea>

                    <div class="comment-submit-row">
                        <button class="comment-btn" onclick="addComment()">コメント</button>
                    </div>
                </div>
            </div>

            <div class="comment-list">
                ${renderComments()}
            </div>
        </section>
    `;
}

async function loadAlbum(){
    if(!albumId){
        renderDetail();
        return;
    }

    const albumRef = doc(db, "albums", albumId);
    const albumSnap = await getDoc(albumRef);

    if(!albumSnap.exists()){
        detailWrap.innerHTML = `<div class="empty">投稿が見つかりません</div>`;
        return;
    }

    albumData = albumSnap.data();
    renderDetail();
}

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    renderDetail();
});

const commentsQuery = query(
    collection(db, "comments"),
    where("albumId", "==", albumId || "__none__")
);

onSnapshot(commentsQuery, (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    renderDetail();
});

loadAlbum();

</script>

</body>
</html>
