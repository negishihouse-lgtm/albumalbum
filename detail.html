<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Detail - Album Collection</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
    --bg:#050505;
    --panel:#0b0b0b;
    --panel2:#111;
    --line:rgba(255,255,255,0.12);
    --line2:rgba(255,255,255,0.15);
    --text:white;
    --muted:#aaa;
    --muted2:#777;
    --accent:#6fa8dc;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
    padding-bottom:40px;
}

button,input{
    font-family:inherit;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.page-title{
    font-size:42px;
    font-weight:700;
}

.top-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.btn,.like-btn,.comment-btn,.delete-comment-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid var(--line2);
    padding:13px 20px;
    font-size:15px;
    cursor:pointer;
    border-radius:0;
}

.btn:hover,.like-btn:hover,.comment-btn:hover,.delete-comment-btn:hover{
    background:#2a2a2a;
}

.like-btn.liked{
    background:var(--accent);
    color:#06111c;
    border-color:var(--accent);
    font-weight:700;
}

.detail-wrap{
    max-width:1100px;
    margin:0 auto;
}

.album-card,
.comment-card,
.related-card{
    background:var(--panel);
    border:1px solid var(--line);
    padding:30px;
}

.album-card{
    margin-bottom:22px;
}

.album-main{
    display:grid;
    grid-template-columns:260px 1fr;
    gap:32px;
}

.cover{
    width:240px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
}

.title{
    font-size:38px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:8px;
    word-break:break-word;
}

.artist{
    font-size:28px;
    color:var(--accent);
    margin-bottom:16px;
    word-break:break-word;
}

.meta-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    color:var(--muted);
    margin-bottom:14px;
    font-size:15px;
}

.creator{
    color:#ccc;
    margin-bottom:20px;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.like-area{
    display:flex;
    align-items:center;
    gap:12px;
    color:#ddd;
    margin-top:18px;
}

.action-count{
    color:#ddd;
    font-size:15px;
}

.section{
    margin-top:30px;
    padding-top:26px;
    border-top:1px solid var(--line);
}

.section-title{
    color:var(--accent);
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
}

.description{
    color:#ddd;
    line-height:2;
    word-break:break-word;
    white-space:pre-wrap;
}

.keyword-tags{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.keyword-tag{
    background:#111;
    border:1px solid var(--line2);
    color:#ddd;
    padding:8px 12px;
    border-radius:999px;
    font-size:14px;
}

.meter-area{
    border:1px solid var(--line);
    padding:24px;
}

.meter{
    display:grid;
    grid-template-columns:72px minmax(120px,1fr) 72px;
    align-items:center;
    gap:12px;
    margin-bottom:19px;
}

.meter:last-child{
    margin-bottom:0;
}

.meter-label{
    font-size:18px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{ text-align:right; }

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:3px;
    background:#4a5158;
    flex:1;
    min-width:6px;
}

.dot.active.level-1,.connector.active.level-1{ background:#3f8ec7; border-color:#3f8ec7; }
.dot.active.level-2,.connector.active.level-2{ background:#4d9bd0; border-color:#4d9bd0; }
.dot.active.level-3,.connector.active.level-3{ background:#5fa7d8; border-color:#5fa7d8; }
.dot.active.level-4,.connector.active.level-4{ background:#73b6e3; border-color:#73b6e3; }
.dot.active.level-5{ background:#8bc8ef; border-color:#8bc8ef; }

.comment-card,
.related-card{
    margin-top:22px;
}

.comment-form{
    display:flex;
    gap:10px;
    margin-bottom:18px;
}

.comment-input{
    flex:1;
    padding:13px;
    background:#111;
    color:white;
    border:1px solid var(--line2);
    font-size:15px;
}

.comment-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.comment-item{
    background:#111;
    border:1px solid rgba(255,255,255,0.1);
    padding:14px;
}

.comment-meta{
    color:#888;
    font-size:13px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.comment-text{
    color:#ddd;
    line-height:1.7;
    word-break:break-word;
    white-space:pre-wrap;
}

.delete-comment-btn{
    padding:4px 8px;
    font-size:12px;
    background:#333;
}

.related-list{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.related-item{
    display:grid;
    grid-template-columns:72px 1fr;
    gap:12px;
    align-items:center;
    background:#111;
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    cursor:pointer;
    min-width:0;
}

.related-item:hover{
    background:#181818;
}

.related-cover{
    width:72px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#222;
}

.related-title{
    color:white;
    font-weight:700;
    line-height:1.35;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.related-artist{
    color:var(--accent);
    font-size:13px;
    margin-top:4px;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.empty{
    color:var(--muted2);
    font-size:22px;
}

.mobile-bottom-nav{
    display:none;
}

@media(max-width:800px){
    body{
        padding:12px;
        padding-bottom:88px;
    }

    .topbar{
        display:none;
    }

    .detail-wrap{
        max-width:100%;
    }

    .album-card,
    .comment-card,
    .related-card{
        padding:14px;
        border-radius:16px;
        background:#090909;
    }

    .album-card{
        margin-bottom:12px;
    }

    .album-main{
        display:grid;
        grid-template-columns:92px 1fr;
        gap:12px;
        align-items:start;
    }

    .cover{
        width:92px;
        border-radius:10px;
    }

    .title{
        font-size:20px;
        line-height:1.25;
        margin-bottom:4px;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
    }

    .artist{
        font-size:15px;
        margin-bottom:8px;
        display:-webkit-box;
        -webkit-line-clamp:1;
        -webkit-box-orient:vertical;
        overflow:hidden;
    }

    .meta-row{
        gap:8px;
        font-size:12px;
        margin-bottom:8px;
        color:#999;
    }

    .creator{
        font-size:12px;
        margin-bottom:10px;
        color:#aaa;
        display:-webkit-box;
        -webkit-line-clamp:1;
        -webkit-box-orient:vertical;
        overflow:hidden;
    }

    .like-area{
        margin-top:8px;
        gap:8px;
        flex-wrap:wrap;
    }

    .like-btn{
        padding:8px 10px;
        font-size:12px;
        border-radius:999px;
    }

    .action-count{
        font-size:12px;
        color:#aaa;
    }

    .section{
        margin-top:14px;
        padding-top:14px;
    }

    .section-title{
        font-size:15px;
        margin-bottom:10px;
    }

    .description{
        font-size:14px;
        line-height:1.7;
    }

    .keyword-tags{
        gap:7px;
    }

    .keyword-tag{
        padding:6px 9px;
        font-size:12px;
    }

    .meter-area{
        padding:12px;
        border-radius:12px;
        background:#0d0d0d;
    }

    .meter{
        grid-template-columns:50px minmax(90px,1fr) 50px;
        gap:8px;
        margin-bottom:12px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:12px;
        height:12px;
        border-width:1.5px;
    }

    .connector{
        height:2px;
        min-width:3px;
    }

    .comment-card,
    .related-card{
        margin-top:12px;
    }

    .comment-form{
        flex-direction:column;
        gap:8px;
    }

    .comment-input{
        padding:11px;
        font-size:14px;
        border-radius:10px;
    }

    .comment-btn{
        width:100%;
        padding:11px;
        border-radius:10px;
    }

    .comment-item{
        padding:12px;
        border-radius:12px;
    }

    .comment-text{
        font-size:14px;
        line-height:1.65;
    }

    .related-list{
        grid-template-columns:1fr;
        gap:10px;
    }

    .related-item{
        grid-template-columns:58px 1fr;
        border-radius:12px;
        padding:10px;
    }

    .related-cover{
        width:58px;
        border-radius:8px;
    }

    .related-title{
        font-size:14px;
    }

    .mobile-bottom-nav{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        display:grid;
        grid-template-columns:repeat(5,1fr);
        z-index:100;
        backdrop-filter:blur(10px);
    }

    .mobile-nav-item{
        color:#aaa;
        text-decoration:none;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:3px;
        font-size:10px;
        -webkit-tap-highlight-color:transparent;
    }

    .mobile-nav-icon{
        font-size:19px;
        line-height:1;
    }

    .mobile-nav-item.active{
        color:var(--accent);
        font-weight:700;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="page-title">Album Detail</h1>

    <div class="top-actions">
        <button class="btn" onclick="location.href='./index.html'">
            一覧へ戻る
        </button>

        <button id="mypageBtn" class="btn" style="display:none;">
            マイページ
        </button>
    </div>
</div>

<div class="detail-wrap" id="detailWrap">
    <div class="empty">読み込み中...</div>
</div>

<nav class="mobile-bottom-nav">
    <a class="mobile-nav-item" href="./index.html">
        <span class="mobile-nav-icon">⌂</span>
        <span>ホーム</span>
    </a>

    <a class="mobile-nav-item" href="./search.html">
        <span class="mobile-nav-icon">⌕</span>
        <span>検索</span>
    </a>

    <a class="mobile-nav-item" href="./editor.html">
        <span class="mobile-nav-icon">＋</span>
        <span>投稿</span>
    </a>

    <a class="mobile-nav-item" href="./notifications.html">
        <span class="mobile-nav-icon">♡</span>
        <span>通知</span>
    </a>

    <a class="mobile-nav-item active" id="mobileMypageLink" href="./login.html">
        <span class="mobile-nav-icon">◉</span>
        <span>マイページ</span>
    </a>
</nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const detailWrap = document.getElementById("detailWrap");
const mypageBtn = document.getElementById("mypageBtn");
const mobileMypageLink = document.getElementById("mobileMypageLink");

const params = new URLSearchParams(location.search);
const albumId = params.get("id");

let currentUser = null;
let albumData = null;
let allLikes = [];
let allComments = [];
let allAlbums = [];

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if(user){
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };

        mobileMypageLink.href = `profile.html?uid=${user.uid}`;
    } else {
        mypageBtn.style.display = "none";
        mobileMypageLink.href = "./login.html";
    }

    renderDetail();
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(targetAlbumId = albumId){
    return allLikes.filter(like => like.albumId === targetAlbumId).length;
}

function isLikedByMe(){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe()){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

async function addComment(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const input = document.getElementById("commentInput");
    const text = input.value.trim();

    if(!text){
        alert("コメントを入力してください");
        return;
    }

    if(text.length > 200){
        alert("コメントは200文字以内にしてください");
        return;
    }

    await addDoc(collection(db, "comments"), {
        albumId: albumId,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        text: text,
        createdAt: serverTimestamp()
    });

    input.value = "";
}

window.addComment = addComment;

async function deleteComment(commentId){
    if(!currentUser) return;

    if(!confirm("このコメントを削除しますか？")){
        return;
    }

    await deleteDoc(doc(db, "comments", commentId));
}

window.deleteComment = deleteComment;

function getComments(targetAlbumId = albumId){
    return allComments
        .filter(comment => comment.albumId === targetAlbumId)
        .sort((a,b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return aTime - bTime;
        });
}

function renderKeywords(keywords){
    const raw = String(keywords || "").trim();

    if(!raw){
        return `<div style="color:#777;">キーワードはありません</div>`;
    }

    const tags = raw
        .split(/[、,\s]+/)
        .map(tag => tag.trim())
        .filter(Boolean);

    return `
        <div class="keyword-tags">
            ${tags.map(tag => `
                <span class="keyword-tag">#${escapeHTML(tag.replace(/^#/, ""))}</span>
            `).join("")}
        </div>
    `;
}

function renderComments(){
    const comments = getComments();

    if(comments.length === 0){
        return `<div style="color:#777;">まだコメントはありません</div>`;
    }

    return comments.map((comment) => {
        const canDelete =
            currentUser &&
            currentUser.uid === comment.userId;

        return `
            <div class="comment-item">
                <div class="comment-meta">
                    <span>${escapeHTML(comment.userEmail || "匿名ユーザー")}</span>

                    ${
                        canDelete
                        ? `<button class="delete-comment-btn"
                                   onclick="deleteComment('${escapeHTML(comment.id)}')">
                                削除
                           </button>`
                        : ""
                    }
                </div>

                <div class="comment-text">
                    ${escapeHTML(comment.text || "")}
                </div>
            </div>
        `;
    }).join("");
}

function getRelatedAlbums(){
    if(!albumData) return [];

    const currentArtist = String(albumData.artist || "").trim().toLowerCase();

    if(!currentArtist) return [];

    return allAlbums
        .filter(album => {
            const artist = String(album.artist || "").trim().toLowerCase();

            return (
                album.id !== albumId &&
                artist &&
                artist === currentArtist
            );
        })
        .slice(0, 6);
}

function renderRelatedAlbums(){
    const relatedAlbums = getRelatedAlbums();

    if(relatedAlbums.length === 0){
        return `<div style="color:#777;">同じアーティストの投稿はまだありません</div>`;
    }

    return `
        <div class="related-list">
            ${relatedAlbums.map(album => `
                <div class="related-item"
                     onclick="location.href='detail.html?id=${escapeHTML(album.id)}'">
                    <img class="related-cover"
                         src="${escapeHTML(album.cover || "")}"
                         alt="">

                    <div>
                        <div class="related-title">
                            ${escapeHTML(album.title || "無題")}
                        </div>

                        <div class="related-artist">
                            ${escapeHTML(album.artist || "")}
                        </div>
                    </div>
                </div>
            `).join("")}
        </div>
    `;
}

function renderDetail(){
    if(!albumId){
        detailWrap.innerHTML = `<div class="empty">投稿IDがありません</div>`;
        return;
    }

    if(!albumData){
        return;
    }

    const liked = isLikedByMe();
    const likeCount = getLikeCount();
    const commentCount = getComments().length;

    detailWrap.innerHTML = `
        <div class="album-card">

            <div class="album-main">
                <div>
                    <img class="cover"
                         src="${escapeHTML(albumData.cover || "")}"
                         alt="">
                </div>

                <div>
                    <div class="title">
                        ${escapeHTML(albumData.title || "")}
                    </div>

                    <div class="artist">
                        ${escapeHTML(albumData.artist || "")}
                    </div>

                    <div class="meta-row">
                        ${
                            albumData.year
                            ? `<span>${escapeHTML(albumData.year)}</span>`
                            : ""
                        }
                        <span>♡ ${likeCount}</span>
                        <span>💬 ${commentCount}</span>
                    </div>

                    <div class="creator">
                        投稿者：
                        <a href="profile.html?uid=${escapeHTML(albumData.userId || "")}">
                            ${escapeHTML(
                                albumData.userName ||
                                albumData.userEmail ||
                                "匿名ユーザー"
                            )}
                        </a>
                    </div>

                    <div class="like-area">
                        <button class="like-btn ${liked ? "liked" : ""}"
                                onclick="toggleLike()">
                            ${liked ? "♥ いいね済み" : "♡ いいね"}
                        </button>

                        <span class="action-count">${likeCount}件</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">レビュー</div>
                <div class="description">
                    ${escapeHTML(albumData.desc || "本文はありません")}
                </div>
            </div>

            <div class="section">
                <div class="section-title">キーワード</div>
                ${renderKeywords(albumData.keywords)}
            </div>

            <div class="section">
                <div class="section-title">評価</div>

                <div class="meter-area">
                    ${meter("暗い", "明るい", albumData.darkness)}
                    ${meter("静か", "激しい", albumData.intense)}
                    ${meter("シンプル", "複雑", albumData.complex)}
                    ${meter("絶望", "希望", albumData.hope)}
                    ${meter("個人", "世界", albumData.world)}
                </div>
            </div>

        </div>

        <div class="comment-card">
            <div class="section-title">
                コメント ${commentCount}件
            </div>

            <div class="comment-form">
                <input
                    id="commentInput"
                    class="comment-input"
                    type="text"
                    maxlength="200"
                    placeholder="コメントを書く"
                >

                <button class="comment-btn" onclick="addComment()">
                    送信
                </button>
            </div>

            <div class="comment-list">
                ${renderComments()}
            </div>
        </div>

        <div class="related-card">
            <div class="section-title">同じアーティストの投稿</div>
            ${renderRelatedAlbums()}
        </div>
    `;
}

async function loadAlbum(){
    if(!albumId){
        renderDetail();
        return;
    }

    const albumRef = doc(db, "albums", albumId);
    const albumSnap = await getDoc(albumRef);

    if(!albumSnap.exists()){
        detailWrap.innerHTML = `<div class="empty">投稿が見つかりません</div>`;
        return;
    }

    albumData = {
        id: albumSnap.id,
        ...albumSnap.data()
    };

    renderDetail();
}

onSnapshot(collection(db, "albums"), (snapshot) => {
    allAlbums = [];

    snapshot.forEach((docSnap) => {
        allAlbums.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    const latestCurrentAlbum = allAlbums.find(album => album.id === albumId);

    if(latestCurrentAlbum){
        albumData = latestCurrentAlbum;
    }

    renderDetail();
});

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    renderDetail();
});

const commentsQuery = query(
    collection(db, "comments"),
    where("albumId", "==", albumId || "__none__")
);

onSnapshot(commentsQuery, (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        allComments.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    renderDetail();
});

loadAlbum();

</script>

</body>
</html>
