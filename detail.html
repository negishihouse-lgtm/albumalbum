<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Detail - Album Collection</title>

<style>
/* ============================================================
   Album Collection detail.html
   index参照版
   - PC版：indexのPCカードに寄せた横型レイアウト
   - スマホ版：indexのスマホカードに寄せた縦型カード
   - コメント欄は投稿カードの下に配置
============================================================ */

:root{
    --bg:#050505;
    --panel:#080909;
    --panel-2:#0b0d0e;
    --border:rgba(255,255,255,0.15);
    --border-soft:rgba(255,255,255,0.10);

    --text:#ffffff;
    --text-soft:#dce3e6;
    --muted:#aab3b8;

    --accent:#9fcdd9;
    --accent-hover:#b7dfe7;

    --pale-1:#7faebb;
    --pale-2:#9bc7d0;
    --pale-3:#b9dde3;
    --pale-4:#d7edf0;
    --pale-5:#edf8f9;

    --meter-off:#48555b;
    --meter-line-off:#333d42;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    padding:38px 30px 120px 252px;
}

a{
    color:inherit;
}

/* ===== PC Sidebar ===== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:220px;
    height:100vh;
    background:#060708;
    border-right:1px solid rgba(255,255,255,0.08);
    padding:28px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.04;
    margin-bottom:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:12px;
    font-size:15px;
}

.sidebar a:hover{
    background:#141617;
}

.sidebar a.active{
    background:#17191a;
    color:var(--accent);
}

/* ===== Mobile Tabbar ===== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:white;
    font-weight:700;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== Floating Post Button ===== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:var(--accent-hover);
}

/* ===== Header ===== */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
    max-width:1230px;
}

.page-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-0.045em;
}

.btn,
.like-btn,
.comment-btn,
.delete-comment-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:11px 16px;
    font-size:14px;
    cursor:pointer;
    border-radius:999px;
}

.btn:hover,
.like-btn:hover,
.comment-btn:hover,
.delete-comment-btn:hover{
    background:#2a2a2a;
}

/* ===== Detail Layout ===== */

.detail-wrap{
    max-width:1230px;
    margin:0;
}

.post-card{
    position:relative;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    overflow:hidden;
    display:grid;
    grid-template-columns:180px minmax(0,1fr);
    gap:16px;
    align-items:stretch;
    box-shadow:none;
}

.album-main{
    min-width:0;
    width:180px;
    max-width:180px;
    display:block;
}

.cover{
    width:160px;
    height:160px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:4px;
    margin:0 0 12px 0;
}

.album-text{
    min-width:0;
}

.title{
    font-size:25px;
    font-weight:900;
    line-height:1.06;
    letter-spacing:-0.045em;
    margin-bottom:5px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:var(--accent);
    font-size:15px;
    font-weight:800;
    line-height:1.25;
    margin-bottom:6px;
    word-break:break-word;
}

.meta{
    color:#c5cbd0;
    font-size:11px;
    line-height:1.35;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.creator{
    color:var(--muted);
    font-size:11.5px;
    line-height:1.45;
    margin-bottom:7px;
    word-break:break-word;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}


.creator-highlight{
    margin-bottom:10px;
}

.creator-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:0;
    border:none;
    border-radius:0;
    background:transparent;
    text-decoration:none;
    max-width:100%;
}

.creator-link:hover{
    background:transparent;
    text-decoration:none !important;
}

.creator-avatar,
.creator-avatar-fallback{
    width:30px;
    height:30px;
    border-radius:50%;
    flex:0 0 30px;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.12);
}

.creator-avatar{
    display:block;
    object-fit:cover;
}

.creator-avatar-fallback{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#edf8f9;
    font-size:13px;
    font-weight:700;
    letter-spacing:-0.03em;
}

.creator-text{
    display:inline-flex;
    align-items:baseline;
    gap:2px;
    min-width:0;
    max-width:100%;
}

.creator-prefix{
    color:#aab3b8;
    font-size:12px;
    font-weight:500;
    line-height:1.1;
    white-space:nowrap;
}

.creator-name{
    color:#ffffff;
    font-size:14px;
    font-weight:650;
    line-height:1.1;
    letter-spacing:-0.02em;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* ===== Share button / Share sheet ===== */
.share-area{
    position:relative;
    display:flex;
    align-items:center;
}

.share-btn,
.spotify-link-btn{
    appearance:none;
    -webkit-appearance:none;
    width:30px;
    height:30px;
    min-width:30px;
    min-height:30px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    font-family:inherit;
    line-height:1;
    cursor:pointer;
    text-decoration:none;
    padding:0;
}

.share-btn{
    border:1px solid rgba(255,255,255,0.13);
    background:rgba(255,255,255,0.055);
    color:#dbe4e7;
}

.spotify-link-btn{
    border:1px solid rgba(30,215,96,0.34);
    background:rgba(30,215,96,0.12);
    color:#dfffe9;
}

.spotify-logo{
    position:relative;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#1ed760;
    display:block;
    box-shadow:0 0 12px rgba(30,215,96,0.18);
}

.spotify-logo::before,
.spotify-logo::after,
.spotify-logo span{
    content:"";
    position:absolute;
    left:5px;
    height:2px;
    border-radius:999px;
    background:#07100b;
    transform:rotate(10deg);
    transform-origin:left center;
}

.spotify-logo::before{
    top:6px;
    width:11px;
}

.spotify-logo span{
    top:10px;
    width:10px;
}

.spotify-logo::after{
    top:14px;
    width:8px;
}

.share-icon{
    position:relative;
    width:18px;
    height:18px;
    display:block;
}

.share-icon::before{
    content:"";
    position:absolute;
    left:8px;
    top:3px;
    width:2px;
    height:10px;
    border-radius:999px;
    background:currentColor;
}

.share-icon::after{
    content:"";
    position:absolute;
    left:5px;
    top:3px;
    width:7px;
    height:7px;
    border-left:2px solid currentColor;
    border-top:2px solid currentColor;
    transform:rotate(45deg);
    border-radius:1px;
}

.share-tray{
    position:absolute;
    left:4px;
    bottom:2px;
    width:10px;
    height:6px;
    border:2px solid currentColor;
    border-top:none;
    border-radius:0 0 4px 4px;
}

.spotify-link-btn:hover{
    background:rgba(30,215,96,0.20);
    border-color:rgba(30,215,96,0.56);
}

.share-btn:hover{
    background:rgba(159,205,217,0.16);
    color:#ffffff;
}

.share-sheet{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background:rgba(0,0,0,0.58);
    z-index:20000;
    padding:18px;
}

.share-sheet.open{
    display:flex;
}

.share-panel{
    width:min(420px,100%);
    background:#0b0d0e;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:22px;
    padding:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.55);
}

.share-panel-title{
    font-size:16px;
    font-weight:900;
    margin-bottom:4px;
}

.share-panel-subtitle{
    color:#aab3b8;
    font-size:12px;
    line-height:1.45;
    margin-bottom:14px;
}

.share-actions{
    display:grid;
    gap:8px;
}

.share-action-btn{
    appearance:none;
    -webkit-appearance:none;
    width:100%;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.045);
    color:white;
    font-family:inherit;
    font-size:14px;
    font-weight:800;
    text-align:left;
    border-radius:14px;
    padding:13px 14px;
    cursor:pointer;
}

.share-action-btn:hover{
    border-color:rgba(159,205,217,0.42);
    background:rgba(159,205,217,0.10);
}

.share-close-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:transparent;
    color:#aab3b8;
    font-family:inherit;
    font-size:13px;
    font-weight:800;
    padding:12px;
    cursor:pointer;
}

.share-toast{
    position:fixed;
    left:50%;
    bottom:92px;
    transform:translateX(-50%) translateY(10px);
    background:#edf8f9;
    color:#050505;
    border-radius:999px;
    padding:10px 15px;
    font-size:13px;
    font-weight:900;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
    z-index:21000;
}

.share-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

.avatar{
    width:24px;
    height:24px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
    border:1px solid rgba(255,255,255,0.14);
    flex-shrink:0;
}

.avatar-fallback{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#ddd;
    font-size:11px;
    font-weight:800;
}

.creator-with-avatar{
    display:flex;
    align-items:center;
    gap:7px;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:10px;
    color:#b6c0c4;
    font-size:11.5px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#b6c0c4;
    padding:0;
    font-size:16px;
    cursor:pointer;
    line-height:1;
}

.like-btn:hover,
.like-btn.liked{
    color:white;
    background:none;
}

.like-count,
.comment-count{
    font-size:11.5px;
    color:#b6c0c4;
}

/* ===== Right side ===== */

.album-analysis{
    min-width:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-self:stretch;

    border:1px solid rgba(255,255,255,0.13);
    border-radius:14px;
    padding:17px 14px 14px;
    background:#070808;
}

.meter-list{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:0;
    padding-bottom:14px;
}

.meter{
    display:grid;
    grid-template-columns:44px minmax(0,1fr) 48px;
    align-items:center;
    gap:8px;
    min-width:0;
    width:100%;
    margin-bottom:0;
}

.meter-label{
    color:#f3f7f8;
    font-size:13px;
    font-weight:800;
    line-height:1;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid var(--meter-off);
    background:transparent;
    flex:0 0 16px;
}

.connector{
    height:1px;
    background:var(--meter-line-off);
    flex:1;
    min-width:18px;
}

.dot.active.level-1,
.connector.active.level-1{
    background:var(--pale-1);
    border-color:var(--pale-1);
}

.dot.active.level-2,
.connector.active.level-2{
    background:var(--pale-2);
    border-color:var(--pale-2);
}

.dot.active.level-3,
.connector.active.level-3{
    background:var(--pale-3);
    border-color:var(--pale-3);
}

.dot.active.level-4,
.connector.active.level-4{
    background:var(--pale-4);
    border-color:var(--pale-4);
}

.dot.active.level-5,
.connector.active.level-5{
    background:var(--pale-5);
    border-color:var(--pale-5);
}

.dot.active{
    box-shadow:0 0 16px rgba(159,205,217,0.14);
}

.keyword-box{
    flex-shrink:0;
    margin-top:0;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:9px 10px;

    display:grid;
    grid-template-columns:62px minmax(0,1fr);
    gap:10px;
    align-items:start;
}

.keyword-title{
    color:var(--accent);
    font-size:11px;
    font-weight:800;
}

.keyword-text{
    color:#dde6e8;
    font-size:10.5px;
    line-height:1.5;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.keyword-tags{
    min-width:0;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    max-height:42px;
    overflow:hidden;
}

.keyword-tag{
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    max-width:100%;
    color:#dde6e8;
    font-size:10.5px;
    line-height:1;
    text-decoration:none;
    word-break:break-word;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    padding:5px 8px;
    background:rgba(255,255,255,0.025);
}

.keyword-tag:hover{
    border-color:rgba(159,205,217,0.48);
    color:white;
}

.keyword-empty{
    color:#777;
    font-size:11px;
}

.review-panel{
    margin-top:18px;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
}

.review-title{
    color:var(--accent);
    font-size:13px;
    font-weight:900;
    margin-bottom:10px;
}

.review{
    color:var(--text-soft);
    font-size:14px;
    line-height:1.85;
    word-break:break-word;
    white-space:pre-wrap;
}

/* ===== Comments ===== */

.comments-panel{
    margin-top:18px;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
}

.comments-title{
    font-size:19px;
    font-weight:900;
    margin-bottom:20px;
}

.comment-form{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:24px;
}

.comment-form-main{
    flex:1;
}

.comment-input{
    width:100%;
    padding:10px 0;
    background:transparent;
    color:white;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.28);
    font-size:15px;
    outline:none;
}

.comment-input:focus{
    border-bottom-color:white;
}

.comment-submit-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
}

.comment-btn{
    padding:9px 16px;
    background:#f1f1f1;
    color:#050505;
    border:none;
    font-weight:800;
}

.comment-list{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.comment-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.comment-body{
    flex:1;
    min-width:0;
    text-align:left;
}

.comment-meta{
    display:flex;
    align-items:center;
    gap:8px;
    color:#aaa;
    font-size:13px;
    margin-bottom:5px;
}

.comment-name{
    color:#f0f0f0;
    font-weight:800;
}

.comment-text{
    color:#e0e0e0;
    line-height:1.65;
    font-size:15px;
    word-break:break-word;
    white-space:pre-wrap;
    text-align:left;
    margin:0;
}

.comment-menu{
    margin-top:8px;
}

.delete-comment-btn{
    padding:5px 10px;
    font-size:12px;
    background:#171717;
    color:#aaa;
}

.empty{
    color:#888;
    font-size:24px;
}

.mobile-post-date{
    display:none;
}

/* ===== PC narrow ===== */

@media(min-width:901px) and (max-width:1280px){
    body{
        padding-left:236px;
        padding-right:20px;
    }

    .sidebar{
        width:210px;
    }

    .post-card{
        grid-template-columns:165px minmax(0,1fr);
        gap:14px;
        padding:16px;
    }

    .album-main{
        width:165px;
        max-width:165px;
    }

    .cover{
        width:145px;
        height:145px;
    }

    .title{
        font-size:22px;
    }

    .meter{
        grid-template-columns:40px minmax(0,1fr) 46px;
        gap:7px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:14px;
        height:14px;
        flex-basis:14px;
    }

    .connector{
        min-width:14px;
    }
}

/* ===== Smartphone ===== */

@media(max-width:900px){

    .creator-highlight{
        margin-bottom:8px !important;
    }

    .creator-link{
        gap:6px !important;
        padding:0 !important;
        border:none !important;
        border-radius:0 !important;
        background:transparent !important;
    }

    .creator-text{
        gap:2px !important;
        min-width:0 !important;
    }

    .creator-avatar,
    .creator-avatar-fallback{
        width:28px !important;
        height:28px !important;
        flex-basis:28px !important;
        font-size:13px !important;
    }

    .creator-prefix{
        font-size:12px !important;
        font-weight:500 !important;
    }

    .creator-name{
        font-size:15px !important;
        font-weight:650 !important;
    }

    body{
        padding:16px 16px 112px;
        overflow-x:hidden;
    }

    .sidebar{
        display:none;
    }

    .topbar{
        margin-bottom:20px;
    }

    .page-title{
        font-size:34px;

function isHttpUrl(value){
    if(!value || typeof value !== "string"){
        return false;
    }

    try{
        const url = new URL(value);
        return url.protocol === "https:" || url.protocol === "http:";
    }catch(error){
        return false;
    }
}

function normalizeSpotifyType(value){
    const type = String(value || "").toLowerCase();

    if(type === "album"){
        return "album";
    }

    if(type === "playlist"){
        return "playlist";
    }

    if(type === "artist"){
        return "artist";
    }

    return "track";
}

function getSpotifyUrlFromId(album){
    const id = album?.spotifyId || album?.spotifyTrackId || album?.spotifyAlbumId || "";

    if(!id){
        return "";
    }

    const type = normalizeSpotifyType(album?.spotifyType || album?.type);
    return `https://open.spotify.com/${type}/${encodeURIComponent(id)}`;
}

function getSpotifyUrlFromUri(album){
    const uri =
        album?.spotifyUri ||
        album?.spotifyURI ||
        album?.spotifyTrackUri ||
        album?.spotifyAlbumUri ||
        "";

    if(!uri || typeof uri !== "string"){
        return "";
    }

    const parts = uri.split(":");

    if(parts.length < 3 || parts[0] !== "spotify"){
        return "";
    }

    const type = normalizeSpotifyType(parts[1]);
    const id = parts[2];

    if(!id){
        return "";
    }

    return `https://open.spotify.com/${type}/${encodeURIComponent(id)}`;
}

function getDirectMusicUrlForAlbum(album){
    const candidates = [
        album?.spotifyUrl,
        album?.spotifyURL,
        album?.spotifyLink,
        album?.spotifyTrackUrl,
        album?.spotifyTrackURL,
        album?.spotifyAlbumUrl,
        album?.spotifyAlbumURL,
        album?.appleMusicUrl,
        album?.appleMusicURL,
        album?.youtubeMusicUrl,
        album?.youtubeMusicURL,
        album?.musicUrl,
        album?.musicURL
    ];

    const directUrl = candidates.find(isHttpUrl);

    if(directUrl){
        return directUrl;
    }

    return getSpotifyUrlFromId(album) || getSpotifyUrlFromUri(album);
}

function getSpotifySearchUrlForAlbum(album){
    const queryText = [album?.title, album?.artist]
        .filter(Boolean)
        .join(" ");

    if(!queryText){
        return "https://open.spotify.com/search";
    }

    return `https://open.spotify.com/search/${encodeURIComponent(queryText)}`;
}

const listenServiceLabels = [
    { key:"spotify", name:"Spotify", icon:"▶" },
    { key:"appleMusic", name:"Apple Music", icon:"♫" },
    { key:"lineMusic", name:"LINE MUSIC", icon:"♪" },
    { key:"youtubeMusic", name:"YouTube Music", icon:"▶" },
    { key:"amazonMusic", name:"Amazon Music", icon:"a" },
    { key:"awa", name:"AWA", icon:"A" }
];

const priorityListenKeys = [
    "spotify",
    "appleMusic",
    "lineMusic",
    "youtubeMusic",
    "amazonMusic",
    "awa"
];

function getListenSearchQuery(album){
    return [album?.title, album?.artist]
        .filter(Boolean)
        .join(" ")
        .trim();
}

function buildServiceSearchUrl(serviceKey, queryText){
    const q = encodeURIComponent(queryText || "");

    if(!q){
        return "";
    }

    if(serviceKey === "appleMusic"){
        return `https://music.apple.com/search?term=${q}`;
    }

    if(serviceKey === "lineMusic"){
        return `https://music.line.me/webapp/search?query=${q}`;
    }

    if(serviceKey === "youtubeMusic"){
        return `https://music.youtube.com/search?q=${q}`;
    }

    if(serviceKey === "amazonMusic"){
        return `https://music.amazon.co.jp/search/${q}`;
    }

    if(serviceKey === "awa"){
        return `https://s.awa.fm/search?q=${q}`;
    }

    if(serviceKey === "spotify"){
        return `https://open.spotify.com/search/${q}`;
    }

    return "";
}

function getServiceLabelByKey(key){
    return listenServiceLabels.find(service => service.key === key) || null;
}

function createSearchFallbackServices(album, existingKeys = new Set()){
    const queryText = getListenSearchQuery(album);

    if(!queryText){
        return [];
    }

    return priorityListenKeys
        .filter(key => !existingKeys.has(key))
        .map((key) => {
            const label = getServiceLabelByKey(key);
            const url = buildServiceSearchUrl(key, queryText);

            if(!label || !url){
                return null;
            }

            return {
                key,
                name:`${label.name}で検索`,
                icon:label.icon,
                url
            };
        })
        .filter(Boolean);
}

function mergeUniqueServices(services){
    const seen = new Set();
    const result = [];

    services.forEach((service) => {
        if(!service?.url){
            return;
        }

        const uniqueKey = service.key || service.url;

        if(seen.has(uniqueKey)){
            return;
        }

        seen.add(uniqueKey);
        result.push(service);
    });

    return result;
}

function openListenMenu(){
    if(!albumData){
        return;
    }

    const directUrl = getDirectMusicUrlForAlbum(albumData);
    const fallbackSpotifySearchUrl = getSpotifySearchUrlForAlbum(albumData);

    if(listenSheet){
        listenSheet.classList.add("open");
    }

    if(listenPanelSubtitle){
        listenPanelSubtitle.textContent = getListenTitle(albumData);
    }

    const existingKeys = new Set();
    const services = [];

    if(directUrl){
        existingKeys.add("spotify");

        services.push({
            key:"spotify",
            name:"Spotifyで開く",
            icon:"▶",
            url:directUrl
        });
    }

    const fallbackServices = createSearchFallbackServices(albumData, existingKeys);
    services.push(...fallbackServices);

    if(!directUrl && fallbackServices.length === 0){
        services.push({
            key:"spotifyFallback",
            name:"Spotifyで検索",
            icon:"▶",
            url:fallbackSpotifySearchUrl
        });
    }

    renderListenActions(mergeUniqueServices(services));
}

function loadImageForCanvas(src){
    return new Promise((resolve) => {
        if(!src){
            resolve(null);
            return;
        }

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
    });
}

function roundRect(ctx, x, y, width, height, radius){
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + width, y, x + width, y + height, r);
    ctx.arcTo(x + width, y + height, x, y + height, r);
    ctx.arcTo(x, y + height, x, y, r);
    ctx.arcTo(x, y, x + width, y, r);
    ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
    const chars = Array.from(String(text || ""));
    let line = "";
    let lines = [];

    for(const char of chars){
        const testLine = line + char;
        if(ctx.measureText(testLine).width > maxWidth && line){
            lines.push(line);
            line = char;
        }else{
            line = testLine;
        }
    }

    if(line){
        lines.push(line);
    }

    lines = lines.slice(0, maxLines);

    lines.forEach((lineText, index) => {
        const isLast = index === maxLines - 1 && lines.length === maxLines;
        let output = lineText;

        if(isLast && ctx.measureText(output).width > maxWidth){
            while(output.length > 0 && ctx.measureText(output + "…").width > maxWidth){
                output = output.slice(0, -1);
            }
            output += "…";
        }

        ctx.fillText(output, x, y + (index * lineHeight));
    });
}

function canvasToBlob(canvas){
    return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), "image/png", 0.95);
    });
}

async function generateInstagramStoryImage(){
    if(!selectedShareAlbumId){
        return;
    }

    const item = getAlbumItemById(selectedShareAlbumId);
    if(!item){
        showShareToast("投稿データを取得できませんでした");
        return;
    }

    const album = item.data || {};
    const posterProfile = await getPosterProfileForAlbum(album);
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1920;

    const ctx = canvas.getContext("2d");

    function fillRoundRect(x, y, width, height, radius, color){
        ctx.save();
        roundRect(ctx, x, y, width, height, radius);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
    }

    function strokeRoundRect(x, y, width, height, radius, color, lineWidth = 1){
        ctx.save();
        roundRect(ctx, x, y, width, height, radius);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
        ctx.restore();
    }

    function splitWrappedLines(textValue, maxWidth, maxLines){
        const chars = Array.from(String(textValue || ""));
        let line = "";
        let lines = [];

        for(const char of chars){
            const testLine = line + char;
            if(ctx.measureText(testLine).width > maxWidth && line){
                lines.push(line);
                line = char;
            }else{
                line = testLine;
            }
        }

        if(line){
            lines.push(line);
        }

        if(lines.length > maxLines){
            lines = lines.slice(0, maxLines);
            let lastLine = lines[maxLines - 1];
            while(lastLine.length > 0 && ctx.measureText(lastLine + "…").width > maxWidth){
                lastLine = lastLine.slice(0, -1);
            }
            lines[maxLines - 1] = lastLine + "…";
        }

        return lines;
    }

    function drawCenteredWrappedText(textValue, centerX, topY, maxWidth, lineHeight, maxLines){
        const lines = splitWrappedLines(textValue, maxWidth, maxLines);
        lines.forEach((lineText, index) => {
            const width = ctx.measureText(lineText).width;
            ctx.fillText(lineText, centerX - (width / 2), topY + (index * lineHeight));
        });
        return lines.length;
    }

    function drawMeterRow(y, leftIcon, leftLabel, rightIcon, rightLabel, value){
        const safeValue = Math.max(1, Math.min(5, Number(value) || 3));
        const leftIconCenterX = 110;
        const leftLabelX = 144;
        const lineLeft = 272;
        const lineRight = 820;
        const rightIconCenterX = 876;
        const rightAreaRight = 980;
        const step = (lineRight - lineLeft) / 4;
        const selectedX = lineLeft + ((safeValue - 1) * step);

        ctx.save();
        ctx.fillStyle = "#f0d6a8";
        ctx.font = "700 34px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(leftIcon, leftIconCenterX, y);

        ctx.font = "700 30px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(rightIcon, rightIconCenterX, y);
        ctx.restore();

        ctx.fillStyle = "rgba(255,245,228,0.96)";
        ctx.font = "700 24px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(leftLabel, leftLabelX, y + 10);

        const rightWidth = ctx.measureText(rightLabel).width;
        ctx.fillText(rightLabel, rightAreaRight - rightWidth, y + 10);

        const lineGradient = ctx.createLinearGradient(lineLeft, y, lineRight, y);
        lineGradient.addColorStop(0, "rgba(102,136,186,0.82)");
        lineGradient.addColorStop(0.5, "rgba(205,208,215,0.74)");
        lineGradient.addColorStop(1, "rgba(246,155,107,0.90)");
        ctx.strokeStyle = lineGradient;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(lineLeft, y);
        ctx.lineTo(lineRight, y);
        ctx.stroke();

        ctx.save();
        ctx.shadowColor = "rgba(255,255,255,0.42)";
        ctx.shadowBlur = 18;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(selectedX, y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawKeywordChip(textValue, x, y){
        const label = `#${String(textValue || "").replace(/^#+/, "")}`;
        ctx.font = "600 21px -apple-system, BlinkMacSystemFont, sans-serif";
        const width = Math.ceil(ctx.measureText(label).width) + 44;
        fillRoundRect(x, y, width, 54, 27, "rgba(20,22,25,0.42)");
        strokeRoundRect(x, y, width, 54, 27, "rgba(255,255,255,0.18)", 1.6);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x + 22, y + 34);
        return width;
    }

    function getDisplayDescription(){
        return (
            album.desc ||
            album.description ||
            album.comment ||
            album.review ||
            "この音楽の魅力を、Album Collectionで記録しよう。"
        );
    }

    function getKeywordList(){
        return normalizeKeywords(album.keywords ?? []).filter(Boolean).slice(0, 4);
    }

    const coverImage = await loadImageForCanvas(album.cover || "");

    if(coverImage){
        try{
            ctx.save();
            ctx.filter = "blur(34px)";
            ctx.globalAlpha = 0.58;
            const scale = Math.max(canvas.width / coverImage.width, canvas.height / coverImage.height);
            const drawW = coverImage.width * scale;
            const drawH = coverImage.height * scale;
            const drawX = (canvas.width - drawW) / 2;
            const drawY = (canvas.height - drawH) / 2;
            ctx.drawImage(coverImage, drawX, drawY, drawW, drawH);
            ctx.restore();
        }catch(error){
            console.warn("背景画像の描画に失敗しました", error);
        }
    }

    const bgGradient = ctx.createLinearGradient(0, 0, 0, 1920);
    bgGradient.addColorStop(0, "rgba(40,30,18,0.16)");
    bgGradient.addColorStop(0.26, "rgba(15,18,24,0.30)");
    bgGradient.addColorStop(0.60, "rgba(9,12,17,0.60)");
    bgGradient.addColorStop(1, "rgba(5,7,10,0.92)");
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, 1080, 1920);

    const darkGradient = ctx.createLinearGradient(0, 220, 0, 1920);
    darkGradient.addColorStop(0, "rgba(255,255,255,0.00)");
    darkGradient.addColorStop(0.38, "rgba(8,11,16,0.24)");
    darkGradient.addColorStop(1, "rgba(5,7,10,0.72)");
    ctx.fillStyle = darkGradient;
    ctx.fillRect(0, 0, 1080, 1920);

    ctx.fillStyle = "rgba(255,255,255,0.34)";
    ctx.beginPath();
    ctx.arc(120, 84, 2.5, 0, Math.PI * 2);
    ctx.arc(212, 66, 1.8, 0, Math.PI * 2);
    ctx.arc(932, 145, 3.0, 0, Math.PI * 2);
    ctx.arc(845, 110, 2.0, 0, Math.PI * 2);
    ctx.fill();

    const coverSize = 540;
    const coverX = (1080 - coverSize) / 2;
    const coverY = 108;

    fillRoundRect(coverX - 6, coverY + 14, coverSize + 12, coverSize + 12, 36, "rgba(0,0,0,0.16)");

    ctx.save();
    roundRect(ctx, coverX, coverY, coverSize, coverSize, 34);
    ctx.clip();
    ctx.fillStyle = "rgba(255,255,255,0.94)";
    ctx.fillRect(coverX, coverY, coverSize, coverSize);

    if(coverImage){
        try{
            const sourceSize = Math.min(coverImage.width, coverImage.height);
            const sx = (coverImage.width - sourceSize) / 2;
            const sy = (coverImage.height - sourceSize) / 2;
            ctx.drawImage(coverImage, sx, sy, sourceSize, sourceSize, coverX, coverY, coverSize, coverSize);
        }catch(error){
            console.warn("ジャケット画像の描画に失敗しました", error);
            ctx.fillStyle = "#f5f1eb";
            ctx.fillRect(coverX, coverY, coverSize, coverSize);
        }
    }

    ctx.restore();
    strokeRoundRect(coverX, coverY, coverSize, coverSize, 34, "rgba(255,255,255,0.70)", 2.2);

    const centerX = 540;

    ctx.fillStyle = "#ffffff";
    ctx.font = "900 76px -apple-system, BlinkMacSystemFont, sans-serif";
    const titleTop = 760;
    const titleLineCount = drawCenteredWrappedText(album.title || "Untitled", centerX, titleTop, 770, 84, 2);

    const artistTop = titleTop + (titleLineCount * 84) + 12;
    ctx.fillStyle = "#f1d39b";
    ctx.font = "800 38px -apple-system, BlinkMacSystemFont, sans-serif";
    drawCenteredWrappedText(album.artist || "Unknown Artist", centerX, artistTop, 760, 48, 2);

    drawMeterRow(960, "☾", "暗い", "☼", "明るい", album.darkness);
    drawMeterRow(1032, "♪", "静か", "✹", "激しい", album.intense);
    drawMeterRow(1104, "◯", "シンプル", "◈", "複雑", album.complex);
    drawMeterRow(1176, "✩", "絶望", "✦", "希望", album.hope);
    drawMeterRow(1248, "◉", "個人", "◎", "世界", album.world);

    const description = getDisplayDescription();
    ctx.font = "500 25px -apple-system, BlinkMacSystemFont, sans-serif";
    const descLines = splitWrappedLines(description, 730, 4);
    const reviewBoxX = 92;
    const reviewBoxY = 1308;
    const reviewBoxW = 896;
    const reviewBoxH = Math.max(166, 62 + (descLines.length * 44));

    fillRoundRect(reviewBoxX, reviewBoxY, reviewBoxW, reviewBoxH, 32, "rgba(18,20,24,0.46)");
    strokeRoundRect(reviewBoxX, reviewBoxY, reviewBoxW, reviewBoxH, 32, "rgba(255,255,255,0.12)", 1.8);

    ctx.fillStyle = "rgba(255,255,255,0.96)";
    ctx.font = "500 25px -apple-system, BlinkMacSystemFont, sans-serif";
    descLines.forEach((lineText, index) => {
        ctx.fillText(lineText, 132, reviewBoxY + 62 + (index * 44));
    });

    const keywords = getKeywordList();
    let avatarY;

    if(keywords.length > 0){
        let chipX = 128;
        const chipY = reviewBoxY + reviewBoxH + 28;
        keywords.forEach((keyword) => {
            const width = drawKeywordChip(keyword, chipX, chipY);
            chipX += width + 16;
        });
        avatarY = chipY + 96;
    }else{
        avatarY = reviewBoxY + reviewBoxH + 38;
    }

    const avatarX = 188;
    const avatarSize = 70;
    const avatarImage = posterProfile?.iconUrl ? await loadImageForCanvas(posterProfile.iconUrl) : null;

    ctx.save();
    ctx.beginPath();
    ctx.arc(avatarX + (avatarSize / 2), avatarY + (avatarSize / 2), avatarSize / 2, 0, Math.PI * 2);
    ctx.clip();

    if(avatarImage){
        try{
            ctx.drawImage(avatarImage, avatarX, avatarY, avatarSize, avatarSize);
        }catch(error){
            console.warn("アバター描画に失敗しました", error);
            fillRoundRect(avatarX, avatarY, avatarSize, avatarSize, 35, "rgba(255,255,255,0.88)");
        }
    }else{
        fillRoundRect(avatarX, avatarY, avatarSize, avatarSize, 35, "rgba(255,255,255,0.88)");
        ctx.fillStyle = "#1d2430";
        ctx.font = "800 28px -apple-system, BlinkMacSystemFont, sans-serif";
        const initial = getInitialLetter(posterProfile?.name || "匿");
        const initialWidth = ctx.measureText(initial).width;
        ctx.fillText(initial, avatarX + (avatarSize / 2) - (initialWidth / 2), avatarY + 44);
    }

    ctx.restore();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(avatarX + (avatarSize / 2), avatarY + (avatarSize / 2), (avatarSize / 2) - 1, 0, Math.PI * 2);
    ctx.stroke();

    const displayName = posterProfile?.name || "music_lover";
    const handleBase = String(displayName)
        .trim()
        .replace(/^@+/, "")
        .replace(/\s+/g, "_")
        .replace(/[^a-zA-Z0-9_ぁ-んァ-ヶ一-龠]/g, "") || "music_lover";

    ctx.fillStyle = "rgba(255,255,255,0.98)";
    ctx.font = "500 27px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText(`by @${handleBase}`, 280, avatarY + 43);

    const logoCenterY = Math.min(avatarY + 154, 1852);
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    const logoBaseX = 340;
    [24, 52, 78, 52, 24].forEach((height, index) => {
        const x = logoBaseX + (index * 18);
        ctx.beginPath();
        ctx.moveTo(x, logoCenterY - (height / 2));
        ctx.lineTo(x, logoCenterY + (height / 2));
        ctx.stroke();
    });

    ctx.fillStyle = "rgba(255,255,255,0.98)";
    ctx.font = "500 38px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText("Album Collection", 438, logoCenterY + 8);

    const blob = await canvasToBlob(canvas);

    if(!blob){
        showShareToast("画像生成に失敗しました");
        return;
    }

    const fileName = `album-collection-story-${selectedShareAlbumId}.png`;
    const file = new File([blob], fileName, { type:"image/png" });

    if(navigator.canShare && navigator.canShare({ files:[file] }) && navigator.share){
        try{
            await navigator.share({
                files:[file],
                title:"Album Collection",
                text:"ストーリー用画像"
            });
            closeShareMenu();
            return;
        }catch(error){
            if(error?.name !== "AbortError"){
                console.warn("画像共有に失敗しました", error);
            }
        }
    }

    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = objectUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(objectUrl);

    showShareToast("ストーリー用画像を生成しました");
    closeShareMenu();
}

        console.warn("自分のユーザー名取得に失敗しました", error);

async function createNotification(db, {

    fromUserId,
    fromUserName,
    type,
    albumId = "",
    albumTitle = "",
    commentText = ""
}){
    if(!toUserId || !fromUserId || toUserId === fromUserId){

    }

    await addDoc(collection(db, "notifications"), {
        toUserId,
        fromUserId,
        fromUserName,
        type,
        albumId,
        albumTitle,
        commentText,
        read: false,

async function notifyComment(db, currentUser, albumId, commentText){
    if(!currentUser || !albumId) return;
    const albumSnap = await getDoc(doc(db, "albums", albumId));
    if(!albumSnap.exists()) return;

        fromUserId: currentUser.uid,
        fromUserName,
        type: "comment",

        albumTitle: albumData.title || "",

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}


async function getPosterProfileForAlbum(album){
    const uid = album?.userId || "";
    const fallbackName = album?.userName || album?.displayName || album?.nickname || album?.userEmail || "匿名ユーザー";

    if(uid){
        await ensureUserLoaded(uid);
    }

    return {
        name: getUserName(uid, fallbackName),
        iconUrl: getUserIcon(uid)
    };
}

function getInitialLetter(name){
    return getFirstLetter(name || "匿名ユーザー");
}

function creatorAvatarHTML(profile){
    const iconUrl = profile?.iconUrl || "";
    const initialLetter = getInitialLetter(profile?.name);

    if(iconUrl){
        return `<img class="creator-avatar" src="${escapeHTML(iconUrl)}" alt="${escapeHTML(initialLetter)}">`;
    }

    return `<span class="creator-avatar-fallback">${escapeHTML(initialLetter)}</span>`;
}

function getFirstLetter(name){
    const text = String(name || "U").trim();
    return text ? text.slice(0,1).toUpperCase() : "U";
}

function normalizeUser(raw, uid){
    raw = raw || {};

    const displayName =
        raw.displayName ||
        raw.name ||
        raw.nickname ||
        raw.userName ||
        raw.email ||
        "匿名ユーザー";

    const iconUrl =
        raw.icon ||
        raw.iconUrl ||
        raw.avatar ||
        raw.avatarUrl ||
        raw.photoURL ||
        raw.photoUrl ||
        raw.profileImage ||
        raw.profileImageUrl ||
        raw.imageUrl ||
        "";

    return {
        uid,
        displayName,
        email: raw.email || "",
        iconUrl
    };
}

async function ensureUserLoaded(uid){
    if(!uid) return;
    if(userCache[uid]) return;
    if(loadingUsers.has(uid)) return;

    loadingUsers.add(uid);

    try{
        const userSnap = await getDoc(doc(db, "users", uid));

        if(userSnap.exists()){
            userCache[uid] = normalizeUser(userSnap.data(), uid);
        } else {
            userCache[uid] = normalizeUser({}, uid);
        }
    } catch(error){
        console.error("ユーザー情報の取得に失敗しました", error);
        userCache[uid] = normalizeUser({}, uid);
    }

    loadingUsers.delete(uid);
    renderDetail();
}

function getUserName(uid, fallback){
    const cached = userCache[uid];

    return (
        cached?.displayName ||
        fallback ||
        "匿名ユーザー"
    );
}

function getUserIcon(uid){
    const cached = userCache[uid];
    return cached?.iconUrl || "";
}

function avatarHTML(uid, fallbackName, sizeClass = ""){
    if(uid){
        ensureUserLoaded(uid);
    }

    const name = getUserName(uid, fallbackName);
    const icon = getUserIcon(uid);

    if(icon){
        return `
            <img class="avatar ${sizeClass}"
                 src="${escapeHTML(icon)}"
                 alt="${escapeHTML(name)}"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
            <span class="avatar avatar-fallback ${sizeClass}" style="display:none;">
                ${escapeHTML(getFirstLetter(name))}
            </span>
        `;
    }

    return `
        <span class="avatar avatar-fallback ${sizeClass}">
            ${escapeHTML(getFirstLetter(name))}
        </span>
    `;
}

function formatPostDate(value){
    if(!value){
        return "";
    }

    let date = null;

    if(typeof value.toDate === "function"){
        date = value.toDate();
    } else if(value instanceof Date){
        date = value;
    } else if(typeof value === "number"){
        date = new Date(value);
    } else if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            date = parsed;
        }
    }

    if(!date || Number.isNaN(date.getTime())){
        return "";
    }

    const now = new Date();
    const diffMs = now.getTime() - date.getTime();
    const diffMinutes = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if(diffMinutes < 1){
        return "今";
    }

    if(diffMinutes < 60){
        return `${diffMinutes}分前`;
    }

    if(diffHours < 24){
        return `${diffHours}時間前`;
    }

    if(diffDays < 7){
        return `${diffDays}日前`;
    }

    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function normalizeKeywords(value){
    if(Array.isArray(value)){
        return value
            .map(keyword => String(keyword ?? "").trim())
            .filter(Boolean);
    }

    if(typeof value === "string"){
        return value
            .split(/[\s,、#]+/)
            .map(keyword => keyword.trim())
            .filter(Boolean);
    }

    return [];
}

function renderKeywordTags(value){
    const keywords = normalizeKeywords(value);

    if(keywords.length === 0){
        return `<span class="keyword-empty">未設定</span>`;
    }

    return keywords.map((keyword) => {
        const safeKeyword = escapeHTML(keyword);
        const encodedKeyword = encodeURIComponent(keyword);

        return `
            <button
                type="button"
                class="keyword-tag"
                data-keyword="${encodedKeyword}"
            >#${safeKeyword}</button>
        `;
    }).join("");
}

function renderKeywords(keywords){
    return `
        <div class="keyword-box">
            <div class="keyword-title">キーワード</div>
            <div class="keyword-tags">${renderKeywordTags(keywords)}</div>
        </div>
    `;
}

document.addEventListener("click", (event) => {
    const keywordButton = event.target.closest(".keyword-tag");

    if(!keywordButton){
        return;
    }

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    const keyword = decodeURIComponent(keywordButton.dataset.keyword || "").trim();

    if(!keyword){
        return;
    }

    location.href = `./search.html?q=${encodeURIComponent(keyword)}`;
}, true);

function getLikeCount(){

}

function isLikedByMe(){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe()){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });

        await notifyLike(db, currentUser, albumId);
    }
}

async function addComment(){

        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const input = document.getElementById("commentInput");
    const text = input.value.trim();

    if(!text){
        alert("コメントを入力してください");
        return;
    }

    if(text.length > 200){
        alert("コメントは200文字以内にしてください");
        return;
    }

    await addDoc(collection(db, "comments"), {
        albumId: albumId,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        text: text,
        createdAt: serverTimestamp()
    });

    await notifyComment(db, currentUser, albumId, text);

    input.value = "";
}

    if(!currentUser) return;

    if(!confirm("このコメントを削除しますか？")){
        return;

    await deleteDoc(doc(db, "comments", commentId));
}

function getComments(){
    return allComments
        .filter(comment => comment.albumId === albumId)
        .sort((a,b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return aTime - bTime;
        });
}

function renderComments(){
    const comments = getComments();

    if(comments.length === 0){
        return `<div style="color:#777;">まだコメントはありません</div>`;
    }

    return comments.map((comment) => {
        const canDelete =
            currentUser &&
            currentUser.uid === comment.userId;

        const commentName = getUserName(
            comment.userId,
            comment.userName || comment.userEmail || "匿名ユーザー"

        return `

            </div>
        `;
    }).join("");
}

            <div class="comment-list">

async function loadAlbum(){
    if(!albumId){
        renderDetail();
        return;
    }

    const albumRef = doc(db, "albums", albumId);
    const albumSnap = await getDoc(albumRef);

    if(!albumSnap.exists()){
        detailWrap.innerHTML = `<div class="empty">投稿が見つかりません</div>`;
        return;
    }

    albumData = albumSnap.data();

    if(albumData.userId){
        ensureUserLoaded(albumData.userId);
    }

    renderDetail();
}

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    renderDetail();
});

const commentsQuery = query(
    collection(db, "comments"),
    where("albumId", "==", albumId || "__none__")
);

onSnapshot(commentsQuery, (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        allComments.push({
            id: docSnap.id,
            ...data
        });

        if(data.userId){
            ensureUserLoaded(data.userId);
        }
    });

    renderDetail();
});

loadAlbum();
