<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Detail - Album Collection</title>

<style>
/* ============================================================
   Album Collection detail.html
   index参照版
   - PC版：indexのPCカードに寄せた横型レイアウト
   - スマホ版：indexのスマホカードに寄せた縦型カード
   - コメント欄は投稿カードの下に配置
============================================================ */

:root{
    --bg:#050505;
    --panel:#080909;
    --panel-2:#0b0d0e;
    --border:rgba(255,255,255,0.15);
    --border-soft:rgba(255,255,255,0.10);

    --text:#ffffff;
    --text-soft:#dce3e6;
    --muted:#aab3b8;

    --accent:#9fcdd9;
    --accent-hover:#b7dfe7;

    --pale-1:#7faebb;
    --pale-2:#9bc7d0;
    --pale-3:#b9dde3;
    --pale-4:#d7edf0;
    --pale-5:#edf8f9;

    --meter-off:#48555b;
    --meter-line-off:#333d42;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    padding:38px 30px 120px 252px;
}

a{
    color:inherit;
}

/* ===== PC Sidebar ===== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:220px;
    height:100vh;
    background:#060708;
    border-right:1px solid rgba(255,255,255,0.08);
    padding:28px 20px;
    overflow-y:auto;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.04;
    margin-bottom:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:12px;
    font-size:15px;
}

.sidebar a:hover{
    background:#141617;
}

.sidebar a.active{
    background:#17191a;
    color:var(--accent);
}

/* ===== Mobile Tabbar ===== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:white;
    font-weight:700;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== Floating Post Button ===== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:var(--accent-hover);
}

/* ===== Header ===== */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:26px;
    max-width:1230px;
}

.page-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-0.045em;
}

.btn,
.like-btn,
.comment-btn,
.delete-comment-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:11px 16px;
    font-size:14px;
    cursor:pointer;
    border-radius:999px;
}

.btn:hover,
.like-btn:hover,
.comment-btn:hover,
.delete-comment-btn:hover{
    background:#2a2a2a;
}

/* ===== Detail Layout ===== */

.detail-wrap{
    max-width:1230px;
    margin:0;
}

.post-card{
    position:relative;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    overflow:hidden;
    display:grid;
    grid-template-columns:180px minmax(0,1fr);
    gap:16px;
    align-items:stretch;
    box-shadow:none;
}

.album-main{
    min-width:0;
    width:180px;
    max-width:180px;
    display:block;
}

.cover{
    width:160px;
    height:160px;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    display:block;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:4px;
    margin:0 0 12px 0;
}

.album-text{
    min-width:0;
}

.title{
    font-size:25px;
    font-weight:900;
    line-height:1.06;
    letter-spacing:-0.045em;
    margin-bottom:5px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.artist{
    color:var(--accent);
    font-size:15px;
    font-weight:800;
    line-height:1.25;
    margin-bottom:6px;
    word-break:break-word;
}

.meta{
    color:#c5cbd0;
    font-size:11px;
    line-height:1.35;
    margin-bottom:8px;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.creator{
    color:var(--muted);
    font-size:11.5px;
    line-height:1.45;
    margin-bottom:7px;
    word-break:break-word;
}

.creator a{
    color:var(--accent);
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.avatar{
    width:24px;
    height:24px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
    border:1px solid rgba(255,255,255,0.14);
    flex-shrink:0;
}

.avatar-fallback{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#ddd;
    font-size:11px;
    font-weight:800;
}

.creator-with-avatar{
    display:flex;
    align-items:center;
    gap:7px;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:10px;
    color:#b6c0c4;
    font-size:11.5px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#b6c0c4;
    padding:0;
    font-size:16px;
    cursor:pointer;
    line-height:1;
}

.like-btn:hover,
.like-btn.liked{
    color:white;
    background:none;
}

.like-count,
.comment-count{
    font-size:11.5px;
    color:#b6c0c4;
}

/* ===== Right side ===== */

.album-analysis{
    min-width:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-self:stretch;

    border:1px solid rgba(255,255,255,0.13);
    border-radius:14px;
    padding:17px 14px 14px;
    background:#070808;
}

.meter-list{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:0;
    padding-bottom:14px;
}

.meter{
    display:grid;
    grid-template-columns:44px minmax(0,1fr) 48px;
    align-items:center;
    gap:8px;
    min-width:0;
    width:100%;
    margin-bottom:0;
}

.meter-label{
    color:#f3f7f8;
    font-size:13px;
    font-weight:800;
    line-height:1;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid var(--meter-off);
    background:transparent;
    flex:0 0 16px;
}

.connector{
    height:1px;
    background:var(--meter-line-off);
    flex:1;
    min-width:18px;
}

.dot.active.level-1,
.connector.active.level-1{
    background:var(--pale-1);
    border-color:var(--pale-1);
}

.dot.active.level-2,
.connector.active.level-2{
    background:var(--pale-2);
    border-color:var(--pale-2);
}

.dot.active.level-3,
.connector.active.level-3{
    background:var(--pale-3);
    border-color:var(--pale-3);
}

.dot.active.level-4,
.connector.active.level-4{
    background:var(--pale-4);
    border-color:var(--pale-4);
}

.dot.active.level-5,
.connector.active.level-5{
    background:var(--pale-5);
    border-color:var(--pale-5);
}

.dot.active{
    box-shadow:0 0 16px rgba(159,205,217,0.14);
}

.keyword-box{
    flex-shrink:0;
    margin-top:0;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:9px 10px;

    display:grid;
    grid-template-columns:62px minmax(0,1fr);
    gap:10px;
    align-items:start;
}

.keyword-title{
    color:var(--accent);
    font-size:11px;
    font-weight:800;
}

.keyword-text{
    color:#dde6e8;
    font-size:10.5px;
    line-height:1.5;
    word-break:break-word;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.keyword-tags{
    min-width:0;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    max-height:42px;
    overflow:hidden;
}

.keyword-tag{
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    max-width:100%;
    color:#dde6e8;
    font-size:10.5px;
    line-height:1;
    text-decoration:none;
    word-break:break-word;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    padding:5px 8px;
    background:rgba(255,255,255,0.025);
}

.keyword-tag:hover{
    border-color:rgba(159,205,217,0.48);
    color:white;
}

.keyword-empty{
    color:#777;
    font-size:11px;
}

.review-panel{
    margin-top:18px;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
}

.review-title{
    color:var(--accent);
    font-size:13px;
    font-weight:900;
    margin-bottom:10px;
}

.review{
    color:var(--text-soft);
    font-size:14px;
    line-height:1.85;
    word-break:break-word;
    white-space:pre-wrap;
}

/* ===== Comments ===== */

.comments-panel{
    margin-top:18px;
    background:#070808;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
}

.comments-title{
    font-size:19px;
    font-weight:900;
    margin-bottom:20px;
}

.comment-form{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:24px;
}

.comment-form-main{
    flex:1;
}

.comment-input{
    width:100%;
    padding:10px 0;
    background:transparent;
    color:white;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.28);
    font-size:15px;
    outline:none;
}

.comment-input:focus{
    border-bottom-color:white;
}

.comment-submit-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
}

.comment-btn{
    padding:9px 16px;
    background:#f1f1f1;
    color:#050505;
    border:none;
    font-weight:800;
}

.comment-list{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.comment-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.comment-body{
    flex:1;
    min-width:0;
    text-align:left;
}

.comment-meta{
    display:flex;
    align-items:center;
    gap:8px;
    color:#aaa;
    font-size:13px;
    margin-bottom:5px;
}

.comment-name{
    color:#f0f0f0;
    font-weight:800;
}

.comment-text{
    color:#e0e0e0;
    line-height:1.65;
    font-size:15px;
    word-break:break-word;
    white-space:pre-wrap;
    text-align:left;
    margin:0;
}

.comment-menu{
    margin-top:8px;
}

.delete-comment-btn{
    padding:5px 10px;
    font-size:12px;
    background:#171717;
    color:#aaa;
}

.empty{
    color:#888;
    font-size:24px;
}

.mobile-post-date{
    display:none;
}

/* ===== PC narrow ===== */

@media(min-width:901px) and (max-width:1280px){
    body{
        padding-left:236px;
        padding-right:20px;
    }

    .sidebar{
        width:210px;
    }

    .post-card{
        grid-template-columns:165px minmax(0,1fr);
        gap:14px;
        padding:16px;
    }

    .album-main{
        width:165px;
        max-width:165px;
    }

    .cover{
        width:145px;
        height:145px;
    }

    .title{
        font-size:22px;
    }

    .meter{
        grid-template-columns:40px minmax(0,1fr) 46px;
        gap:7px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:14px;
        height:14px;
        flex-basis:14px;
    }

    .connector{
        min-width:14px;
    }
}

/* ===== Smartphone ===== */

@media(max-width:900px){
    body{
        padding:16px 16px 112px;
        overflow-x:hidden;
    }

    .sidebar{
        display:none;
    }

    .topbar{
        margin-bottom:20px;
    }

    .page-title{
        font-size:34px;
        line-height:1.05;
        letter-spacing:-0.055em;
        margin-top:26px;
    }

    .topbar .btn{
        display:none;
    }

    .detail-wrap{
        width:100%;
        max-width:none;
        margin:0;
    }

    .post-card{
        position:relative;
        display:grid;
        grid-template-columns:1fr;
        gap:0;
        padding:14px;
        border-radius:18px;
        background:linear-gradient(135deg,#121415 0%,#090a0b 58%,#070808 100%);
        border:1px solid rgba(255,255,255,0.14);
        overflow:hidden;
    }

    .album-main{
        display:grid;
        grid-template-columns:120px minmax(0,1fr);
        gap:14px;
        align-items:start;
        width:100%;
        max-width:none;
        min-width:0;
        padding:0 50px 12px 0;
        border-bottom:1px solid rgba(255,255,255,0.10);
    }

    .cover{
        width:120px;
        height:120px;
        aspect-ratio:1/1;
        object-fit:cover;
        border-radius:10px;
        margin:0;
        border:1px solid rgba(255,255,255,0.18);
        background:#111;
    }

    .album-text{
        display:block;
        min-width:0;
    }

    .title{
        font-size:20px;
        line-height:1.12;
        letter-spacing:-0.035em;
        margin:0 0 5px;
        -webkit-line-clamp:2;
    }

    .artist{
        color:#9fcdd9;
        font-size:14px;
        line-height:1.25;
        font-weight:800;
        margin:0 0 8px;
    }

    .meta{
        font-size:12px;
        color:#d8d8d8;
        margin:0 0 8px;
        -webkit-line-clamp:1;
    }

    .creator{
        font-size:12px;
        line-height:1.45;
        color:#aaa;
        margin:0 0 8px;
        word-break:break-word;
    }

    .creator a{
        color:#9fcdd9;
    }

    .avatar{
        width:22px;
        height:22px;
    }

    .reaction-row{
        display:flex;
        flex-direction:row;
        align-items:center;
        gap:20px;
        margin:0;
        font-size:14px;
        color:#ddd;
    }

    .like-area{
        gap:8px;
    }

    .like-btn{
        font-size:21px;
        color:#fff;
        line-height:1;
    }

    .like-count,
    .comment-count{
        font-size:14px;
        color:#ddd;
    }

    .mobile-post-date{
        display:block;
        position:absolute;
        top:20px;
        right:18px;
        color:#d7d7d7;
        font-size:13px;
        font-weight:700;
        line-height:1;
        z-index:2;
        pointer-events:none;
    }

    .album-analysis{
        width:100%;
        height:auto;
        min-width:0;
        display:block;
        margin:0;
        padding:13px 0 0;
        border:none;
        border-radius:0;
        background:transparent;
    }

    .meter-list{
        flex:initial;
        display:flex;
        flex-direction:column;
        gap:9px;
        padding:0 0 13px;
        border-bottom:1px solid rgba(255,255,255,0.10);
    }

    .meter{
        display:grid;
        grid-template-columns:58px minmax(0,1fr) 58px;
        gap:10px;
        align-items:center;
        margin:0;
        width:100%;
    }

    .meter-label{
        font-size:13px;
        font-weight:800;
        color:#f2f2f2;
        line-height:1;
        white-space:nowrap;
    }

    .meter-graphic{
        position:relative;
        display:grid;
        grid-template-columns:repeat(5, 1fr);
        align-items:center;
        width:100%;
        height:18px;
        min-width:0;
        overflow:visible;
    }

    .meter-graphic::before{
        content:"";
        position:absolute;
        left:7px;
        right:7px;
        top:50%;
        height:2px;
        transform:translateY(-50%);
        border-radius:999px;
        z-index:0;
        background:linear-gradient(
            90deg,
            #162025 0%,
            #405f69 34%,
            #8bb7c3 66%,
            #d7edf0 100%
        );
    }

    .meter-graphic .connector{
        display:none;
    }

    .meter-graphic .dot{
        position:relative;
        z-index:1;
        grid-row:1;
        justify-self:center;
        align-self:center;

        width:16px;
        height:16px;
        flex:none;
        margin:0;
        border-radius:50%;
        box-sizing:border-box;

        opacity:0;
        transform:none;
        border:0;
        box-shadow:none;
        background:transparent;
    }

    .meter-graphic .dot.level-1{ grid-column:1; }
    .meter-graphic .dot.level-2{ grid-column:2; }
    .meter-graphic .dot.level-3{ grid-column:3; }
    .meter-graphic .dot.level-4{ grid-column:4; }
    .meter-graphic .dot.level-5{ grid-column:5; }

    .meter-graphic .dot.selected{
        opacity:1;
        border:3px solid #f0fbfc;
        box-shadow:0 0 12px rgba(220,245,250,0.40);
    }

    .meter-graphic .dot.selected.level-1{
        background:#162025;
        border-color:#9fcdd9;
        box-shadow:0 0 10px rgba(22,32,37,0.70);
    }

    .meter-graphic .dot.selected.level-2{
        background:#405f69;
        border-color:#edf8f9;
        box-shadow:0 0 10px rgba(64,95,105,0.48);
    }

    .meter-graphic .dot.selected.level-3{
        background:#8bb7c3;
        border-color:#edf8f9;
        box-shadow:0 0 10px rgba(139,183,195,0.42);
    }

    .meter-graphic .dot.selected.level-4{
        background:#d7edf0;
        border-color:#f7fcfd;
        box-shadow:0 0 10px rgba(215,237,240,0.42);
    }

    .meter-graphic .dot.selected.level-5{
        background:#f0fbfc;
        border-color:#ffffff;
        box-shadow:0 0 10px rgba(240,251,252,0.48);
    }

    .keyword-box{
        margin:12px 0 0;
        padding:0;
        border:none;
        border-radius:0;
        display:flex;
        align-items:center;
        gap:8px;
        overflow-x:auto;
        scrollbar-width:none;
        -webkit-overflow-scrolling:touch;
    }

    .keyword-box::-webkit-scrollbar{
        display:none;
    }

    .keyword-title{
        flex:0 0 auto;
        color:#9fcdd9;
        font-size:13px;
        font-weight:900;
        margin-right:4px;
    }

    .keyword-text{
        flex:0 0 auto;
        color:#e5e5e5;
        font-size:13px;
        line-height:1;
        white-space:nowrap;
        display:block;
        overflow:visible;
        max-width:none;
        border:1px solid rgba(255,255,255,0.14);
        border-radius:999px;
        padding:7px 13px;
        background:rgba(255,255,255,0.02);
    }

    .keyword-tags{
        flex:1 1 auto;
        min-width:0;
        display:flex;
        flex-wrap:nowrap;
        gap:8px;
        max-height:none;
        overflow-x:auto;
        overflow-y:hidden;
        scrollbar-width:none;

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const detailWrap = document.getElementById("detailWrap");
const mypageBtn = document.getElementById("mypageBtn");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");
const mobileMyPageAvatar = document.getElementById("mobileMyPageAvatar");
const mobileMyPageFallback = document.getElementById("mobileMyPageFallback");

const params = new URLSearchParams(location.search);
const albumId = params.get("id");

let currentUser = null;
let albumData = null;
let allLikes = [];
let allComments = [];

/*
    アイコン反映用キャッシュ。
    users コレクション側のフィールド名が多少違っても拾えるようにしている。
    対応フィールド例:
    icon, iconUrl, avatar, avatarUrl, photoURL, photoUrl,
    profileImage, profileImageUrl, imageUrl
*/
const userCache = {};
const loadingUsers = new Set();

onAuthStateChanged(auth, (user) => {
    updateMobileMyPageTab(user);
    currentUser = user;

    if(user){
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };

        const url = `profile.html?uid=${encodeURIComponent(user.uid)}`;

        if(myPageLink){
            myPageLink.href = url;
        }

        if(mobileMyPageLink){
            mobileMyPageLink.href = url;
        }

        ensureUserLoaded(user.uid);
    } else {
        mypageBtn.style.display = "none";

        if(myPageLink){
            myPageLink.href = "login.html";
        }

        if(mobileMyPageLink){
            mobileMyPageLink.href = "login.html";
        }
    }

    renderDetail();
});


function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink){
        return;
    }

    if(!user){
        mobileMyPageLink.href = "login.html";

        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }

        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }

        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if(!userSnap.exists()){
            return;
        }

        const iconUrl = getUserIconUrl(userSnap.data());

        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";
            mobileMyPageFallback.style.display = "none";

            mobileMyPageAvatar.onerror = () => {
                mobileMyPageAvatar.style.display = "none";
                mobileMyPageFallback.style.display = "flex";
            };
        }
    }catch(error){
        console.warn("マイページアイコンの取得に失敗しました", error);
    }
}


function getUserDisplayNameFromData(data){
    if(!data){
        return "";
    }

    return (
        data.displayName ||
        data.nickname ||
        data.nickName ||
        data.userName ||
        data.name ||
        ""
    );
}

async function getCurrentUserName(db, currentUser){
    if(!currentUser){
        return "匿名ユーザー";
    }

    try{
        const meSnap = await getDoc(doc(db, "users", currentUser.uid));
        if(meSnap.exists()){
            return getUserDisplayNameFromData(meSnap.data()) || "匿名ユーザー";
        }
    }catch(error){
        console.warn("自分のユーザー名取得に失敗しました", error);
    }

    return currentUser.displayName || "匿名ユーザー";
}

async function createNotification(db, {
    toUserId,
    fromUserId,
    fromUserName,
    type,
    albumId = "",
    albumTitle = "",
    commentText = ""
}){
    if(!toUserId || !fromUserId || toUserId === fromUserId){
        return;
    }

    await addDoc(collection(db, "notifications"), {
        toUserId,
        fromUserId,
        fromUserName,
        type,
        albumId,
        albumTitle,
        commentText,
        read: false,
        createdAt: serverTimestamp()
    });
}

async function notifyComment(db, currentUser, albumId, commentText){
    if(!currentUser || !albumId) return;
    const albumSnap = await getDoc(doc(db, "albums", albumId));
    if(!albumSnap.exists()) return;
    const albumData = albumSnap.data();
    const fromUserName = await getCurrentUserName(db, currentUser);
    await createNotification(db, {
        toUserId: albumData.userId,
        fromUserId: currentUser.uid,
        fromUserName,
        type: "comment",
        albumId,
        albumTitle: albumData.title || "",
        commentText: commentText || ""
    });
}

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getFirstLetter(name){
    const text = String(name || "U").trim();
    return text ? text.slice(0,1).toUpperCase() : "U";
}

function normalizeUser(raw, uid){
    raw = raw || {};

    const displayName =
        raw.displayName ||
        raw.name ||
        raw.nickname ||
        raw.userName ||
        raw.email ||
        "匿名ユーザー";

    const iconUrl =
        raw.icon ||
        raw.iconUrl ||
        raw.avatar ||
        raw.avatarUrl ||
        raw.photoURL ||
        raw.photoUrl ||
        raw.profileImage ||
        raw.profileImageUrl ||
        raw.imageUrl ||
        "";

    return {
        uid,
        displayName,
        email: raw.email || "",
        iconUrl
    };
}

async function ensureUserLoaded(uid){
    if(!uid) return;
    if(userCache[uid]) return;
    if(loadingUsers.has(uid)) return;

    loadingUsers.add(uid);

    try{
        const userSnap = await getDoc(doc(db, "users", uid));

        if(userSnap.exists()){
            userCache[uid] = normalizeUser(userSnap.data(), uid);
        } else {
            userCache[uid] = normalizeUser({}, uid);
        }
    } catch(error){
        console.error("ユーザー情報の取得に失敗しました", error);
        userCache[uid] = normalizeUser({}, uid);
    }

    loadingUsers.delete(uid);
    renderDetail();
}

function getUserName(uid, fallback){
    const cached = userCache[uid];

    return (
        cached?.displayName ||
        fallback ||
        "匿名ユーザー"
    );
}

function getUserIcon(uid){
    const cached = userCache[uid];
    return cached?.iconUrl || "";
}

function avatarHTML(uid, fallbackName, sizeClass = ""){
    if(uid){
        ensureUserLoaded(uid);
    }

    const name = getUserName(uid, fallbackName);
    const icon = getUserIcon(uid);

    if(icon){
        return `
            <img class="avatar ${sizeClass}"
                 src="${escapeHTML(icon)}"
                 alt="${escapeHTML(name)}"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
            <span class="avatar avatar-fallback ${sizeClass}" style="display:none;">
                ${escapeHTML(getFirstLetter(name))}
            </span>
        `;
    }

    return `
        <span class="avatar avatar-fallback ${sizeClass}">
            ${escapeHTML(getFirstLetter(name))}
        </span>
    `;
}

function formatPostDate(value){
    if(!value){
        return "";
    }

    let date = null;

    if(typeof value.toDate === "function"){
        date = value.toDate();
    } else if(value instanceof Date){
        date = value;
    } else if(typeof value === "number"){
        date = new Date(value);
    } else if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            date = parsed;
        }
    }

    if(!date || Number.isNaN(date.getTime())){
        return "";
    }

    const now = new Date();
    const diffMs = now.getTime() - date.getTime();
    const diffMinutes = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if(diffMinutes < 1){
        return "今";
    }

    if(diffMinutes < 60){
        return `${diffMinutes}分前`;
    }

    if(diffHours < 24){
        return `${diffHours}時間前`;
    }

    if(diffDays < 7){
        return `${diffDays}日前`;
    }

    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function normalizeKeywords(value){
    if(Array.isArray(value)){
        return value
            .map(keyword => String(keyword ?? "").trim())
            .filter(Boolean);
    }

    if(typeof value === "string"){
        return value
            .split(/[\s,、#]+/)
            .map(keyword => keyword.trim())
            .filter(Boolean);
    }

    return [];
}

function renderKeywordTags(value){
    const keywords = normalizeKeywords(value);

    if(keywords.length === 0){
        return `<span class="keyword-empty">未設定</span>`;
    }

    return keywords.map((keyword) => {
        const safeKeyword = escapeHTML(keyword);
        const encodedKeyword = encodeURIComponent(keyword);

        return `
            <button
                type="button"
                class="keyword-tag"
                data-keyword="${encodedKeyword}"
            >#${safeKeyword}</button>
        `;
    }).join("");
}

function renderKeywords(keywords){
    return `
        <div class="keyword-box">
            <div class="keyword-title">キーワード</div>
            <div class="keyword-tags">${renderKeywordTags(keywords)}</div>
        </div>
    `;
}

document.addEventListener("click", (event) => {
    const keywordButton = event.target.closest(".keyword-tag");

    if(!keywordButton){
        return;
    }

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    const keyword = decodeURIComponent(keywordButton.dataset.keyword || "").trim();

    if(!keyword){
        return;
    }

    location.href = `./search.html?q=${encodeURIComponent(keyword)}`;
}, true);


function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe()){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

async function addComment(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const input = document.getElementById("commentInput");
    const text = input.value.trim();

    if(!text){
        alert("コメントを入力してください");
        return;
    }

    if(text.length > 200){
        alert("コメントは200文字以内にしてください");
        return;
    }

    await addDoc(collection(db, "comments"), {
        albumId: albumId,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        text: text,
        createdAt: serverTimestamp()
    });

    await notifyComment(db, currentUser, albumId, text);

    input.value = "";
}

window.addComment = addComment;

async function deleteComment(commentId){
    if(!currentUser) return;

    if(!confirm("このコメントを削除しますか？")){
        return;
    }

    await deleteDoc(doc(db, "comments", commentId));
}

window.deleteComment = deleteComment;

function getComments(){
    return allComments
        .filter(comment => comment.albumId === albumId)
        .sort((a,b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return aTime - bTime;
        });
}

function renderComments(){
    const comments = getComments();

    if(comments.length === 0){
        return `<div style="color:#777;">まだコメントはありません</div>`;
    }

    return comments.map((comment) => {
        const canDelete =
            currentUser &&
            currentUser.uid === comment.userId;

        const commentName = getUserName(
            comment.userId,
            comment.userName || comment.userEmail || "匿名ユーザー"
        );

        return `
            <div class="comment-item">
                ${avatarHTML(comment.userId, commentName)}

                <div class="comment-body">
                    <div class="comment-meta">
                        <span class="comment-name">
                            ${escapeHTML(commentName)}
                        </span>
                    </div>

                    <div class="comment-text">${escapeHTML(comment.text || "")}</div>

                    ${
                        canDelete
                        ? `
                            <div class="comment-menu">
                                <button class="delete-comment-btn"
                                        onclick="deleteComment('${escapeHTML(comment.id)}')">
                                    削除
                                </button>
                            </div>
                        `
                        : ""
                    }
                </div>
            </div>
        `;
    }).join("");
}

function renderDetail(){
    if(!albumId){
        detailWrap.innerHTML = `<div class="empty">投稿IDがありません</div>`;
        return;
    }

    if(!albumData){
        return;
    }

    if(albumData.userId){
        ensureUserLoaded(albumData.userId);
    }

    const liked = isLikedByMe();
    const likeCount = getLikeCount();
    const comments = getComments();
    const commentCount = comments.length;

    const creatorName = getUserName(
        albumData.userId,
        albumData.userName || albumData.userEmail || "匿名ユーザー"
    );

    const myName = currentUser
        ? getUserName(currentUser.uid, currentUser.email || "自分")
        : "自分";

    const metaText = [albumData.year, albumData.country, albumData.genre]
        .filter(Boolean)
        .join(" / ") || albumData.year || "";

    const postDate = formatPostDate(albumData.createdAt || albumData.updatedAt);

    detailWrap.innerHTML = `
        <article class="post-card">
            <div class="album-main">
                <img class="cover"
                     src="${escapeHTML(albumData.cover || "")}"
                     alt="">

                <div class="album-text">
                    <div class="title">
                        ${escapeHTML(albumData.title || "")}
                    </div>

                    <div class="artist">
                        ${escapeHTML(albumData.artist || "")}
                    </div>

                    ${
                        metaText
                        ? `<div class="meta">${escapeHTML(metaText)}</div>`
                        : ""
                    }

                    <div class="creator">
                        <div class="creator-with-avatar">
                            ${avatarHTML(albumData.userId, creatorName)}
                            <span>
                                投稿者：<a href="profile.html?uid=${escapeHTML(albumData.userId || "")}">
                                    ${escapeHTML(creatorName)}
                                </a>
                            </span>
                        </div>
                    </div>

                    <div class="reaction-row">
                        <div class="like-area">
                            <button class="like-btn ${liked ? "liked" : ""}"
                                    onclick="toggleLike()">
                                ${liked ? "♥" : "♡"}
                            </button>
                            <span class="like-count">${likeCount}</span>
                        </div>

                        <div class="comment-count">コメント ${commentCount}件</div>
                    </div>
                </div>
            </div>

            ${
                postDate
                ? `<div class="mobile-post-date">${escapeHTML(postDate)}</div>`
                : ""
            }

            <div class="album-analysis">
                <div class="meter-list">
                    ${meter("暗い", "明るい", albumData.darkness)}
                    ${meter("静か", "激しい", albumData.intense)}
                    ${meter("シンプル", "複雑", albumData.complex)}
                    ${meter("絶望", "希望", albumData.hope)}
                    ${meter("個人", "世界", albumData.world)}
                </div>

                ${renderKeywords(albumData.keywords)}
            </div>
        </article>

        <section class="review-panel">
            <div class="review-title">レビュー</div>
            <div class="review">${escapeHTML(albumData.desc || "本文はありません")}</div>
        </section>

        <section class="comments-panel">
            <div class="comments-title">
                コメント ${commentCount}件
            </div>

            <div class="comment-form">
                ${avatarHTML(currentUser?.uid, myName)}

                <div class="comment-form-main">
                    <input
                        id="commentInput"
                        class="comment-input"
                        type="text"
                        maxlength="200"
                        placeholder="${currentUser ? "コメントを書く" : "ログインしてコメントする"}"
                    >

                    <div class="comment-submit-row">
                        <button class="comment-btn" onclick="addComment()">
                            コメント
                        </button>
                    </div>
                </div>
            </div>

            <div class="comment-list">
                ${renderComments()}
            </div>
        </section>
    `;
}

async function loadAlbum(){
    if(!albumId){
        renderDetail();
        return;
    }

    const albumRef = doc(db, "albums", albumId);
    const albumSnap = await getDoc(albumRef);

    if(!albumSnap.exists()){
        detailWrap.innerHTML = `<div class="empty">投稿が見つかりません</div>`;
        return;
    }

    albumData = albumSnap.data();

    if(albumData.userId){
        ensureUserLoaded(albumData.userId);
    }

    renderDetail();
}

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    renderDetail();
});

const commentsQuery = query(
    collection(db, "comments"),
    where("albumId", "==", albumId || "__none__")
);

onSnapshot(commentsQuery, (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        allComments.push({
            id: docSnap.id,
            ...data
        });

        if(data.userId){
            ensureUserLoaded(data.userId);
        }
    });

    renderDetail();
});

loadAlbum();

</script>

</body>
</html>
