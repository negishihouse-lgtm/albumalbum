<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Detail - Album Collection</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:36px 40px;
    padding-bottom:110px;
}

.topbar{
    max-width:920px;
    margin:0 auto 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.page-title{
    font-size:30px;
    font-weight:800;
    letter-spacing:-0.03em;
}

.btn,.like-btn,.comment-btn,.delete-comment-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:11px 16px;
    font-size:14px;
    cursor:pointer;
    border-radius:999px;
}

.btn:hover,.like-btn:hover,.comment-btn:hover,.delete-comment-btn:hover{
    background:#2a2a2a;
}

.detail-wrap{
    max-width:920px;
    margin:0 auto;
}

.post-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:22px;
    padding:22px;
}

.post-head{
    display:flex;
    gap:16px;
    align-items:flex-start;
}

.cover{
    width:108px;
    height:108px;
    object-fit:cover;
    background:#111;
    border-radius:14px;
    flex-shrink:0;
}

.post-info{
    min-width:0;
    flex:1;
}

.title{
    font-size:24px;
    font-weight:800;
    line-height:1.25;
    margin-bottom:5px;
    word-break:break-word;
}

.artist{
    font-size:17px;
    color:#6fa8dc;
    font-weight:700;
    margin-bottom:8px;
    word-break:break-word;
}

.meta{
    color:#888;
    font-size:13px;
    margin-bottom:8px;
}

.creator-line{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
    color:#bbb;
    font-size:14px;
}

.creator-line a{
    color:#ddd;
    text-decoration:none;
    font-weight:700;
}

.creator-line a:hover{
    text-decoration:underline;
}

.avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
    border:1px solid rgba(255,255,255,0.12);
    flex-shrink:0;
}

.avatar-fallback{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#ddd;
    font-size:12px;
    font-weight:800;
}

.post-actions{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    color:#aaa;
    font-size:14px;
}

.like-btn{
    padding:8px 13px;
}

.like-btn.liked{
    background:#6fa8dc;
    border-color:#6fa8dc;
    color:#06111a;
    font-weight:800;
}

.review{
    margin-top:18px;
    color:#e0e0e0;
    font-size:15px;
    line-height:1.85;
    word-break:break-word;
    white-space:pre-wrap;
}

.keyword-area{
    margin-top:16px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.keyword-tag{
    background:#121212;
    border:1px solid rgba(255,255,255,0.13);
    color:#ddd;
    padding:7px 10px;
    border-radius:999px;
    font-size:13px;
}

.meter-area{
    margin-top:18px;
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:16px;
    display:grid;
    gap:12px;
}

.meter{
    display:grid;
    grid-template-columns:66px minmax(90px,1fr) 66px;
    align-items:center;
    gap:10px;
}

.meter-label{
    font-size:13px;
    font-weight:700;
    color:#dcdcdc;
    white-space:nowrap;
}

.right-label{ text-align:right; }

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
}

.dot{
    width:13px;
    height:13px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:3px;
    background:#3b3f44;
    flex:1;
    min-width:5px;
}

.dot.active.level-1,.connector.active.level-1{ background:#3f8ec7; border-color:#3f8ec7; }
.dot.active.level-2,.connector.active.level-2{ background:#4d9bd0; border-color:#4d9bd0; }
.dot.active.level-3,.connector.active.level-3{ background:#5fa7d8; border-color:#5fa7d8; }
.dot.active.level-4,.connector.active.level-4{ background:#73b6e3; border-color:#73b6e3; }
.dot.active.level-5{ background:#8bc8ef; border-color:#8bc8ef; }

.comments-panel{
    margin-top:18px;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:22px;
    padding:22px;
}

.comments-title{
    font-size:19px;
    font-weight:800;
    margin-bottom:20px;
}

.comment-form{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:24px;
}

.comment-form-main{
    flex:1;
}

.comment-input{
    width:100%;
    padding:10px 0;
    background:transparent;
    color:white;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.28);
    font-size:15px;
    outline:none;
}

.comment-input:focus{
    border-bottom-color:white;
}

.comment-submit-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
}

.comment-btn{
    padding:9px 16px;
    background:#f1f1f1;
    color:#050505;
    border:none;
    font-weight:800;
}

.comment-list{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.comment-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.comment-body{
    flex:1;
    min-width:0;
}

.comment-meta{
    display:flex;
    align-items:center;
    gap:8px;
    color:#aaa;
    font-size:13px;
    margin-bottom:5px;
}

.comment-name{
    color:#f0f0f0;
    font-weight:800;
}

.comment-text{
    color:#e0e0e0;
    line-height:1.65;
    font-size:15px;
    word-break:break-word;
    white-space:pre-wrap;
}

.comment-menu{
    margin-top:8px;
}

.delete-comment-btn{
    padding:5px 10px;
    font-size:12px;
    background:#171717;
    color:#aaa;
}

.empty{
    color:#777;
    font-size:19px;
    padding:24px 0;
}

.mobile-tabbar{
    display:none;
}

@media(max-width:800px){
    body{
        padding:14px;
        padding-bottom:92px;
    }

    .topbar{
        margin-bottom:14px;
    }

    .page-title{
        font-size:22px;
    }

    .topbar .btn{
        display:none;
    }

    .post-card,
    .comments-panel{
        border-radius:18px;
        padding:15px;
    }

    .post-head{
        gap:12px;
    }

    .cover{
        width:86px;
        height:86px;
        border-radius:12px;
    }

    .title{
        font-size:18px;
        line-height:1.28;
    }

    .artist{
        font-size:14px;
        margin-bottom:6px;
    }

    .meta{
        font-size:12px;
    }

    .creator-line{
        font-size:12px;
        gap:6px;
        margin-bottom:10px;
    }

    .avatar{
        width:24px;
        height:24px;
    }

    .post-actions{
        gap:9px;
        font-size:12px;
    }

    .like-btn{
        padding:7px 11px;
        font-size:12px;
    }

    .review{
        font-size:14px;
        line-height:1.8;
        margin-top:15px;
    }

    .keyword-tag{
        font-size:12px;
        padding:6px 9px;
    }

    .meter{
        grid-template-columns:56px minmax(70px,1fr) 56px;
        gap:7px;
    }

    .meter-label{
        font-size:12px;
    }

    .dot{
        width:11px;
        height:11px;
    }

    .comments-title{
        font-size:17px;
        margin-bottom:17px;
    }

    .comment-form{
        gap:10px;
    }

    .comment-input{
        font-size:14px;
    }

    .comment-text{
        font-size:14px;
    }

    .mobile-tabbar{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:68px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        display:grid;
        grid-template-columns:repeat(5,1fr);
        z-index:100;
        backdrop-filter:blur(14px);
    }

    .mobile-tabbar button{
        background:transparent;
        border:none;
        color:#aaa;
        font-size:11px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:4px;
        cursor:pointer;
    }

    .mobile-tabbar .icon{
        font-size:20px;
        line-height:1;
    }

    .mobile-tabbar button.active{
        color:white;
        font-weight:800;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="page-title">Album Detail</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button class="btn" onclick="location.href='./index.html'">一覧へ戻る</button>
        <button id="mypageBtn" class="btn" style="display:none;">マイページ</button>
    </div>
</div>

<div class="detail-wrap" id="detailWrap">
    <div class="empty">読み込み中...</div>
</div>

<nav class="mobile-tabbar">
    <button onclick="location.href='./index.html'">
        <span class="icon">⌂</span>
        <span>ホーム</span>
    </button>
    <button onclick="location.href='./search.html'">
        <span class="icon">⌕</span>
        <span>検索</span>
    </button>
    <button onclick="location.href='./editor.html'">
        <span class="icon">＋</span>
        <span>投稿</span>
    </button>
    <button onclick="location.href='./notifications.html'">
        <span class="icon">♡</span>
        <span>通知</span>
    </button>
    <button id="mobileMypageBtn">
        <span class="icon">◯</span>
        <span>マイページ</span>
    </button>
</nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const detailWrap = document.getElementById("detailWrap");
const mypageBtn = document.getElementById("mypageBtn");
const mobileMypageBtn = document.getElementById("mobileMypageBtn");

const params = new URLSearchParams(location.search);
const albumId = params.get("id");

let currentUser = null;
let albumData = null;
let allLikes = [];
let allComments = [];

/*
    アイコン反映用キャッシュ。
    users コレクション側のフィールド名が多少違っても拾えるようにしている。
    対応フィールド例:
    icon, iconUrl, avatar, avatarUrl, photoURL, photoUrl,
    profileImage, profileImageUrl, imageUrl
*/
const userCache = {};
const loadingUsers = new Set();

onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if(user){
        mypageBtn.style.display = "inline-block";
        mypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };

        mobileMypageBtn.onclick = () => {
            location.href = `profile.html?uid=${user.uid}`;
        };

        ensureUserLoaded(user.uid);
    } else {
        mypageBtn.style.display = "none";
        mobileMypageBtn.onclick = () => {
            location.href = "login.html";
        };
    }

    renderDetail();
});

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getFirstLetter(name){
    const text = String(name || "U").trim();
    return text ? text.slice(0,1).toUpperCase() : "U";
}

function normalizeUser(raw, uid){
    raw = raw || {};

    const displayName =
        raw.displayName ||
        raw.name ||
        raw.nickname ||
        raw.userName ||
        raw.email ||
        "匿名ユーザー";

    const iconUrl =
        raw.icon ||
        raw.iconUrl ||
        raw.avatar ||
        raw.avatarUrl ||
        raw.photoURL ||
        raw.photoUrl ||
        raw.profileImage ||
        raw.profileImageUrl ||
        raw.imageUrl ||
        "";

    return {
        uid,
        displayName,
        email: raw.email || "",
        iconUrl
    };
}

async function ensureUserLoaded(uid){
    if(!uid) return;
    if(userCache[uid]) return;
    if(loadingUsers.has(uid)) return;

    loadingUsers.add(uid);

    try{
        const userSnap = await getDoc(doc(db, "users", uid));

        if(userSnap.exists()){
            userCache[uid] = normalizeUser(userSnap.data(), uid);
        } else {
            userCache[uid] = normalizeUser({}, uid);
        }
    } catch(error){
        console.error("ユーザー情報の取得に失敗しました", error);
        userCache[uid] = normalizeUser({}, uid);
    }

    loadingUsers.delete(uid);
    renderDetail();
}

function getUserName(uid, fallback){
    const cached = userCache[uid];

    return (
        cached?.displayName ||
        fallback ||
        "匿名ユーザー"
    );
}

function getUserIcon(uid){
    const cached = userCache[uid];
    return cached?.iconUrl || "";
}

function avatarHTML(uid, fallbackName, sizeClass = ""){
    if(uid){
        ensureUserLoaded(uid);
    }

    const name = getUserName(uid, fallbackName);
    const icon = getUserIcon(uid);

    if(icon){
        return `
            <img class="avatar ${sizeClass}"
                 src="${escapeHTML(icon)}"
                 alt="${escapeHTML(name)}"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
            <span class="avatar avatar-fallback ${sizeClass}" style="display:none;">
                ${escapeHTML(getFirstLetter(name))}
            </span>
        `;
    }

    return `
        <span class="avatar avatar-fallback ${sizeClass}">
            ${escapeHTML(getFirstLetter(name))}
        </span>
    `;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function renderKeywords(keywords){
    const raw = String(keywords || "").trim();

    if(!raw){
        return "";
    }

    const tags = raw
        .split(/[、,\s]+/)
        .map(tag => tag.trim())
        .filter(Boolean);

    if(tags.length === 0){
        return "";
    }

    return `
        <div class="keyword-area">
            ${tags.map(tag => `
                <span class="keyword-tag">#${escapeHTML(tag.replace(/^#/, ""))}</span>
            `).join("")}
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function isLikedByMe(){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe()){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

window.toggleLike = toggleLike;

async function addComment(){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const input = document.getElementById("commentInput");
    const text = input.value.trim();

    if(!text){
        alert("コメントを入力してください");
        return;
    }

    if(text.length > 200){
        alert("コメントは200文字以内にしてください");
        return;
    }

    await addDoc(collection(db, "comments"), {
        albumId: albumId,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        text: text,
        createdAt: serverTimestamp()
    });

    input.value = "";
}

window.addComment = addComment;

async function deleteComment(commentId){
    if(!currentUser) return;

    if(!confirm("このコメントを削除しますか？")){
        return;
    }

    await deleteDoc(doc(db, "comments", commentId));
}

window.deleteComment = deleteComment;

function getComments(){
    return allComments
        .filter(comment => comment.albumId === albumId)
        .sort((a,b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return aTime - bTime;
        });
}

function renderComments(){
    const comments = getComments();

    if(comments.length === 0){
        return `<div style="color:#777;">まだコメントはありません</div>`;
    }

    return comments.map((comment) => {
        const canDelete =
            currentUser &&
            currentUser.uid === comment.userId;

        const commentName = getUserName(
            comment.userId,
            comment.userName || comment.userEmail || "匿名ユーザー"
        );

        return `
            <div class="comment-item">
                ${avatarHTML(comment.userId, commentName)}

                <div class="comment-body">
                    <div class="comment-meta">
                        <span class="comment-name">
                            ${escapeHTML(commentName)}
                        </span>
                    </div>

                    <div class="comment-text">
                        ${escapeHTML(comment.text || "")}
                    </div>

                    ${
                        canDelete
                        ? `
                            <div class="comment-menu">
                                <button class="delete-comment-btn"
                                        onclick="deleteComment('${escapeHTML(comment.id)}')">
                                    削除
                                </button>
                            </div>
                        `
                        : ""
                    }
                </div>
            </div>
        `;
    }).join("");
}

function renderDetail(){
    if(!albumId){
        detailWrap.innerHTML = `<div class="empty">投稿IDがありません</div>`;
        return;
    }

    if(!albumData){
        return;
    }

    if(albumData.userId){
        ensureUserLoaded(albumData.userId);
    }

    const liked = isLikedByMe();
    const likeCount = getLikeCount();
    const comments = getComments();
    const commentCount = comments.length;

    const creatorName = getUserName(
        albumData.userId,
        albumData.userName || albumData.userEmail || "匿名ユーザー"
    );

    const myName = currentUser
        ? getUserName(currentUser.uid, currentUser.email || "自分")
        : "自分";

    detailWrap.innerHTML = `
        <article class="post-card">
            <div class="post-head">
                <img class="cover"
                     src="${escapeHTML(albumData.cover || "")}"
                     alt="">

                <div class="post-info">
                    <div class="title">
                        ${escapeHTML(albumData.title || "")}
                    </div>

                    <div class="artist">
                        ${escapeHTML(albumData.artist || "")}
                    </div>

                    ${
                        albumData.year
                        ? `<div class="meta">${escapeHTML(albumData.year)}</div>`
                        : ""
                    }

                    <div class="creator-line">
                        ${avatarHTML(albumData.userId, creatorName)}
                        <span>投稿者：</span>
                        <a href="profile.html?uid=${escapeHTML(albumData.userId || "")}">
                            ${escapeHTML(creatorName)}
                        </a>
                    </div>

                    <div class="post-actions">
                        <button class="like-btn ${liked ? "liked" : ""}"
                                onclick="toggleLike()">
                            ${liked ? "♥ いいね済み" : "♡ いいね"}
                        </button>

                        <span>${likeCount}いいね</span>
                        <span>${commentCount}コメント</span>
                    </div>
                </div>
            </div>

            <div class="review">
                ${escapeHTML(albumData.desc || "本文はありません")}
            </div>

            ${renderKeywords(albumData.keywords)}

            <div class="meter-area">
                ${meter("暗い", "明るい", albumData.darkness)}
                ${meter("静か", "激しい", albumData.intense)}
                ${meter("シンプル", "複雑", albumData.complex)}
                ${meter("絶望", "希望", albumData.hope)}
                ${meter("個人", "世界", albumData.world)}
            </div>
        </article>

        <section class="comments-panel">
            <div class="comments-title">
                コメント ${commentCount}件
            </div>

            <div class="comment-form">
                ${avatarHTML(currentUser?.uid, myName)}

                <div class="comment-form-main">
                    <input
                        id="commentInput"
                        class="comment-input"
                        type="text"
                        maxlength="200"
                        placeholder="${currentUser ? "コメントを書く" : "ログインしてコメントする"}"
                    >

                    <div class="comment-submit-row">
                        <button class="comment-btn" onclick="addComment()">
                            コメント
                        </button>
                    </div>
                </div>
            </div>

            <div class="comment-list">
                ${renderComments()}
            </div>
        </section>
    `;
}

async function loadAlbum(){
    if(!albumId){
        renderDetail();
        return;
    }

    const albumRef = doc(db, "albums", albumId);
    const albumSnap = await getDoc(albumRef);

    if(!albumSnap.exists()){
        detailWrap.innerHTML = `<div class="empty">投稿が見つかりません</div>`;
        return;
    }

    albumData = albumSnap.data();

    if(albumData.userId){
        ensureUserLoaded(albumData.userId);
    }

    renderDetail();
}

onSnapshot(collection(db, "likes"), (snapshot) => {
    allLikes = [];

    snapshot.forEach((docSnap) => {
        allLikes.push(docSnap.data());
    });

    renderDetail();
});

const commentsQuery = query(
    collection(db, "comments"),
    where("albumId", "==", albumId || "__none__")
);

onSnapshot(commentsQuery, (snapshot) => {
    allComments = [];

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        allComments.push({
            id: docSnap.id,
            ...data
        });

        if(data.userId){
            ensureUserLoaded(data.userId);
        }
    });

    renderDetail();
});

loadAlbum();

</script>

</body>
</html>
