<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album View</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#0b0b0b;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.container{
    max-width:900px;
    margin:0 auto;
}

.album{
    border:1px solid #333;
    padding:20px;
    margin-bottom:25px;
    background:#151515;
}

.cover{
    width:100%;
    max-width:300px;
    display:block;
    margin-bottom:15px;
}

.title{
    font-size:22px;
    font-weight:700;
}

.artist{
    color:#aaa;
    margin-bottom:15px;
}

.meter{
    margin:12px 0;
}

.labels{
    display:flex;
    justify-content:space-between;
    color:#aaa;
    font-size:14px;
    margin-bottom:4px;
}

.dots{
    font-size:18px;
    letter-spacing:3px;
}

.value{
    margin-left:10px;
    color:#666;
}

</style>

</head>

<body>

<div class="container" id="view"></div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
authDomain: "album-49b3e.firebaseapp.com",
projectId: "album-49b3e",
storageBucket: "album-49b3e.firebasestorage.app",
messagingSenderId: "448724897117",
appId: "1:448724897117:web:e124ab546bc69aeea7ecb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const view = document.getElementById("view");

function renderDots(value){
  let html = "";
  for(let i=1;i<=5;i++){
    html += i <= value ? "●" : "○";
  }
  return html;
}

function renderMeter(left, right, value){
  return `
    <div class="meter">

      <div class="labels">
        <span>${left}</span>
        <span>${right}</span>
      </div>

      <div class="dots">
        ${renderDots(value)}
        <span class="value">${value}</span>
      </div>

    </div>
  `;
}

function renderAlbum(album){
  return `
    <div class="album">

      <img class="cover" src="${album.cover || ''}">

      <div class="title">${album.title || ''}</div>
      <div class="artist">${album.artist || ''}</div>

      ${renderMeter("希望", "絶望", album.hope)}
      ${renderMeter("静か", "激しい", album.intense)}
      ${renderMeter("シンプル", "複雑", album.complex)}
      ${renderMeter("個人", "世界", album.world)}
      ${renderMeter("暗い", "明るい", album.darkness)}

      <p style="color:#aaa; margin-top:10px;">
        ${album.desc || ''}
      </p>

    </div>
  `;
}

onSnapshot(collection(db,"albums"), (snapshot)=>{

  view.innerHTML = "";

  snapshot.forEach(docItem=>{
    view.innerHTML += renderAlbum(docItem.data());
  });

});

</script>

</body>
</html>
