<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Album View</title>
<style>
body{
    background:#050505;
    color:white;
    font-family:sans-serif;
    padding:30px;
}
.card{
    border:1px solid #333;
    margin-bottom:20px;
    padding:20px;
}
img{
    width:200px;
    height:200px;
    object-fit:cover;
}
</style>
</head>

<body>

<h1>Albums</h1>
<button onclick="location.href='index.html'">戻る</button>

<div id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

onSnapshot(collection(db,"albums"), (snap)=>{

    grid.innerHTML = "";

    snap.forEach((d)=>{

        const a = d.data();

        grid.innerHTML += `
        <div class="card">
            <img src="${a.cover}">
            <h2>${a.title}</h2>
            <p>${a.artist}</p>
            <p>${a.year}</p>
            <p>${a.desc}</p>
        </div>
        `;
    });
});

</script>

</body>
</html>
