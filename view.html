<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.page-title{
    font-size:48px;
    font-weight:700;
}

.back-btn{
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
}

.back-btn:hover{
    background:#2a2a2a;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:30px;
    max-width:1700px;
    margin:auto;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    padding:26px;
    display:grid;
    grid-template-columns:240px minmax(0,1fr);
    gap:28px;
    overflow:hidden;
}

.album-left{
    min-width:0;
}

.cover{
    width:210px;
    aspect-ratio:1/1;
    object-fit:cover;
    margin-bottom:20px;
    background:#111;
}

.title{
    font-size:30px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:4px;
    word-break:break-word;
}

.artist{
    font-size:24px;
    color:#6fa8dc;
    margin-bottom:16px;
    word-break:break-word;
}

.meta{
    color:#aaa;
    margin-bottom:24px;
}

.keyword-text{
    color:#ddd;
    line-height:2;
    word-break:break-word;
}

.description-wide{
    margin-top:10px;
    padding-top:26px;
    border-top:1px solid rgba(255,255,255,0.1);
    grid-column:1/-1;
    color:#ddd;
    line-height:2;
    word-break:break-word;
}

.empty{
    color:#777;
    font-size:28px;
}

/* メーター部分 */

.meter-area{
    border:1px solid rgba(255,255,255,0.12);
    padding:22px 24px;
    min-width:0;
    width:100%;
}

.meter{
    display:grid;
    grid-template-columns:72px minmax(120px,1fr) 72px;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
}

.meter:last-child{
    margin-bottom:0;
}

.meter-label{
    font-size:18px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-svg{
    width:100%;
    height:32px;
    display:block;
}

/* 画面が少し狭いときは1列にする */
@media(max-width:1300px){
    .album-grid{
        grid-template-columns:1fr;
    }
}

/* スマホ対応 */
@media(max-width:800px){

    body{
        padding:22px;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .page-title{
        font-size:34px;
    }

    .album-card{
        grid-template-columns:1fr;
        padding:22px;
    }

    .cover{
        width:100%;
        max-width:320px;
    }

    .title{
        font-size:28px;
    }

    .artist{
        font-size:22px;
    }

    .meter-area{
        padding:20px;
    }

    .meter{
        grid-template-columns:68px minmax(120px,1fr) 68px;
        gap:10px;
    }

    .meter-label{
        font-size:16px;
    }

    .meter-svg{
        height:30px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="page-title">Album Collection</h1>

    <button class="back-btn"
            onclick="location.href='index.html'">
        編集ページへ戻る
    </button>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const albumGrid = document.getElementById("albumGrid");

function meterGraphic(value){

    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    const positions = [10, 30, 50, 70, 90];

    let circles = "";

    for(let i = 1; i <= 5; i++){

        const x = positions[i - 1];
        const active = i <= value;

        circles += `
            <circle
                cx="${x}"
                cy="16"
                r="7"
                fill="${active ? "#6fa8dc" : "#0b0b0b"}"
                stroke="${active ? "#6fa8dc" : "#555"}"
                stroke-width="2"
            />
        `;
    }

    const activeEnd = value <= 1
        ? positions[0]
        : positions[value - 1];

    return `
        <svg class="meter-svg"
             viewBox="0 0 100 32"
             preserveAspectRatio="none">

            <line
                x1="10"
                y1="16"
                x2="90"
                y2="16"
                stroke="#4a5158"
                stroke-width="2.5"
                stroke-linecap="round"
            />

            <line
                x1="10"
                y1="16"
                x2="${activeEnd}"
                y2="16"
                stroke="#6fa8dc"
                stroke-width="2.5"
                stroke-linecap="round"
            />

            ${circles}

        </svg>
    `;
}

function meter(left, right, value){

    return `
        <div class="meter">
            <div class="meter-label">${left}</div>

            ${meterGraphic(value)}

            <div class="meter-label right-label">${right}</div>
        </div>
    `;
}

onSnapshot(collection(db,"albums"), (snapshot)=>{

    albumGrid.innerHTML = "";

    if(snapshot.empty){
        albumGrid.innerHTML = `<div class="empty">保存されたアルバムがありません</div>`;
        return;
    }

    snapshot.forEach((doc)=>{

        const a = doc.data();

        albumGrid.innerHTML += `
        <div class="album-card">

            <div class="album-left">
                <img class="cover" src="${a.cover || ""}">

                <div class="title">
                    ${a.title || ""}
                </div>

                <div class="artist">
                    ${a.artist || ""}
                </div>

                <div class="meta">
                    ${a.year || ""}
                </div>

                <div class="keyword-text">
                    ${a.keywords || ""}
                </div>
            </div>

            <div class="meter-area">

                ${meter("暗い", "明るい", a.darkness)}

                ${meter("静か", "激しい", a.intense)}

                ${meter("シンプル", "複雑", a.complex)}

                ${meter("絶望", "希望", a.hope)}

                ${meter("個人", "世界", a.world)}

            </div>

            <div class="description-wide">
                ${a.desc || ""}
            </div>

        </div>
        `;
    });
});

</script>

</body>
</html>
