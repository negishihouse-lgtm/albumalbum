<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding-bottom:120px;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* ===== PC用サイドバー ===== */
.sidebar{
    width:280px;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    z-index:100;
}

.sidebar-title{
    font-size:26px;
    font-weight:800;
    margin-bottom:28px;
}

.side-menu button{
    width:100%;
    padding:14px 16px;
    margin-bottom:8px;
    border:none;
    border-radius:10px;
    background:transparent;
    color:white;
    cursor:pointer;
    font-size:15px;
    text-align:left;
}

.side-menu button:hover{
    background:#1a1a1a;
}

.side-menu .active{
    background:#6fa8dc;
}

#sideProfileEditBtn{
    display:none;
}

/* ===== スマホ用下部タブバー ===== */
.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#999;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:#6fa8dc;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

/* ===== 右下投稿ボタン ===== */
.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:#84b7e4;
}

/* ===== メイン ===== */
.main{
    flex:1;
    margin-left:280px;
    padding:40px;
}

.profile-header{
    margin-bottom:34px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile-name{
    font-size:42px;
    font-weight:800;
    margin-bottom:10px;
}

.profile-email{
    display:none;
}

.follow-stats{
    display:flex;
    gap:18px;
    color:#ddd;
    margin-bottom:20px;
    font-size:15px;
}

.follow-stat-link{
    background:none;
    border:none;
    color:#ddd;
    padding:0;
    font:inherit;
    cursor:pointer;
}

.follow-stat-link:hover{
    color:white;
    text-decoration:underline;
}

.profile-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

.follow-btn{
    background:#6fa8dc;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.follow-btn:hover{
    background:#84b7e4;
}

.follow-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.profile-edit-btn{
    display:none;
    background:#333;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.profile-edit-btn:hover{
    background:#444;
}

.mobile-logout-btn{
    display:none;
    background:#522;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.mobile-logout-btn:hover{
    background:#733;
}

.owner-notice{
    display:none;
    color:#aaa;
    font-size:14px;
    line-height:1.7;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    padding:14px;
    margin-bottom:22px;
}

.profile-content-tabs{
    display:flex;
    gap:10px;
    margin:0 0 22px;
    border-bottom:1px solid rgba(255,255,255,0.10);
}

.profile-content-tab{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    background:transparent;
    color:#999;
    padding:12px 4px;
    margin-right:18px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    position:relative;
}

.profile-content-tab.active{
    color:white;
}

.profile-content-tab.active::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-1px;
    height:3px;
    border-radius:999px;
    background:#9fcdd9;
}

/* ===== 投稿カード ===== */
.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1400px;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    overflow:hidden;
}

.album-card:hover{
    border-color:rgba(111,168,220,0.55);
}

.card-top{
    display:grid;
    grid-template-columns:120px 1fr 260px;
    gap:18px;
    align-items:start;
}

.cover-wrap{
    min-width:0;
}

.cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.18);
    display:block;
}

.album-info,
.album-analysis{
    min-width:0;
}

.title-row{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:6px;
}

.title{
    font-size:24px;
    font-weight:800;
    line-height:1.2;
    word-break:break-word;
}

.private-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:4px 8px;
    border-radius:999px;
    background:#333;
    color:#ddd;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
}

.artist{
    color:#6fa8dc;
    font-size:18px;
    margin-bottom:8px;
    word-break:break-word;
}

.creator{
    margin-bottom:10px;
    color:#ccc;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
}

.creator a{
    color:#6fa8dc;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:16px;
    color:#aaa;
    font-size:14px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#aaa;
    padding:0;
    font-size:20px;
    cursor:pointer;
}

.like-btn:hover{
    color:white;
}

.like-btn.liked{
    color:white;
}

.like-count,
.comment-count{
    font-size:14px;
    color:#aaa;
}

.listen-btn{
    appearance:none;
    -webkit-appearance:none;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.055);
    color:#ffffff;
    border-radius:999px;
    height:28px;
    padding:0 10px;
    font-family:inherit;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:5px;
}

.listen-btn:hover{
    border-color:rgba(159,205,217,0.42);
    background:rgba(159,205,217,0.12);
}

.owner-actions{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
}

.owner-actions button{
    border:none;
    border-radius:10px;
    padding:9px 12px;
    color:white;
    cursor:pointer;
    font-size:13px;
}

.edit-post-btn{
    background:#555;
}

.edit-post-btn:hover{
    background:#666;
}

.delete-post-btn{
    background:#733;
}

.delete-post-btn:hover{
    background:#944;
}

.meter-area{
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px;
    padding:12px;
    min-width:0;
}

.meter{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 46px;
    align-items:center;
    gap:6px;
    margin-bottom:10px;
    min-width:0;
}

.meter-label{
    font-size:11px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:2px;
    background:#4a5158;
    flex:1;
    min-width:0;
}

.dot.active.level-1,
.connector.active.level-1{
    background:#3f8ec7;
    border-color:#3f8ec7;
}

.dot.active.level-2,
.connector.active.level-2{
    background:#4d9bd0;
    border-color:#4d9bd0;
}

.dot.active.level-3,
.connector.active.level-3{
    background:#5fa7d8;
    border-color:#5fa7d8;
}

.dot.active.level-4,
.connector.active.level-4{
    background:#73b6e3;
    border-color:#73b6e3;
}

.dot.active.level-5{
    background:#8bc8ef;
    border-color:#8bc8ef;
}

.keyword-box{
    margin-top:10px;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:12px;
    padding:10px;
}

.keyword-title{
    color:#6fa8dc;
    font-size:12px;
    font-weight:700;
    margin-bottom:4px;
}

.keyword-text{
    color:#ddd;
    font-size:12px;
    line-height:1.5;
    word-break:break-word;
}

.description{
    color:#ddd;
    font-size:14px;
    line-height:1.7;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,0.1);
    word-break:break-word;
}

.empty{
    color:#777;
    font-size:24px;
}

/* ===== 聴くサービス選択シート ===== */
.listen-sheet{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background:rgba(0,0,0,0.62);
    z-index:22000;
    padding:18px;
}

.listen-sheet.open{
    display:flex;
}

.listen-panel{
    width:min(430px,100%);
    background:#0b0d0e;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:24px;
    padding:16px;
    box-shadow:0 22px 70px rgba(0,0,0,0.58);
}

.listen-panel-title{
    font-size:17px;
    font-weight:900;
    letter-spacing:-0.02em;
    margin-bottom:4px;
}

.listen-panel-subtitle{
    color:#aab3b8;
    font-size:12px;
    line-height:1.45;
    margin-bottom:14px;
    word-break:break-word;
}

.listen-actions{
    display:grid;
    gap:8px;
}

.listen-action-btn{
    appearance:none;
    -webkit-appearance:none;
    width:100%;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.045);
    color:white;
    font-family:inherit;
    font-size:14px;
    font-weight:850;
    text-align:left;
    border-radius:15px;
    padding:13px 14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.listen-action-btn:hover{
    border-color:rgba(159,205,217,0.42);
    background:rgba(159,205,217,0.10);
}

.listen-action-name{
    display:inline-flex;
    align-items:center;
    gap:9px;
    min-width:0;
}

.listen-action-icon{
    width:28px;
    height:28px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.08);
    flex:0 0 28px;
    font-size:15px;
}

.listen-action-arrow{
    color:#aab3b8;
    font-size:16px;
    flex:0 0 auto;
}

.listen-close-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:transparent;
    color:#aab3b8;
    font-family:inherit;
    font-size:13px;
    font-weight:800;
    padding:12px;
    cursor:pointer;
}

/* ===== タブレット以下 ===== */
@media(max-width:1300px){
    .album-grid{
        grid-template-columns:1fr;
    }
}

/* ===== スマホUI ===== */
@media(min-width:901px){
    .mobile-logout-btn{
        display:none !important;
    }
}

@media(max-width:900px){
    body{
        padding-bottom:110px;
    }

    .wrapper{
        display:block;
    }

    .sidebar{
        display:none;
    }

    .mobile-tabbar{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:#0b0b0b;
        border-top:1px solid rgba(255,255,255,0.1);
        z-index:999;
        padding-bottom:env(safe-area-inset-bottom);
    }

    .main{
        margin-left:0;
        padding:16px;
    }

    .profile-header{
        margin-bottom:20px;
        padding-bottom:18px;
    }

    .profile-name{
        font-size:30px;
    }

    .profile-email{
        display:none;
    }

    .follow-stats{
        font-size:13px;
        gap:14px;
    }

    .profile-actions{
        gap:8px;
    }

    .follow-btn,
    .profile-edit-btn,
    .mobile-logout-btn{
        font-size:14px;
        padding:10px 16px;
    }

    .mobile-logout-btn{
        display:inline-block;
    }

    .owner-notice{
        font-size:12px;
        margin-bottom:16px;
    }

    .album-grid{
        grid-template-columns:1fr;
        gap:14px;
    }

    .album-card{
        padding:14px;
        border-radius:14px;
    }

    .card-top{
        grid-template-columns:72px minmax(0,1fr) 120px;
        gap:10px;
        align-items:start;
    }

    .title{
        font-size:16px;
        margin-bottom:0;
        line-height:1.3;
    }

    .private-badge{
        font-size:9px;
        padding:3px 6px;
    }

    .artist{
        font-size:13px;
        margin-bottom:4px;
    }

    .creator{
        font-size:11px;
        margin-bottom:6px;
        line-height:1.4;
    }

    .reaction-row{
        gap:8px;
        font-size:11px;
    }

    .like-btn{
        font-size:16px;
    }

    .like-count,
    .comment-count{
        font-size:11px;
    }

    .listen-btn{
        height:24px;
        padding:0 8px;
        font-size:11px;
    }

    .owner-actions{
        gap:6px;
        margin-top:10px;
    }

    .owner-actions button{
        padding:7px 9px;
        font-size:11px;
        border-radius:8px;
    }

    .meter-area{
        padding:8px;
    }

    .meter{
        grid-template-columns:26px minmax(0,1fr) 26px;
        gap:3px;
        margin-bottom:5px;
    }

    .meter-label{
        font-size:8px;
    }

    .dot{
        width:5px;
        height:5px;
        border-width:1px;
    }

    .connector{
        height:1px;
    }

    .keyword-box{
        margin-top:6px;
        padding:6px;
    }

    .keyword-title{
        font-size:9px;
        margin-bottom:2px;
    }

    .keyword-text{
        font-size:9px;
        line-height:1.3;
    }

    .description{
        font-size:12px;
        line-height:1.6;
        margin-top:10px;
        padding-top:10px;
    }

    .fab{
        right:16px;
        bottom:88px;
        width:58px;
        height:58px;
        font-size:32px;
    }

    .listen-sheet{
        padding:10px;
        padding-bottom:calc(82px + env(safe-area-inset-bottom));
    }

    .listen-panel{
        border-radius:24px 24px 18px 18px;
    }

    .listen-action-btn{
        min-height:52px;
    }
}

/* かなり狭いスマホ用 */
@media(max-width:390px){
    .card-top{
        grid-template-columns:64px minmax(0,1fr) 110px;
        gap:8px;
    }

    .title{
        font-size:15px;
    }

    .artist{
        font-size:12px;
    }

    .meter-area{
        padding:6px;
    }

    .meter{
        grid-template-columns:24px minmax(0,1fr) 24px;
    }

    .meter-label{
        font-size:7px;
    }

    .keyword-text{
        font-size:8px;
    }
}

/* ===== 共通PCサイドバー ===== */

    top:0;

    font-size:28px;
    font-weight:700;

}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
    font-size:15px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#1a1a1a;
}

.sidebar a.active{
    color:#6fa8dc;
}

/* ===== 共通スマホ下部タブバー ===== */

}

}

}

@media(max-width:900px){
    body{
        padding-left:16px !important;

        right:16px;

        font-size:32px;
    }
}


/* ============================================================
   FINAL: index準拠 スマホ下部タブバー
============================================================ */
.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

@media(max-width:900px){
    .mobile-tabbar{
        display:grid !important;
        position:fixed !important;
        left:0 !important;
        right:0 !important;
        bottom:0 !important;

        background:rgba(8,8,8,0.96) !important;
        border-top:1px solid rgba(255,255,255,0.12) !important;
        grid-template-columns:repeat(5,1fr) !important;
        z-index:9999 !important;
        backdrop-filter:blur(14px) !important;
        -webkit-backdrop-filter:blur(14px) !important;
        padding-bottom:env(safe-area-inset-bottom) !important;
    }

    .mobile-tabbar a{
        height:72px !important;
        color:#9ca6ac !important;
        text-decoration:none !important;
        display:flex !important;
        flex-direction:column !important;
        align-items:center !important;
        justify-content:center !important;
        gap:4px !important;
        font-size:11px !important;
        flex:1 !important;
    }

    .mobile-tabbar a.active{
        color:#ffffff !important;
        font-weight:700 !important;
    }

    .mobile-tabbar .icon{
        font-size:22px !important;
        line-height:1 !important;

async function updateMobileMyPageTab(user){

async function createNotification(db, {

    fromUserId,
    fromUserName,

        commentText,
        read: false,

    });
}

    const fromUserName = await getCurrentUserName(db, currentUser);

    });

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function isOwner(){
    return currentUser && uid && currentUser.uid === uid;
}

function isHttpUrl(value){
    if(!value || typeof value !== "string"){
        return false;
    }

    try{
        const url = new URL(value);
        return url.protocol === "https:" || url.protocol === "http:";
    }catch(error){
        return false;
    }
}

function normalizeSpotifyType(value){
    const type = String(value || "").toLowerCase();

    if(type === "album"){
        return "album";
    }

    if(type === "playlist"){
        return "playlist";
    }

    if(type === "artist"){
        return "artist";
    }

    return "track";
}

function getSpotifyUrlFromId(album){
    const id = album?.spotifyId || album?.spotifyTrackId || album?.spotifyAlbumId || "";

    if(!id){
        return "";
    }

    const type = normalizeSpotifyType(album?.spotifyType || album?.type);
    return `https://open.spotify.com/${type}/${encodeURIComponent(id)}`;
}

function getSpotifyUrlFromUri(album){
    const uri =
        album?.spotifyUri ||
        album?.spotifyURI ||
        album?.spotifyTrackUri ||
        album?.spotifyAlbumUri ||
        "";

    if(!uri || typeof uri !== "string"){
        return "";
    }

    const parts = uri.split(":");

    if(parts.length < 3 || parts[0] !== "spotify"){
        return "";
    }

    const type = normalizeSpotifyType(parts[1]);
    const id = parts[2];

    if(!id){
        return "";
    }

    return `https://open.spotify.com/${type}/${encodeURIComponent(id)}`;
}

function getDirectMusicUrlForAlbum(album){
    const candidates = [
        album?.spotifyUrl,
        album?.spotifyURL,
        album?.spotifyLink,
        album?.spotifyTrackUrl,
        album?.spotifyTrackURL,
        album?.spotifyAlbumUrl,
        album?.spotifyAlbumURL,
        album?.appleMusicUrl,
        album?.appleMusicURL,
        album?.youtubeMusicUrl,
        album?.youtubeMusicURL,
        album?.musicUrl,
        album?.musicURL
    ];

    const directUrl = candidates.find(isHttpUrl);

    if(directUrl){
        return directUrl;
    }

    return getSpotifyUrlFromId(album) || getSpotifyUrlFromUri(album);
}

function getListenSearchQuery(album){
    return [album?.title, album?.artist]
        .filter(Boolean)
        .join(" ")
        .trim();
}

function buildServiceSearchUrl(serviceKey, queryText){
    const q = encodeURIComponent(queryText || "");

    if(!q){
        return "";
    }

    if(serviceKey === "appleMusic"){
        return `https://music.apple.com/search?term=${q}`;
    }

    if(serviceKey === "lineMusic"){
        return `https://music.line.me/webapp/search?query=${q}`;
    }

    if(serviceKey === "youtubeMusic"){
        return `https://music.youtube.com/search?q=${q}`;
    }

    if(serviceKey === "amazonMusic"){
        return `https://music.amazon.co.jp/search/${q}`;
    }

    if(serviceKey === "awa"){
        return `https://s.awa.fm/search?q=${q}`;
    }

    if(serviceKey === "spotify"){
        return `https://open.spotify.com/search/${q}`;
    }

    return "";
}

function getListenTitle(album){
    const title = album?.title || "この音楽";
    const artist = album?.artist ? ` / ${album.artist}` : "";
    return `${title}${artist}`;
}

function getAlbumItemById(targetAlbumId){
    const source = activeProfileTab === "liked" ? likedAlbums : profileAlbums;
    return source.find(album => album.id === targetAlbumId) || null;
}

function mergeUniqueServices(services){
    const seen = new Set();
    const result = [];

    services.forEach((service) => {
        if(!service?.url){
            return;
        }

        const uniqueKey = service.key || service.url;

        if(seen.has(uniqueKey)){
            return;
        }

        seen.add(uniqueKey);

    });

}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function normalizeKeywords(value){
    if(Array.isArray(value)){
        return value
            .map(keyword => String(keyword ?? "").trim())
            .filter(Boolean);
    }

    if(typeof value === "string"){
        return value
            .split(/[\s,、#]+/)
            .map(keyword => keyword.trim())
            .filter(Boolean);
    }

    return [];
}

function renderKeywordTags(value){
    const keywords = normalizeKeywords(value);

    if(keywords.length === 0){
        return `<span class="keyword-empty">なし</span>`;
    }

    return keywords.map((keyword) => {
        const safeKeyword = escapeHTML(keyword);
        const encodedKeyword = encodeURIComponent(keyword);

        return `
            <button
                type="button"
                class="keyword-tag"
                data-keyword="${encodedKeyword}"
            >#${safeKeyword}</button>
        `;
    }).join("");
}


function getPostTime(value){
    if(!value){ return 0; }
    if(typeof value.toDate === "function"){ return value.toDate().getTime(); }
    if(value instanceof Date){ return value.getTime(); }
    if(typeof value === "number"){ return value; }
    if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){ return parsed.getTime(); }
    }
    if(typeof value.seconds === "number"){
        return value.seconds * 1000;
    }
    return 0;
}

function getPostDateObject(value){
    if(!value){
        return null;
    }

    let date = null;

    if(typeof value.toDate === "function"){
        date = value.toDate();
    }else if(value instanceof Date){
        date = value;
    }else if(typeof value === "number"){
        date = new Date(value);
    }else if(typeof value === "string"){
        const parsed = new Date(value);
        if(!Number.isNaN(parsed.getTime())){
            date = parsed;
        }
    }else if(typeof value.seconds === "number"){
        date = new Date(value.seconds * 1000);
    }

    if(!date || Number.isNaN(date.getTime())){
        return null;
    }

    return date;
}

function pad2(value){
    return String(value).padStart(2, "0");
}

function getDateKeyFromDate(date){
    return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
}

function getMonthKeyFromDate(date){
    return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
}

function formatCalendarMonthTitle(monthKey){
    const [year, month] = monthKey.split("-");
    return `${year}年${Number(month)}月`;
}

function formatCalendarDayTitle(dateKey){
    const [year, month, day] = dateKey.split("-");
    return `${year}年${Number(month)}月${Number(day)}日`;
}

function getCalendarAlbums(){
    return profileAlbums
        .map((album) => {
            const date = getPostDateObject(album.createdAt || album.updatedAt);
            return date ? { ...album, __calendarDate: date } : null;
        })
        .filter(Boolean)
        .sort((a, b) => b.__calendarDate.getTime() - a.__calendarDate.getTime());
}

function getCalendarDayAlbums(dateKey){
    return getCalendarAlbums().filter((album) => {
        return getDateKeyFromDate(album.__calendarDate) === dateKey;
    });
}

function openCalendarDay(dateKey){

function renderCalendarView(){
    if(!isOwner()){
        albumGrid.innerHTML = `<div class="empty">カレンダーは本人だけが確認できます。</div>`;
        return;
    }

    const albums = getCalendarAlbums();

    if(albums.length === 0){
        albumGrid.innerHTML = `<div class="empty">まだカレンダーに表示できる投稿がありません。</div>`;
        return;
    }

    const postsByDate = new Map();
    const monthKeys = [];

    albums.forEach((album) => {
        const dateKey = getDateKeyFromDate(album.__calendarDate);
        const monthKey = getMonthKeyFromDate(album.__calendarDate);

        if(!postsByDate.has(dateKey)){
            postsByDate.set(dateKey, []);
        }

        postsByDate.get(dateKey).push(album);

        if(!monthKeys.includes(monthKey)){
            monthKeys.push(monthKey);
        }
    });

    const weekdayLabels = ["日","月","火","水","木","金","土"];

    const monthHTML = monthKeys.map((monthKey) => {
        const [yearText, monthText] = monthKey.split("-");
        const year = Number(yearText);
        const monthIndex = Number(monthText) - 1;
        const firstDate = new Date(year, monthIndex, 1);
        const lastDate = new Date(year, monthIndex + 1, 0);
        const startBlank = firstDate.getDay();
        const totalDays = lastDate.getDate();

        let cells = "";

        for(let i = 0; i < startBlank; i++){
            cells += `<div class="calendar-day empty"></div>`;
        }

        for(let day = 1; day <= totalDays; day++){
            const date = new Date(year, monthIndex, day);
            const dateKey = getDateKeyFromDate(date);
            const posts = postsByDate.get(dateKey) || [];
            const hasPosts = posts.length > 0;
            const firstCover = posts[0]?.cover || "";
            const covers = firstCover
                ? `<img class="calendar-cover single" src="${escapeHTML(firstCover)}" alt="">`
                : "";
            const more = posts.length > 1
                ? `<span class="calendar-more count">${posts.length}</span>`
                : "";

            cells += `
                <button
                    type="button"
                    class="calendar-day ${hasPosts ? "has-posts" : ""}"
                    data-date-key="${escapeHTML(dateKey)}"
                    ${hasPosts ? `onclick="openCalendarDay('${escapeHTML(dateKey)}')"` : "disabled"}
                >
                    <span class="calendar-day-number">${day}</span>
                    <span class="calendar-day-covers">
                        ${covers}
                        ${more}
                    </span>
                </button>
            `;
        }

        return `
            <section class="calendar-month" id="calendar-month-${escapeHTML(monthKey)}">
                <div class="calendar-month-header">
                    <button
                        type="button"
                        class="calendar-month-title-btn"
                        onclick="openMonthPicker()"
                    >${escapeHTML(formatCalendarMonthTitle(monthKey))}</button>
                    <button
                        type="button"
                        class="calendar-jump-btn"
                        onclick="openMonthPicker()"
                    >月を選ぶ</button>
                </div>
                <div class="calendar-weekdays">
                    ${weekdayLabels.map(label => `<div class="calendar-weekday">${label}</div>`).join("")}
                </div>
                <div class="calendar-grid">
                    ${cells}
                </div>
                <div class="calendar-day-panel" data-calendar-panel=""></div>
                ${Array.from(postsByDate.keys())
                    .filter(dateKey => dateKey.startsWith(monthKey))
                    .map(dateKey => `<div class="calendar-day-panel" data-calendar-panel="${escapeHTML(dateKey)}"></div>`)
                    .join("")}
            </section>
        `;
    }).join("");

    albumGrid.innerHTML = `<div class="calendar-wrap">${monthHTML}</div>`;
}

function listenAlbums(){
    if(unsubscribeAlbums){
        unsubscribeAlbums();
        unsubscribeAlbums = null;
    }

    let albumsQuery;

    if(isOwner()){
        albumsQuery = query(
            collection(db, "albums"),
            where("userId", "==", uid)
        );
    } else {
        albumsQuery = query(
            collection(db, "albums"),
            where("userId", "==", uid),
            where("isPublic", "==", true)
        );
    }

    unsubscribeAlbums = onSnapshot(albumsQuery, (snapshot) => {
        profileAlbums = [];

        snapshot.forEach((docSnap) => {
            profileAlbums.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        profileAlbums.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
        });

        renderAlbums();

    }, (error) => {
        console.error("投稿取得失敗:", error);
        albumGrid.innerHTML = `<div class="empty">投稿の読み込みに失敗しました。</div>`;
    });
}


async function loadLikedAlbums(){
    likedAlbums = [];

    if(!currentUser || !isOwner()){
        renderAlbums();
        return;
    }

    try{
        const myLikes = allLikes.filter((like) => like.userId === currentUser.uid);
        const albumIds = [...new Set(myLikes.map((like) => like.albumId).filter(Boolean))];

        const albums = [];

        for(const albumId of albumIds){
            try{
                const albumSnap = await getDoc(doc(db, "albums", albumId));

                if(!albumSnap.exists()){
                    continue;
                }

                const album = {
                    id: albumSnap.id,
                    ...albumSnap.data()
                };

                if(album.isPublic === false && album.userId !== currentUser.uid){
                    continue;
                }

                albums.push(album);
            }catch(error){
                console.warn("いいねした投稿の取得に失敗しました", albumId, error);
            }
        }

        albums.sort((a, b) => {
            return getPostTime(b.createdAt || b.updatedAt) - getPostTime(a.createdAt || a.updatedAt);
        });

        likedAlbums = albums;
        renderAlbums();
    }catch(error){
        console.error("いいねしたものの取得に失敗しました:", error);
        likedAlbums = [];
        renderAlbums();
    }
}

function listenLikes(){
    if(unsubscribeLikes){
        unsubscribeLikes();
        unsubscribeLikes = null;
    }

    unsubscribeLikes = onSnapshot(collection(db, "likes"), (snapshot) => {
        allLikes = [];

        snapshot.forEach((docSnap) => {
            allLikes.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        updateLikeDisplays();
        loadLikedAlbums();

    }, (error) => {
        console.error("いいね取得失敗:", error);
    });
}

function listenComments(){
    if(unsubscribeComments){
        unsubscribeComments();
        unsubscribeComments = null;
    }

    unsubscribeComments = onSnapshot(collection(db, "comments"), (snapshot) => {
        allComments = [];

        snapshot.forEach((docSnap) => {
            allComments.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        updateCommentDisplays();

    }, (error) => {
        console.error("コメント取得失敗:", error);
    });
}

async function loadFollowCounts() {
    try {
        const followingQuery = query(
            collection(db, "follows"),
            where("followerId", "==", uid)
        );

        const followerQuery = query(
            collection(db, "follows"),
            where("followingId", "==", uid)
        );

        const followingSnapshot = await getDocs(followingQuery);
        const followerSnapshot = await getDocs(followerQuery);

        followingCount.textContent = `フォロー中 ${followingSnapshot.size}`;
        followerCount.textContent = `フォロワー ${followerSnapshot.size}`;

    } catch (error) {
        console.error("フォロー数取得失敗:", error);
    }
}

async function checkFollowStatus() {
    try {
        const followsQuery = query(
            collection(db, "follows"),
            where("followerId", "==", currentUser.uid),
            where("followingId", "==", uid)
        );

        const snapshot = await getDocs(followsQuery);

        if (!snapshot.empty) {
            followDocId = snapshot.docs[0].id;
            isFollowing = true;
            followBtn.textContent = "フォロー中";
        } else {
            followDocId = null;
            isFollowing = false;
            followBtn.textContent = "フォロー";
        }
    } catch (error) {
        console.error("フォロー状態確認失敗:", error);
        followDocId = null;
        isFollowing = false;
        followBtn.textContent = "フォロー";
    }
}

async function followUser() {
    if (!currentUser) {
        location.href =
            `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    if (currentUser.uid === uid) {
        alert("自分自身はフォローできません");
        return;
    }

    try {
        followBtn.disabled = true;
        followBtn.textContent = "処理中...";

        const docRef = await addDoc(collection(db, "follows"), {
            followerId: currentUser.uid,
            followingId: uid,
            createdAt: serverTimestamp()
        });

        await notifyFollow(db, currentUser, uid);

        followDocId = docRef.id;
        isFollowing = true;
        followBtn.textContent = "フォロー中";

        await loadFollowCounts();

    } catch (error) {
        console.error("フォロー失敗:", error);
        alert("フォロー失敗: " + error.message);
        followBtn.textContent = "フォロー";
    } finally {
        followBtn.disabled = false;
    }
}

async function unfollowUser() {
    if (!followDocId) {
        return;
    }

    try {
        followBtn.disabled = true;
        followBtn.textContent = "処理中...";

        await deleteDoc(doc(db, "follows", followDocId));

        followDocId = null;
        isFollowing = false;
        followBtn.textContent = "フォロー";

        await loadFollowCounts();

    } catch (error) {
        console.error("解除失敗:", error);
        alert("解除失敗: " + error.message);
        followBtn.textContent = "フォロー中";
    } finally {
        followBtn.disabled = false;
    }
}

function updateOwnerUI(){
    if(isOwner()){
        if(ownerNotice) ownerNotice.style.display = "block";
        profileEditBtn.style.display = "inline-block";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "inline-block";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "block";
    } else {
        if(ownerNotice) ownerNotice.style.display = "none";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";
    }
}

profileEditBtn.addEventListener("click", () => {
    if(!currentUser){
        location.href = "login.html";
        return;
    }

    location.href = "profile-edit.html";
});

mobileLogoutBtn.addEventListener("click", async () => {
    try{
        await signOut(auth);
        location.href = "login.html";
    }catch(error){
        console.error("ログアウト失敗:", error);
        alert("ログアウトに失敗しました: " + error.message);
    }
});

if(followingLink){
    followingLink.addEventListener("click", () => {
        if(!uid) return;
        location.href = `follows.html?uid=${encodeURIComponent(uid)}&type=following`;
    });
}

if(followerLink){
    followerLink.addEventListener("click", () => {
        if(!uid) return;
        location.href = `follows.html?uid=${encodeURIComponent(uid)}&type=followers`;
    });
}

onAuthStateChanged(auth, async (user) => {
    updateMobileMyPageTab(user);
    currentUser = user;

    if (!uid && currentUser) {
        uid = currentUser.uid;
    }

    if (myPageLink) {
        if (currentUser) {
            myPageLink.href = `profile.html?uid=${currentUser.uid}`;
        } else {
            myPageLink.href = "login.html";
        }
    }

    if (mobileMyPageLink) {
        if (currentUser) {
            mobileMyPageLink.href = `profile.html?uid=${currentUser.uid}`;
        } else {
            mobileMyPageLink.href = "login.html";
        }
    }

    if (!uid) {
        profileName.textContent = "ユーザーが指定されていません";
        albumGrid.innerHTML =
            `<div class="empty">ログインしていないため、マイページを表示できません。</div>`;
        followBtn.style.display = "none";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";
        if(ownerNotice) ownerNotice.style.display = "none";
        return;
    }

    updateOwnerUI();

    await loadProfile();
    await loadFollowCounts();

    listenAlbums();
    listenLikes();
    listenComments();

    if (!currentUser) {
        followBtn.style.display = "inline-block";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";

        followBtn.textContent = "ログインしてフォロー";
        followBtn.onclick = () => {
            location.href =
                `login.html?redirect=${encodeURIComponent(location.href)}`;
        };
        return;
    }

    if (currentUser.uid === uid) {
        followBtn.style.display = "none";
        profileEditBtn.style.display = "inline-block";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "inline-block";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "block";
        return;
    }

    followBtn.style.display = "inline-block";
    profileEditBtn.style.display = "none";
    if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
    if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";

    followBtn.textContent = "フォロー";

    followBtn.onclick = async () => {
        if (isFollowing) {
            await unfollowUser();
        } else {
            await followUser();
        }
    };

    await checkFollowStatus();
});

</script>
