<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
}

a{
    color:#6fa8dc;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.profile-header{
    margin-bottom:40px;
}

.profile-name{
    font-size:42px;
    font-weight:700;
    margin-bottom:10px;
}

.profile-email{
    color:#aaa;
    margin-bottom:20px;
}

.follow-btn{
    background:#6fa8dc;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    gap:24px;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
}

.cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    margin-bottom:15px;
    background:#111;
}

.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:8px;
}

.artist{
    color:#6fa8dc;
    margin-bottom:10px;
}

.description{
    color:#ddd;
    line-height:1.8;
}
</style>
</head>
<body>

<p><a href="index.html">← ホームへ戻る</a></p>

<div class="profile-header">
    <div class="profile-name" id="profileName">読み込み中...</div>
    <div class="profile-email" id="profileEmail"></div>
    <button class="follow-btn" id="followBtn">フォロー</button>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  orderBy,
  getDocs,
  addDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
// Firebase設定（editor.htmlやindex.htmlと同じものを貼る）
const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const uid = params.get("uid");

const profileName = document.getElementById("profileName");
const profileEmail = document.getElementById("profileEmail");
const albumGrid = document.getElementById("albumGrid");
const followBtn = document.getElementById("followBtn");

if (!uid) {
  profileName.textContent = "ユーザーが指定されていません";
  followBtn.style.display = "none";
  throw new Error("uid is missing");
}

// =========================
// ユーザー情報を取得
// =========================
const userDoc = await getDoc(doc(db, "users", uid));

if (userDoc.exists()) {
  const user = userDoc.data();

  profileName.textContent =
    user.displayName || user.userName || "名無しユーザー";

  profileEmail.textContent =
    user.email || "";
} else {
  profileName.textContent = "ユーザーが見つかりません";
  profileEmail.textContent = "";
}

// =========================
// 投稿一覧を取得
// =========================
const q = query(
  collection(db, "albums"),
  where("userId", "==", uid),
  where("isPublic", "==", true),
  orderBy("createdAt", "desc")
);

const snapshot = await getDocs(q);

if (snapshot.empty) {
  albumGrid.innerHTML = "<p>まだ投稿がありません。</p>";
} else {
  snapshot.forEach((docSnap) => {
    const album = docSnap.data();

    const card = document.createElement("div");
    card.className = "album-card";

    card.innerHTML = `
      <img class="cover" src="${album.cover || ""}" alt="">
      <div class="title">${album.title || ""}</div>
      <div class="artist">${album.artist || ""}</div>
      <div class="description">${album.desc || ""}</div>
    `;

    albumGrid.appendChild(card);
  });
}

// =========================
// フォローボタン（仮実装）
// =========================
let currentUser = null;
let followDocId = null;
let isFollowing = false;

onAuthStateChanged(auth, async (user) => {
  currentUser = user;

  if (!currentUser) {
    followBtn.textContent = "ログインしてフォロー";
    followBtn.onclick = () => {
      location.href = "login.html";
    };
    return;
  }

  if (currentUser.uid === uid) {
    followBtn.style.display = "none";
    return;
  }

  await checkFollowStatus();

  followBtn.onclick = async () => {
    if (isFollowing) {
      await unfollowUser();
    } else {
      await followUser();
    }
  };
});

async function checkFollowStatus() {
  const q = query(
    collection(db, "follows"),
    where("followerId", "==", currentUser.uid),
    where("followingId", "==", uid)
  );

  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    followDocId = snapshot.docs[0].id;
    isFollowing = true;
    followBtn.textContent = "フォロー中";
  } else {
    followDocId = null;
    isFollowing = false;
    followBtn.textContent = "フォロー";
  }
}

async function followUser() {
  const docRef = await addDoc(collection(db, "follows"), {
    followerId: currentUser.uid,
    followingId: uid,
    createdAt: serverTimestamp()
  });

  followDocId = docRef.id;
  isFollowing = true;
  followBtn.textContent = "フォロー中";
}

async function unfollowUser() {
  if (!followDocId) return;

  await deleteDoc(doc(db, "follows", followDocId));

  followDocId = null;
  isFollowing = false;
  followBtn.textContent = "フォロー";
}
</script>

</body>
</html>
