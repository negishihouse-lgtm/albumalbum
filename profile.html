<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
}

a{
    color:#6fa8dc;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.profile-header{
    margin-bottom:40px;
}

.profile-name{
    font-size:42px;
    font-weight:700;
    margin-bottom:10px;
}

.profile-email{
    color:#aaa;
    margin-bottom:14px;
}

.follow-stats{
    display:flex;
    gap:18px;
    color:#ddd;
    margin-bottom:20px;
    font-size:15px;
}

.follow-btn{
    background:#6fa8dc;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.follow-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    gap:24px;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
}

.cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    margin-bottom:15px;
    background:#111;
}

.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:8px;
}

.artist{
    color:#6fa8dc;
    margin-bottom:10px;
}

.description{
    color:#ddd;
    line-height:1.8;
}
</style>
</head>
<body>

<p><a href="index.html">← ホームへ戻る</a></p>

<div class="profile-header">
    <div class="profile-name" id="profileName">読み込み中...</div>
    <div class="profile-email" id="profileEmail"></div>

    <div class="follow-stats">
        <span id="followingCount">フォロー中 0</span>
        <span id="followerCount">フォロワー 0</span>
    </div>

    <button class="follow-btn" id="followBtn">フォロー</button>
</div>

<div class="album-grid" id="albumGrid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  initializeFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  orderBy,
  getDocs,
  addDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
  authDomain: "album-49b3e.firebaseapp.com",
  projectId: "album-49b3e",
  storageBucket: "album-49b3e.firebasestorage.app",
  messagingSenderId: "448724897117",
  appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
  measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
  experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const uid = params.get("uid");

const profileName = document.getElementById("profileName");
const profileEmail = document.getElementById("profileEmail");
const albumGrid = document.getElementById("albumGrid");
const followBtn = document.getElementById("followBtn");
const followingCount = document.getElementById("followingCount");
const followerCount = document.getElementById("followerCount");

let currentUser = null;
let followDocId = null;
let isFollowing = false;

if (!uid) {
  profileName.textContent = "ユーザーが指定されていません";
  followBtn.style.display = "none";
  throw new Error("uid is missing");
}

async function loadProfile() {
  try {
    const userDoc = await getDoc(doc(db, "users", uid));

    if (userDoc.exists()) {
      const user = userDoc.data();

      profileName.textContent =
        user.displayName || user.userName || "名無しユーザー";

      profileEmail.textContent =
        user.email || "";
    } else {
      profileName.textContent = "ユーザーが見つかりません";
      profileEmail.textContent = "";
      followBtn.style.display = "none";
    }
  } catch (error) {
    console.error("プロフィール取得失敗:", error);
    alert("プロフィール取得失敗: " + error.message);
  }
}

async function loadAlbums() {
  try {
    const albumsQuery = query(
      collection(db, "albums"),
      where("userId", "==", uid),
      where("isPublic", "==", true),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(albumsQuery);

    if (snapshot.empty) {
      albumGrid.innerHTML = "<p>まだ投稿がありません。</p>";
      return;
    }

    albumGrid.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const album = docSnap.data();

      const card = document.createElement("div");
      card.className = "album-card";

      card.innerHTML = `
        <img class="cover" src="${album.cover || ""}" alt="">
        <div class="title">${album.title || ""}</div>
        <div class="artist">${album.artist || ""}</div>
        <div class="description">${album.desc || ""}</div>
      `;

      albumGrid.appendChild(card);
    });
  } catch (error) {
    console.error("投稿取得失敗:", error);
    albumGrid.innerHTML = "<p>投稿の読み込みに失敗しました。</p>";
  }
}

async function loadFollowCounts() {
  try {
    const followingQuery = query(
      collection(db, "follows"),
      where("followerId", "==", uid)
    );

    const followerQuery = query(
      collection(db, "follows"),
      where("followingId", "==", uid)
    );

    const followingSnapshot = await getDocs(followingQuery);
    const followerSnapshot = await getDocs(followerQuery);

    followingCount.textContent = `フォロー中 ${followingSnapshot.size}`;
    followerCount.textContent = `フォロワー ${followerSnapshot.size}`;

  } catch (error) {
    console.error("フォロー数取得失敗:", error);
  }
}

onAuthStateChanged(auth, async (user) => {
  currentUser = user;

  if (!currentUser) {
    followBtn.style.display = "inline-block";
    followBtn.textContent = "ログインしてフォロー";
    followBtn.onclick = () => {
      location.href =
        `login.html?redirect=${encodeURIComponent(location.href)}`;
    };
    return;
  }

  if (currentUser.uid === uid) {
    followBtn.style.display = "none";
    return;
  }

  followBtn.style.display = "inline-block";
  followBtn.textContent = "フォロー";

  followBtn.onclick = async () => {
    console.log("follow button clicked");

    if (isFollowing) {
      await unfollowUser();
    } else {
      await followUser();
    }
  };

  await checkFollowStatus();
});

async function checkFollowStatus() {
  try {
    const followsQuery = query(
      collection(db, "follows"),
      where("followerId", "==", currentUser.uid),
      where("followingId", "==", uid)
    );

    const snapshot = await getDocs(followsQuery);

    if (!snapshot.empty) {
      followDocId = snapshot.docs[0].id;
      isFollowing = true;
      followBtn.textContent = "フォロー中";
    } else {
      followDocId = null;
      isFollowing = false;
      followBtn.textContent = "フォロー";
    }
  } catch (error) {
    console.error("フォロー状態確認失敗:", error);
    followDocId = null;
    isFollowing = false;
    followBtn.textContent = "フォロー";
  }
}

async function followUser() {
  console.log("followUser called");

  if (!currentUser) {
    alert("ログインが必要です");
    location.href =
      `login.html?redirect=${encodeURIComponent(location.href)}`;
    return;
  }

  if (currentUser.uid === uid) {
    alert("自分自身はフォローできません");
    return;
  }

  try {
    followBtn.disabled = true;
    followBtn.textContent = "処理中...";

    const docRef = await addDoc(collection(db, "follows"), {
      followerId: currentUser.uid,
      followingId: uid,
      createdAt: serverTimestamp()
    });

    followDocId = docRef.id;
    isFollowing = true;
    followBtn.textContent = "フォロー中";

    await loadFollowCounts();

    alert("フォローしました");

  } catch (error) {
    console.error("フォロー失敗:", error);
    alert("フォロー失敗: " + error.message);
    followBtn.textContent = "フォロー";
  } finally {
    followBtn.disabled = false;
  }
}

async function unfollowUser() {
  if (!followDocId) {
    alert("フォロー情報が見つかりません");
    return;
  }

  try {
    followBtn.disabled = true;
    followBtn.textContent = "処理中...";

    await deleteDoc(doc(db, "follows", followDocId));

    followDocId = null;
    isFollowing = false;
    followBtn.textContent = "フォロー";

    await loadFollowCounts();

    alert("フォローを解除しました");

  } catch (error) {
    console.error("解除失敗:", error);
    alert("解除失敗: " + error.message);
    followBtn.textContent = "フォロー中";
  } finally {
    followBtn.disabled = false;
  }
}

await loadProfile();
await loadAlbums();
await loadFollowCounts();
</script>

</body>
</html>
