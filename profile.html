<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding-bottom:120px;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* ===== PC用サイドバー ===== */
.sidebar{
    width:280px;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    z-index:100;
}

.sidebar-title{
    font-size:26px;
    font-weight:800;
    margin-bottom:28px;
}

.side-menu button{
    width:100%;
    padding:14px 16px;
    margin-bottom:8px;
    border:none;
    border-radius:10px;
    background:transparent;
    color:white;
    cursor:pointer;
    font-size:15px;
    text-align:left;
}

.side-menu button:hover{
    background:#1a1a1a;
}

.side-menu .active{
    background:#6fa8dc;
}

#sideProfileEditBtn{
    display:none;
}

/* ===== スマホ用下部タブバー ===== */
.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#999;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:#6fa8dc;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

/* ===== 右下投稿ボタン ===== */
.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:#84b7e4;
}

/* ===== メイン ===== */
.main{
    flex:1;
    margin-left:280px;
    padding:40px;
}

.profile-header{
    margin-bottom:34px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile-name{
    font-size:42px;
    font-weight:800;
    margin-bottom:10px;
}

.profile-email{
    display:none;
}

.follow-stats{
    display:flex;
    gap:18px;
    color:#ddd;
    margin-bottom:20px;
    font-size:15px;
}

.follow-stat-link{
    background:none;
    border:none;
    color:#ddd;
    padding:0;
    font:inherit;
    cursor:pointer;
}

.follow-stat-link:hover{
    color:white;
    text-decoration:underline;
}

.profile-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

.follow-btn{
    background:#6fa8dc;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.follow-btn:hover{
    background:#84b7e4;
}

.follow-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.profile-edit-btn{
    display:none;
    background:#333;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.profile-edit-btn:hover{
    background:#444;
}

.mobile-logout-btn{
    display:none;
    background:#522;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.mobile-logout-btn:hover{
    background:#733;
}

.owner-notice{
    display:none;
    color:#aaa;
    font-size:14px;
    line-height:1.7;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    padding:14px;
    margin-bottom:22px;
}

/* ===== 投稿カード ===== */
.album-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:24px;
    max-width:1400px;
}

.album-card{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    overflow:hidden;
}

.album-card:hover{
    border-color:rgba(111,168,220,0.55);
}

.card-top{
    display:grid;
    grid-template-columns:120px 1fr 260px;
    gap:18px;
    align-items:start;
}

.cover-wrap{
    min-width:0;
}

.cover{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#111;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.18);
    display:block;
}

.album-info,
.album-analysis{
    min-width:0;
}

.title-row{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:6px;
}

.title{
    font-size:24px;
    font-weight:800;
    line-height:1.2;
    word-break:break-word;
}

.private-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:4px 8px;
    border-radius:999px;
    background:#333;
    color:#ddd;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
}

.artist{
    color:#6fa8dc;
    font-size:18px;
    margin-bottom:8px;
    word-break:break-word;
}

.creator{
    margin-bottom:10px;
    color:#ccc;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
}

.creator a{
    color:#6fa8dc;
    text-decoration:none;
}

.creator a:hover{
    text-decoration:underline;
}

.reaction-row{
    display:flex;
    align-items:center;
    gap:16px;
    color:#aaa;
    font-size:14px;
    flex-wrap:wrap;
}

.like-area{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#aaa;
    padding:0;
    font-size:20px;
    cursor:pointer;
}

.like-btn:hover{
    color:white;
}

.like-btn.liked{
    color:white;
}

.like-count,
.comment-count{
    font-size:14px;
    color:#aaa;
}

.owner-actions{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
}

.owner-actions button{
    border:none;
    border-radius:10px;
    padding:9px 12px;
    color:white;
    cursor:pointer;
    font-size:13px;
}

.edit-post-btn{
    background:#555;
}

.edit-post-btn:hover{
    background:#666;
}

.delete-post-btn{
    background:#733;
}

.delete-post-btn:hover{
    background:#944;
}

.meter-area{
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px;
    padding:12px;
    min-width:0;
}

.meter{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 46px;
    align-items:center;
    gap:6px;
    margin-bottom:10px;
    min-width:0;
}

.meter-label{
    font-size:11px;
    font-weight:700;
    color:#e8e8e8;
    white-space:nowrap;
}

.right-label{
    text-align:right;
}

.meter-graphic{
    display:flex;
    align-items:center;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    border:2px solid #555;
    background:#0b0b0b;
    flex-shrink:0;
}

.connector{
    height:2px;
    background:#4a5158;
    flex:1;
    min-width:0;
}

.dot.active.level-1,
.connector.active.level-1{
    background:#3f8ec7;
    border-color:#3f8ec7;
}

.dot.active.level-2,
.connector.active.level-2{
    background:#4d9bd0;
    border-color:#4d9bd0;
}

.dot.active.level-3,
.connector.active.level-3{
    background:#5fa7d8;
    border-color:#5fa7d8;
}

.dot.active.level-4,
.connector.active.level-4{
    background:#73b6e3;
    border-color:#73b6e3;
}

.dot.active.level-5{
    background:#8bc8ef;
    border-color:#8bc8ef;
}

.keyword-box{
    margin-top:10px;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:12px;
    padding:10px;
}

.keyword-title{
    color:#6fa8dc;
    font-size:12px;
    font-weight:700;
    margin-bottom:4px;
}

.keyword-text{
    color:#ddd;
    font-size:12px;
    line-height:1.5;
    word-break:break-word;
}

.description{
    color:#ddd;
    font-size:14px;
    line-height:1.7;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,0.1);
    word-break:break-word;
}

.empty{
    color:#777;
    font-size:24px;
}

/* ===== タブレット以下 ===== */
@media(max-width:1300px){
    .album-grid{
        grid-template-columns:1fr;
    }
}

/* ===== スマホUI ===== */
@media(min-width:901px){
    .mobile-logout-btn{
        display:none !important;
    }
}

@media(max-width:900px){
    body{
        padding-bottom:110px;
    }

    .wrapper{
        display:block;
    }

    .sidebar{
        display:none;
    }

    .mobile-tabbar{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:#0b0b0b;
        border-top:1px solid rgba(255,255,255,0.1);
        z-index:999;
        padding-bottom:env(safe-area-inset-bottom);
    }

    .main{
        margin-left:0;
        padding:16px;
    }

    .profile-header{
        margin-bottom:20px;
        padding-bottom:18px;
    }

    .profile-name{
        font-size:30px;
    }

    .profile-email{
        display:none;
    }

    .follow-stats{
        font-size:13px;
        gap:14px;
    }

    .profile-actions{
        gap:8px;
    }

    .follow-btn,
    .profile-edit-btn,
    .mobile-logout-btn{
        font-size:14px;
        padding:10px 16px;
    }

    .mobile-logout-btn{
        display:inline-block;
    }

    .owner-notice{
        font-size:12px;
        margin-bottom:16px;
    }

    .album-grid{
        grid-template-columns:1fr;
        gap:14px;
    }

    .album-card{
        padding:14px;
        border-radius:14px;
    }

    .card-top{
        grid-template-columns:72px minmax(0,1fr) 120px;
        gap:10px;
        align-items:start;
    }

    .title{
        font-size:16px;
        margin-bottom:0;
        line-height:1.3;
    }

    .private-badge{
        font-size:9px;
        padding:3px 6px;
    }

    .artist{
        font-size:13px;
        margin-bottom:4px;
    }

    .creator{
        font-size:11px;
        margin-bottom:6px;
        line-height:1.4;
    }

    .reaction-row{
        gap:8px;
        font-size:11px;
    }

    .like-btn{
        font-size:16px;
    }

    .like-count,
    .comment-count{
        font-size:11px;
    }

    .owner-actions{
        gap:6px;
        margin-top:10px;
    }

    .owner-actions button{
        padding:7px 9px;
        font-size:11px;
        border-radius:8px;
    }

    .meter-area{
        padding:8px;
    }

    .meter{
        grid-template-columns:26px minmax(0,1fr) 26px;
        gap:3px;
        margin-bottom:5px;
    }

    .meter-label{
        font-size:8px;
    }

    .dot{
        width:5px;
        height:5px;
        border-width:1px;
    }

    .connector{
        height:1px;
    }

    .keyword-box{
        margin-top:6px;
        padding:6px;
    }

    .keyword-title{
        font-size:9px;
        margin-bottom:2px;
    }

    .keyword-text{
        font-size:9px;
        line-height:1.3;
    }

    .description{
        font-size:12px;
        line-height:1.6;
        margin-top:10px;
        padding-top:10px;
    }

    .fab{
        right:16px;
        bottom:88px;
        width:58px;
        height:58px;
        font-size:32px;
    }
}

/* かなり狭いスマホ用 */
@media(max-width:390px){
    .card-top{
        grid-template-columns:64px minmax(0,1fr) 110px;
        gap:8px;
    }

    .title{
        font-size:15px;
    }

    .artist{
        font-size:12px;
    }

    .meter-area{
        padding:6px;
    }

    .meter{
        grid-template-columns:24px minmax(0,1fr) 24px;
    }

    .meter-label{
        font-size:7px;
    }

    .keyword-text{
        font-size:8px;
    }
}

/* ============================================================
   FINAL: index準拠 スマホ下部タブバー
   - 絵文字アイコンを廃止

.mobile-tabbar .label{
    line-height:1;

}

.mobile-tabbar .tab-avatar{

}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;

    height:24px;
    display:flex;

    justify-content:center;
}

        border-top:1px solid rgba(255,255,255,0.12) !important;

        z-index:9999 !important;

    }

    .post-fab{
        display:none !important;

    if(!data){
        return "";
    }

    return (
        data.displayName ||
        data.nickname ||
        data.nickName ||
        data.userName ||
        data.name ||
        ""
    );
}

function getAlbumDisplayName(album){
    return (
        album.displayName ||
        album.nickname ||
        album.nickName ||
        album.userName ||
        album.name ||
        profileDisplayName ||
        "匿名ユーザー"
    );
}

function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}

async function updateMobileMyPageTab(user){
    if(!mobileMyPageLink){
        return;
    }

    if(!user){
        mobileMyPageLink.href = "login.html";

        if(mobileMyPageAvatar){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageAvatar.src = "";
        }

        if(mobileMyPageFallback){
            mobileMyPageFallback.style.display = "flex";
        }

        return;
    }

    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    try{
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if(!userSnap.exists()){
            return;
        }

        const iconUrl = getUserIconUrl(userSnap.data());

        if(iconUrl && mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.src = iconUrl;
            mobileMyPageAvatar.style.display = "block";
            mobileMyPageFallback.style.display = "none";

            mobileMyPageAvatar.onerror = () => {
                mobileMyPageAvatar.style.display = "none";
                mobileMyPageFallback.style.display = "flex";
            };
        }else if(mobileMyPageAvatar && mobileMyPageFallback){
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageFallback.style.display = "flex";
        }
    }catch(error){
        console.warn("マイページアイコンの取得に失敗しました", error);
    }
}

    if(!currentUser){
        return "匿名ユーザー";

        if(meSnap.exists()){

        }
    }catch(error){
        console.warn("自分のユーザー名取得に失敗しました", error);

    return currentUser.displayName || "匿名ユーザー";
}

    toUserId,
    fromUserId,
    fromUserName,
    type,
    albumId = "",
    albumTitle = "",
    commentText = ""
}){
    if(!toUserId || !fromUserId || toUserId === fromUserId){
        return;
    }

    await addDoc(collection(db, "notifications"), {
        toUserId,
        fromUserId,
        fromUserName,
        type,
        albumId,
        albumTitle,
        commentText,
        read: false,
        createdAt: serverTimestamp()
    });
}

async function notifyFollow(db, currentUser, targetUserId){
    if(!currentUser || !targetUserId) return;
    const fromUserName = await getCurrentUserName(db, currentUser);
    await createNotification(db, {
        toUserId: targetUserId,
        fromUserId: currentUser.uid,
        fromUserName,
        type: "follow"
    });
}

function escapeHTML(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function isOwner(){
    return currentUser && uid && currentUser.uid === uid;
}

function meter(left, right, value){
    value = Number(value) || 0;
    value = Math.max(0, Math.min(5, value));

    let graphicHTML = "";

    for(let i = 1; i <= 5; i++){
        graphicHTML += `
            <div class="dot level-${i} ${i <= value ? "active" : ""} ${i === value ? "selected" : ""}"></div>
        `;

        if(i < 5){
            graphicHTML += `
                <div class="connector level-${i} ${i < value ? "active" : ""}"></div>
            `;
        }
    }

    return `
        <div class="meter">
            <div class="meter-label">${escapeHTML(left)}</div>
            <div class="meter-graphic">${graphicHTML}</div>
            <div class="meter-label right-label">${escapeHTML(right)}</div>
        </div>
    `;
}

function getLikeId(userId, albumId){
    return `${userId}_${albumId}`;
}

function getLikeCount(albumId){
    return allLikes.filter(like => like.albumId === albumId).length;
}

function getCommentCount(albumId){
    return allComments.filter(comment => comment.albumId === albumId).length;
}

function isLikedByMe(albumId){
    if(!currentUser) return false;

    return allLikes.some(like =>
        like.albumId === albumId &&
        like.userId === currentUser.uid
    );
}

async function toggleLike(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const likeId = getLikeId(currentUser.uid, albumId);
    const likeRef = doc(db, "likes", likeId);

    if(isLikedByMe(albumId)){
        await deleteDoc(likeRef);
    } else {
        await setDoc(likeRef, {
            userId: currentUser.uid,
            albumId: albumId,
            createdAt: serverTimestamp()
        });
    }
}

async function deleteAlbum(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const target = profileAlbums.find(album => album.id === albumId);

    if(!target){
        alert("削除対象の投稿が見つかりません");
        return;
    }

    if(target.userId !== currentUser.uid){
        alert("自分の投稿以外は削除できません");
        return;
    }

    const ok = confirm("この投稿を削除しますか？\n削除すると元に戻せません。");

    if(!ok){
        return;
    }

    try {
        await deleteDoc(doc(db, "albums", albumId));
        alert("削除しました");
    } catch (error) {
        console.error("削除失敗:", error);
        alert("削除に失敗しました: " + error.message);
    }
}

function editAlbum(albumId){
    if(!currentUser){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    const target = profileAlbums.find(album => album.id === albumId);

    if(!target){
        alert("編集対象の投稿が見つかりません");
        return;
    }

    if(target.userId !== currentUser.uid){
        alert("自分の投稿以外は編集できません");
        return;
    }

    location.href = `editor.html?id=${encodeURIComponent(albumId)}`;
}

window.toggleLike = toggleLike;
window.deleteAlbum = deleteAlbum;
window.editAlbum = editAlbum;

function updateLikeDisplays(){
    const likeAreas = document.querySelectorAll("[data-like-area]");

    likeAreas.forEach((area) => {
        const albumId = area.dataset.albumId;
        const countSpan = area.querySelector(".like-count");
        const button = area.querySelector(".like-btn");

        if(!countSpan || !button) return;

        const count = getLikeCount(albumId);
        const liked = isLikedByMe(albumId);

        countSpan.textContent = count;
        button.textContent = liked ? "♥" : "♡";

        if(liked){
            button.classList.add("liked");
        } else {
            button.classList.remove("liked");
        }
    });
}

function updateCommentDisplays(){
    const commentCounts = document.querySelectorAll("[data-comment-count]");

    commentCounts.forEach((countEl) => {
        const albumId = countEl.dataset.albumId;
        const count = getCommentCount(albumId);
        countEl.textContent = `コメント ${count}件`;
    });
}


function normalizeKeywords(value){
    if(Array.isArray(value)){
        return value
            .map(keyword => String(keyword ?? "").trim())
            .filter(Boolean);
    }

    if(typeof value === "string"){
        return value
            .split(/[\s,、#]+/)
            .map(keyword => keyword.trim())
            .filter(Boolean);
    }

    return [];
}

function renderKeywordTags(value){
    const keywords = normalizeKeywords(value);

    if(keywords.length === 0){
        return `<span class="keyword-empty">なし</span>`;
    }

    return keywords.map((keyword) => {
        const safeKeyword = escapeHTML(keyword);
        const encodedKeyword = encodeURIComponent(keyword);

        return `
            <a
                class="keyword-tag"
                href="search.html?q=${encodedKeyword}"
                onclick="event.stopPropagation();"
            >#${safeKeyword}</a>
        `;
    }).join("");
}

                    <button

                        onclick="event.stopPropagation(); editAlbum('${escapeHTML(albumId)}')">
                        編集
                    </button>

                    <button
                        class="delete-post-btn"
                        type="button"
                        onclick="event.stopPropagation(); deleteAlbum('${escapeHTML(albumId)}')">
                        削除
                    </button>
                </div>
            `
            : "";

        albumGrid.innerHTML += `
<div class="album-card"
     onclick="location.href='detail.html?id=${escapeHTML(albumId)}'">

    <div class="card-top">

        <div class="cover-wrap">
            <img class="cover"
                 src="${escapeHTML(album.cover || "")}"
                 alt="">
        </div>

        <div class="album-info">
            <div class="title-row">
                <div class="title">
                    ${escapeHTML(album.title || "")}
                </div>
                ${privateBadge}
            </div>

            <div class="artist">
                ${escapeHTML(album.artist || "")}
            </div>

            <div class="creator">
                投稿者：
                <a href="profile.html?uid=${escapeHTML(album.userId || "")}"
                   onclick="event.stopPropagation();">
                    ${escapeHTML(getAlbumDisplayName(album))}
                </a>
            </div>

            <div class="reaction-row">
                <div class="like-area"
                     data-like-area
                     data-album-id="${escapeHTML(albumId)}">
                    <button class="like-btn"
                            type="button"
                            onclick="event.stopPropagation(); toggleLike('${escapeHTML(albumId)}')">
                        ♡
                    </button>
                    <span class="like-count">0</span>
                </div>

                <div class="comment-count"
                     data-comment-count
                     data-album-id="${escapeHTML(albumId)}">
                    コメント 0件
                </div>
            </div>

            ${ownerActions}
        </div>

        <div class="album-analysis">
            <div class="meter-area">
                ${meter("暗い", "明るい", album.darkness)}
                ${meter("静か", "激しい", album.intense)}
                ${meter("シンプル", "複雑", album.complex)}
                ${meter("絶望", "希望", album.hope)}
                ${meter("個人", "世界", album.world)}

                <div class="keyword-box">

async function loadProfile() {
    try {
        const userDoc = await getDoc(doc(db, "users", uid));

        if (userDoc.exists()) {
            const user = userDoc.data();

            profileDisplayName =
                getUserDisplayNameFromData(user) || "匿名ユーザー";

            profileName.textContent = profileDisplayName;
            profileEmail.textContent = "";
        } else {
            profileDisplayName = "匿名ユーザー";
            profileName.textContent = "ユーザーが見つかりません";
            profileEmail.textContent = "";
            followBtn.style.display = "none";
            profileEditBtn.style.display = "none";
            if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";
        }
    } catch (error) {
        console.error("プロフィール取得失敗:", error);
        profileName.textContent = "プロフィール取得失敗";
    }
}

function listenAlbums(){
    if(unsubscribeAlbums){
        unsubscribeAlbums();
        unsubscribeAlbums = null;
    }

    let albumsQuery;

    if(isOwner()){
        albumsQuery = query(
            collection(db, "albums"),
            where("userId", "==", uid)
        );
    } else {
        albumsQuery = query(
            collection(db, "albums"),
            where("userId", "==", uid),
            where("isPublic", "==", true)
        );
    }

    unsubscribeAlbums = onSnapshot(albumsQuery, (snapshot) => {
        profileAlbums = [];

        snapshot.forEach((docSnap) => {
            profileAlbums.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        profileAlbums.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
        });

        renderAlbums();

    }, (error) => {
        console.error("投稿取得失敗:", error);
        albumGrid.innerHTML = `<div class="empty">投稿の読み込みに失敗しました。</div>`;
    });
}

function listenLikes(){
    if(unsubscribeLikes){
        unsubscribeLikes();
        unsubscribeLikes = null;
    }

    unsubscribeLikes = onSnapshot(collection(db, "likes"), (snapshot) => {
        allLikes = [];

        snapshot.forEach((docSnap) => {
            allLikes.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        updateLikeDisplays();

    }, (error) => {
        console.error("いいね取得失敗:", error);
    });
}

function listenComments(){
    if(unsubscribeComments){
        unsubscribeComments();
        unsubscribeComments = null;
    }

    unsubscribeComments = onSnapshot(collection(db, "comments"), (snapshot) => {
        allComments = [];

        snapshot.forEach((docSnap) => {
            allComments.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        updateCommentDisplays();

    }, (error) => {
        console.error("コメント取得失敗:", error);
    });
}

async function loadFollowCounts() {
    try {
        const followingQuery = query(
            collection(db, "follows"),
            where("followerId", "==", uid)
        );

        const followerQuery = query(
            collection(db, "follows"),
            where("followingId", "==", uid)
        );

        const followingSnapshot = await getDocs(followingQuery);
        const followerSnapshot = await getDocs(followerQuery);

        followingCount.textContent = `フォロー中 ${followingSnapshot.size}`;
        followerCount.textContent = `フォロワー ${followerSnapshot.size}`;

    } catch (error) {
        console.error("フォロー数取得失敗:", error);
    }
}

async function checkFollowStatus() {
    try {
        const followsQuery = query(
            collection(db, "follows"),
            where("followerId", "==", currentUser.uid),
            where("followingId", "==", uid)
        );

        const snapshot = await getDocs(followsQuery);

        if (!snapshot.empty) {
            followDocId = snapshot.docs[0].id;
            isFollowing = true;
            followBtn.textContent = "フォロー中";
        } else {
            followDocId = null;
            isFollowing = false;
            followBtn.textContent = "フォロー";
        }
    } catch (error) {
        console.error("フォロー状態確認失敗:", error);
        followDocId = null;
        isFollowing = false;
        followBtn.textContent = "フォロー";
    }
}

async function followUser() {
    if (!currentUser) {
        location.href =
            `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    if (currentUser.uid === uid) {
        alert("自分自身はフォローできません");
        return;
    }

    try {
        followBtn.disabled = true;
        followBtn.textContent = "処理中...";

        const docRef = await addDoc(collection(db, "follows"), {
            followerId: currentUser.uid,
            followingId: uid,
            createdAt: serverTimestamp()
        });

        await notifyFollow(db, currentUser, uid);

        followDocId = docRef.id;
        isFollowing = true;
        followBtn.textContent = "フォロー中";

        await loadFollowCounts();

    } catch (error) {
        console.error("フォロー失敗:", error);
        alert("フォロー失敗: " + error.message);
        followBtn.textContent = "フォロー";
    } finally {
        followBtn.disabled = false;
    }
}

async function unfollowUser() {
    if (!followDocId) {
        return;
    }

    try {
        followBtn.disabled = true;
        followBtn.textContent = "処理中...";

        await deleteDoc(doc(db, "follows", followDocId));

        followDocId = null;
        isFollowing = false;
        followBtn.textContent = "フォロー";

        await loadFollowCounts();

    } catch (error) {
        console.error("解除失敗:", error);
        alert("解除失敗: " + error.message);
        followBtn.textContent = "フォロー中";
    } finally {
        followBtn.disabled = false;
    }
}

function updateOwnerUI(){
    if(isOwner()){
        ownerNotice.style.display = "block";
        profileEditBtn.style.display = "inline-block";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "inline-block";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "block";
    } else {
        ownerNotice.style.display = "none";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";
    }
}

profileEditBtn.addEventListener("click", () => {
    if(!currentUser){
        location.href = "login.html";
        return;
    }

    location.href = "profile-edit.html";
});

mobileLogoutBtn.addEventListener("click", async () => {
    try{
        await signOut(auth);
        location.href = "login.html";
    }catch(error){
        console.error("ログアウト失敗:", error);
        alert("ログアウトに失敗しました: " + error.message);
    }
});

if(followingLink){
    followingLink.addEventListener("click", () => {
        if(!uid) return;
        location.href = `follows.html?uid=${encodeURIComponent(uid)}&type=following`;
    });
}

if(followerLink){
    followerLink.addEventListener("click", () => {
        if(!uid) return;
        location.href = `follows.html?uid=${encodeURIComponent(uid)}&type=followers`;
    });
}

onAuthStateChanged(auth, async (user) => {
    updateMobileMyPageTab(user);
    currentUser = user;

    if (!uid && currentUser) {
        uid = currentUser.uid;
    }

    if (myPageLink) {
        if (currentUser) {
            myPageLink.href = `profile.html?uid=${currentUser.uid}`;
        } else {
            myPageLink.href = "login.html";
        }
    }

    if (mobileMyPageLink) {
        if (currentUser) {
            mobileMyPageLink.href = `profile.html?uid=${currentUser.uid}`;
        } else {
            mobileMyPageLink.href = "login.html";
        }
    }

    if (!uid) {
        profileName.textContent = "ユーザーが指定されていません";
        albumGrid.innerHTML =
            `<div class="empty">ログインしていないため、マイページを表示できません。</div>`;
        followBtn.style.display = "none";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";
        ownerNotice.style.display = "none";
        return;
    }

    updateOwnerUI();

    await loadProfile();
    await loadFollowCounts();

    listenAlbums();
    listenLikes();
    listenComments();

    if (!currentUser) {
        followBtn.style.display = "inline-block";
        profileEditBtn.style.display = "none";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";

        followBtn.textContent = "ログインしてフォロー";
        followBtn.onclick = () => {
            location.href =
                `login.html?redirect=${encodeURIComponent(location.href)}`;
        };
        return;
    }

    if (currentUser.uid === uid) {
        followBtn.style.display = "none";
        profileEditBtn.style.display = "inline-block";
        if(mobileLogoutBtn) mobileLogoutBtn.style.display = "inline-block";
        if(sideProfileEditBtn) sideProfileEditBtn.style.display = "block";
        return;
    }

    followBtn.style.display = "inline-block";
    profileEditBtn.style.display = "none";
    if(mobileLogoutBtn) mobileLogoutBtn.style.display = "none";
    if(sideProfileEditBtn) sideProfileEditBtn.style.display = "none";

    followBtn.textContent = "フォロー";

    followBtn.onclick = async () => {
        if (isFollowing) {
            await unfollowUser();
        } else {
            await followUser();
        }
    };

    await checkFollowStatus();
});

</script>
