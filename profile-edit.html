<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフィール編集 - Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
    padding-left:280px;
    padding-bottom:120px;
}

/* =====================
   PC Sidebar
===================== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
    font-size:15px;
}

.sidebar a:hover{
    background:#1a1a1a;
}

.sidebar a.active{
    background:#6fa8dc;
}

/* =====================
   Main
===================== */

.page-title{
    font-size:46px;
    margin-bottom:30px;
}

.edit-box{
    max-width:620px;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:28px;
}

.avatar-preview{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.18);
    margin-bottom:20px;
}

label{
    display:block;
    color:#aaa;
    font-size:14px;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    background:#111;
    color:white;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#6fa8dc;
}

.button-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:14px 22px;
    background:#6fa8dc;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.sub-btn{
    background:#1e1e1e;
    border:1px solid rgba(255,255,255,0.15);
}

.message{
    margin-top:18px;
    color:#aaa;
    font-size:15px;
    line-height:1.7;
}

/* =====================
   Floating Post Button
===================== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:#84b7e4;
}

/* =====================
   Mobile Tab Bar
===================== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#999;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:#6fa8dc;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

/* =====================
   Mobile
===================== */

@media(max-width:900px){
    body{
        padding:18px;
        padding-bottom:110px;
    }

    .sidebar{
        display:none;
    }

    .page-title{
        font-size:32px;
        margin-bottom:20px;
    }

    .edit-box{
        max-width:100%;
        border-radius:16px;
        padding:22px;
    }

    .avatar-preview{
        width:104px;
        height:104px;
    }

    input{
        font-size:15px;
        padding:13px;
    }

    .button-row{
        display:block;
    }

    button{
        width:100%;
        margin-bottom:10px;
        font-size:15px;
    }

    .message{
        font-size:14px;
    }

    .mobile-tabbar{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:#0b0b0b;
        border-top:1px solid rgba(255,255,255,0.1);
        z-index:999;
        padding-bottom:env(safe-area-inset-bottom);
    }

    .fab{
        right:16px;
        bottom:88px;
        width:58px;
        height:58px;
        font-size:32px;
    }
}
</style>
</head>

<body>

<!-- PC用サイドバー -->
<nav class="sidebar">
    <div class="logo">Album Collection</div>

    <a href="index.html">🏠 ホーム</a>
    <a href="search.html">🔍 さがす</a>
    <a href="editor.html">✍️ 投稿する</a>
    <a href="notifications.html">🔔 通知</a>
    <a id="myPageLink" href="login.html">👤 マイページ</a>

    <a href="login.html">🔐 ログイン</a>
</nav>

<!-- スマホ用下部タブバー -->
<nav class="mobile-tabbar">
    <a href="index.html">
        <div class="icon">🏠</div>
        <div>ホーム</div>
    </a>

    <a href="search.html">
        <div class="icon">🔍</div>
        <div>さがす</div>
    </a>

    <a href="editor.html">
        <div class="icon">➕</div>
        <div>投稿</div>
    </a>

    <a href="notifications.html">

<a href="editor.html" class="fab">＋</a>

<h1 class="page-title">プロフィール編集</h1>

<div class="edit-box">

    <img id="avatarPreview" class="avatar-preview" src="" alt="アイコン">

    <label>アイコン画像URL</label>
    <input id="photoURL" type="url" placeholder="https://example.com/icon.jpg">

    <label>ニックネーム</label>
    <input id="nickname" type="text" placeholder="例：岡">

    <label>生年月日</label>
    <input id="birthdate" type="date">

    <div class="button-row">
        <button id="saveBtn">保存する</button>
        <button class="sub-btn" id="backBtn">マイページへ戻る</button>
    </div>

    <div id="message" class="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp,
    collection,
    query,
    where,
    getDocs,
    writeBatch
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

const photoURLInput = document.getElementById("photoURL");
const nicknameInput = document.getElementById("nickname");
const birthdateInput = document.getElementById("birthdate");
const avatarPreview = document.getElementById("avatarPreview");
const saveBtn = document.getElementById("saveBtn");
const backBtn = document.getElementById("backBtn");
const message = document.getElementById("message");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");

let currentUser = null;

function setDefaultAvatar(){
    avatarPreview.src =
        "https://placehold.co/300x300/111111/ffffff?text=User";
}

function goMyPage(){
    if(!currentUser){
        location.href = "login.html";
        return;
    }

    location.href = `profile.html?uid=${encodeURIComponent(currentUser.uid)}`;
}

photoURLInput.addEventListener("input", () => {
    const url = photoURLInput.value.trim();

    if(url){
        avatarPreview.src = url;
    } else {
        setDefaultAvatar();
    }
});

avatarPreview.addEventListener("error", () => {
    setDefaultAvatar();
});

onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    currentUser = user;

    myPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;
    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    backBtn.onclick = goMyPage;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if(userSnap.exists()){
        const data = userSnap.data();

        photoURLInput.value = data.photoURL || data.iconURL || "";
        nicknameInput.value = data.nickname || data.userName || data.displayName || "";
        birthdateInput.value = data.birthdate || "";

        if(photoURLInput.value){
            avatarPreview.src = photoURLInput.value;
        } else {
            setDefaultAvatar();
        }
    } else {
        setDefaultAvatar();

        await setDoc(userRef, {
            uid: user.uid,
            email: user.email || "",
            nickname: "",
            userName: "",
            displayName: "",
            photoURL: "",
            iconURL: "",
            birthdate: "",
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        }, { merge:true });
    }
});

saveBtn.addEventListener("click", async () => {
    if(!currentUser) return;

    const photoURL = photoURLInput.value.trim();
    const nickname = nicknameInput.value.trim();
    const birthdate = birthdateInput.value;

    if(!nickname){
        message.textContent = "ニックネームを入力してください。";
        return;
    }

    try {
        saveBtn.disabled = true;
        message.textContent = "保存中...";

        const userRef = doc(db, "users", currentUser.uid);

        await setDoc(userRef, {
            uid: currentUser.uid,
            email: currentUser.email || "",
            nickname: nickname,
            userName: nickname,
            displayName: nickname,
            photoURL: photoURL,
            iconURL: photoURL,
            birthdate: birthdate,
            updatedAt: serverTimestamp()
        }, { merge:true });

        const albumQuery = query(
            collection(db, "albums"),
            where("userId", "==", currentUser.uid)
        );

        const albumSnap = await getDocs(albumQuery);
        const batch = writeBatch(db);

        albumSnap.forEach((docSnap) => {
            batch.update(docSnap.ref, {
                userName: nickname,
                userPhotoURL: photoURL
            });
        });

        await batch.commit();

        message.textContent = "保存しました。";

    } catch (error) {
        console.error("保存失敗:", error);
        message.textContent = "保存に失敗しました：" + error.message;
    } finally {
        saveBtn.disabled = false;
    }
});

</script>

</body>
</html>
