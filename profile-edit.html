<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフィール編集 - Album Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:40px;
    padding-left:280px;
    padding-bottom:120px;
}

/* =====================
   PC Sidebar
===================== */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#0b0b0b;
    border-right:1px solid rgba(255,255,255,0.1);
    padding:30px 20px;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    margin-bottom:8px;
    border-radius:10px;
    font-size:15px;
}

.sidebar a:hover{
    background:#1a1a1a;
}

.sidebar a.active{
    background:#6fa8dc;
}

/* =====================
   Main
===================== */

.page-title{
    font-size:46px;
    margin-bottom:30px;
}

.edit-box{
    max-width:620px;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:28px;
}

.avatar-section{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:22px;
}

.avatar-preview{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.18);
    flex-shrink:0;
}

.avatar-actions{
    flex:1;
    min-width:0;
}

.file-label{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:12px 18px;
    background:#1e1e1e;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    margin-bottom:10px;
}

.file-label:hover{
    background:#2a2a2a;
}

.file-input{
    display:none;
}

.file-help{
    color:#888;
    font-size:13px;
    line-height:1.6;
}

.selected-file-name{
    color:#aaa;
    font-size:13px;
    line-height:1.6;
    margin-top:6px;
    word-break:break-all;
}

label{
    display:block;
    color:#aaa;
    font-size:14px;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    background:#111;
    color:white;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#6fa8dc;
}

.button-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:14px 22px;
    background:#6fa8dc;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

button:disabled{
    opacity:0.55;
    cursor:not-allowed;
}

.sub-btn{
    background:#1e1e1e;
    border:1px solid rgba(255,255,255,0.15);
}

.message{
    margin-top:18px;
    color:#aaa;
    font-size:15px;
    line-height:1.7;
}

/* =====================
   Floating Post Button
===================== */

.fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#6fa8dc;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    z-index:1000;
}

.fab:hover{
    background:#84b7e4;
}

/* =====================
   Mobile Tab Bar
   index.html準拠
===================== */

.mobile-tabbar{
    display:none;
}

.mobile-tabbar a{
    color:#9ca6ac;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:11px;
    flex:1;
}

.mobile-tabbar a.active{
    color:white;
    font-weight:700;
}

.mobile-tabbar .icon{
    font-size:22px;
    line-height:1;
}

.mobile-tabbar .label{
    line-height:1;
    white-space:nowrap;
}

.mobile-tabbar .tab-avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
    background:#111;
    border:1px solid rgba(255,255,255,0.35);
    display:none;
}

.mobile-tabbar .mypage-icon-text{
    font-size:22px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* =====================
   Mobile
===================== */

@media(max-width:900px){
    body{
        padding:18px;
        padding-bottom:110px;
    }

    .sidebar{
        display:none;
    }

    .page-title{
        font-size:32px;
        margin-bottom:20px;
    }

    .edit-box{
        max-width:100%;
        border-radius:16px;
        padding:22px;
    }

    .avatar-section{
        align-items:flex-start;
        gap:16px;
    }

    .avatar-preview{
        width:104px;
        height:104px;
    }

    .file-label{
        width:100%;
        font-size:14px;
        padding:12px 14px;
    }

    input{
        font-size:15px;
        padding:13px;
    }

    .button-row{
        display:block;
    }

    button{
        width:100%;
        margin-bottom:10px;
        font-size:15px;
    }

    .message{
        font-size:14px;
    }

    .mobile-tabbar{
        display:grid;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:72px;
        background:rgba(8,8,8,0.96);
        border-top:1px solid rgba(255,255,255,0.12);
        grid-template-columns:repeat(5,1fr);
        z-index:9999;
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
        padding-bottom:env(safe-area-inset-bottom);
    }

    .mobile-tabbar a{
        height:72px;
    }

    .fab,
    .floating-post-btn,
    .post-fab{
        display:none !important;
    }
}
</style>
</head>

<body>


<!-- PC用サイドバー -->
<nav class="sidebar">
    <div class="logo">Album Collection</div>

    <a href="index.html">ホーム</a>
    <a href="search.html">検索</a>
    <a href="editor.html">投稿する</a>
    <a href="notifications.html">通知</a>
    <a id="myPageLink" href="login.html">マイページ</a>
    <a href="profile-edit.html" class="active">プロフィール編集</a>
    <a href="login.html">ログイン</a>
</nav>

<!-- スマホ用下部タブバー -->
<nav class="mobile-tabbar">
    <a href="index.html">
        <span class="icon">⌂</span>
        <span class="label">ホーム</span>
    </a>

    <a href="search.html">
        <span class="icon">⌕</span>
        <span class="label">検索</span>
    </a>

    <a href="editor.html">
        <span class="icon">＋</span>
        <span class="label">投稿</span>
    </a>

    <a href="notifications.html">
        <span class="icon">♡</span>
        <span class="label">通知</span>
    </a>

    <a id="mobileMyPageLink" href="login.html" class="active">
        <img id="mobileMyPageAvatar" class="tab-avatar" src="" alt="">
        <span id="mobileMyPageFallback" class="mypage-icon-text">◯</span>
        <span class="label">マイページ</span>
    </a>
</nav>

<!-- PC用右下投稿ボタン。スマホでは非表示 -->
<a href="editor.html" class="fab">＋</a>

<h1 class="page-title">プロフィール編集</h1>

<div class="edit-box">

    <div class="avatar-section">
        <img id="avatarPreview" class="avatar-preview" src="" alt="アイコン">

        <div class="avatar-actions">
            <label class="file-label" for="avatarFile">画像を選択</label>
            <input id="avatarFile" class="file-input" type="file" accept="image/jpeg,image/png,image/webp,image/jpg">
            <div class="file-help">
                JPG / PNG / WebP対応。5MB以下推奨。<br>
                選択した画像は保存時にCloudinaryへアップロードされます。
            </div>
            <div id="selectedFileName" class="selected-file-name"></div>
        </div>
    </div>

    <label>ニックネーム</label>
    <input id="nickname" type="text" placeholder="例：岡">

    <label>生年月日</label>
    <input id="birthdate" type="date">

    <div class="button-row">
        <button id="saveBtn">保存する</button>
        <button class="sub-btn" id="backBtn">マイページへ戻る</button>
    </div>

    <div id="message" class="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    initializeFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp,
    collection,
    query,
    where,
    getDocs,
    writeBatch
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

/* =====================
   Cloudinary
   API Secretは絶対にここへ書かない
===================== */

const CLOUDINARY_CLOUD_NAME = "dpsgfp4rn";
const CLOUDINARY_UPLOAD_PRESET = "album_profile_unsigned";
const CLOUDINARY_FOLDER = "album-collection/profile-icons";

/* =====================
   Firebase
===================== */

const firebaseConfig = {
    apiKey: "AIzaSyBfXg4W8MLV6sL1I-g1OOv-6znxJztL1Yc",
    authDomain: "album-49b3e.firebaseapp.com",
    projectId: "album-49b3e",
    storageBucket: "album-49b3e.firebasestorage.app",
    messagingSenderId: "448724897117",
    appId: "1:448724897117:web:e124ab546bc69aeea7ecb4",
    measurementId: "G-3QFX3GDEXN"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true
});

const auth = getAuth(app);

/* =====================
   DOM
===================== */

const avatarFileInput = document.getElementById("avatarFile");
const selectedFileName = document.getElementById("selectedFileName");
const nicknameInput = document.getElementById("nickname");
const birthdateInput = document.getElementById("birthdate");
const avatarPreview = document.getElementById("avatarPreview");
const saveBtn = document.getElementById("saveBtn");
const backBtn = document.getElementById("backBtn");
const message = document.getElementById("message");
const myPageLink = document.getElementById("myPageLink");
const mobileMyPageLink = document.getElementById("mobileMyPageLink");
const mobileMyPageAvatar = document.getElementById("mobileMyPageAvatar");
const mobileMyPageFallback = document.getElementById("mobileMyPageFallback");

let currentUser = null;
let currentIconUrl = "";
let selectedIconFile = null;
let selectedPreviewObjectUrl = "";

/* =====================
   Utility
===================== */

function setDefaultAvatar(){
    avatarPreview.src =
        "https://placehold.co/300x300/111111/ffffff?text=User";
}

function getUserIconUrl(data){
    return (
        data?.photoURL ||
        data?.iconURL ||
        data?.iconUrl ||
        data?.avatar ||
        data?.avatarUrl ||
        data?.profileImage ||
        data?.profileImageUrl ||
        data?.imageUrl ||
        data?.icon ||
        ""
    );
}

function updateMobileMyPageIcon(iconUrl){
    if(!mobileMyPageAvatar || !mobileMyPageFallback){
        return;
    }

    if(iconUrl){
        mobileMyPageAvatar.src = iconUrl;
        mobileMyPageAvatar.style.display = "block";
        mobileMyPageFallback.style.display = "none";

        mobileMyPageAvatar.onerror = () => {
            mobileMyPageAvatar.style.display = "none";
            mobileMyPageFallback.style.display = "flex";
        };
    } else {
        mobileMyPageAvatar.style.display = "none";
        mobileMyPageAvatar.src = "";
        mobileMyPageFallback.style.display = "flex";
    }
}

function goMyPage(){
    if(!currentUser){
        location.href = "login.html";
        return;
    }

    location.href = `profile.html?uid=${encodeURIComponent(currentUser.uid)}`;
}

function isAllowedImageFile(file){
    const allowedTypes = [
        "image/jpeg",
        "image/jpg",
        "image/png",
        "image/webp"
    ];

    return allowedTypes.includes(file.type);
}

function resetSelectedFile(){
    selectedIconFile = null;
    selectedFileName.textContent = "";
    avatarFileInput.value = "";

    if(selectedPreviewObjectUrl){
        URL.revokeObjectURL(selectedPreviewObjectUrl);
        selectedPreviewObjectUrl = "";
    }
}

/* =====================
   Cloudinary Upload
===================== */

async function uploadIconToCloudinary(file){
    const formData = new FormData();

    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    formData.append("folder", CLOUDINARY_FOLDER);

    const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
        {
            method: "POST",
            body: formData
        }
    );

    const data = await res.json().catch(() => null);

    if(!res.ok){
        console.error("Cloudinary upload error:", data);
        throw new Error(
            data?.error?.message ||
            "Cloudinaryへの画像アップロードに失敗しました。"
        );
    }

    if(!data?.secure_url){
        console.error("Cloudinary response:", data);
        throw new Error("Cloudinaryから画像URLを取得できませんでした。");
    }

    return data.secure_url;
}

/* =====================
   Image Select
===================== */

avatarFileInput.addEventListener("change", () => {
    const file = avatarFileInput.files?.[0];

    if(!file){
        resetSelectedFile();

        if(currentIconUrl){
            avatarPreview.src = currentIconUrl;
            updateMobileMyPageIcon(currentIconUrl);
        } else {
            setDefaultAvatar();
            updateMobileMyPageIcon("");
        }

        return;
    }

    if(!isAllowedImageFile(file)){
        message.textContent = "JPG / PNG / WebP の画像を選択してください。";
        resetSelectedFile();
        return;
    }

    if(file.size > 5 * 1024 * 1024){
        message.textContent = "画像サイズが大きすぎます。5MB以下の画像を選択してください。";
        resetSelectedFile();
        return;
    }

    selectedIconFile = file;
    selectedFileName.textContent = `選択中：${file.name}`;
    message.textContent = "";

    if(selectedPreviewObjectUrl){
        URL.revokeObjectURL(selectedPreviewObjectUrl);
    }

    selectedPreviewObjectUrl = URL.createObjectURL(file);
    avatarPreview.src = selectedPreviewObjectUrl;
    updateMobileMyPageIcon(selectedPreviewObjectUrl);
});

avatarPreview.addEventListener("error", () => {
    if(currentIconUrl && avatarPreview.src !== currentIconUrl){
        avatarPreview.src = currentIconUrl;
        return;
    }

    setDefaultAvatar();
});

/* =====================
   Auth / Load
===================== */

onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
        return;
    }

    currentUser = user;

    myPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;
    mobileMyPageLink.href = `profile.html?uid=${encodeURIComponent(user.uid)}`;

    backBtn.onclick = goMyPage;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if(userSnap.exists()){
        const data = userSnap.data();
        const iconUrl = getUserIconUrl(data);

        currentIconUrl = iconUrl;
        nicknameInput.value = data.nickname || data.userName || data.displayName || "";
        birthdateInput.value = data.birthdate || "";

        if(iconUrl){
            avatarPreview.src = iconUrl;
        } else {
            setDefaultAvatar();
        }

        updateMobileMyPageIcon(iconUrl);
    } else {
        currentIconUrl = "";
        setDefaultAvatar();
        updateMobileMyPageIcon("");

        await setDoc(userRef, {
            uid: user.uid,
            email: user.email || "",
            nickname: "",
            userName: "",
            displayName: "",
            photoURL: "",
            iconURL: "",
            birthdate: "",
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        }, { merge:true });
    }
});

/* =====================
   Save
===================== */

saveBtn.addEventListener("click", async () => {
    if(!currentUser) return;

    const nickname = nicknameInput.value.trim();
    const birthdate = birthdateInput.value;

    if(!nickname){
        message.textContent = "ニックネームを入力してください。";
        return;
    }

    try {
        saveBtn.disabled = true;

        let iconUrl = currentIconUrl;

        if(selectedIconFile){
            message.textContent = "画像をアップロード中...";
            iconUrl = await uploadIconToCloudinary(selectedIconFile);
        }

        message.textContent = "プロフィールを保存中...";

        const userRef = doc(db, "users", currentUser.uid);

        await setDoc(userRef, {
            uid: currentUser.uid,
            email: currentUser.email || "",
            nickname: nickname,
            userName: nickname,
            displayName: nickname,
            photoURL: iconUrl,
            iconURL: iconUrl,
            avatarUrl: iconUrl,
            profileImageUrl: iconUrl,
            birthdate: birthdate,
            updatedAt: serverTimestamp()
        }, { merge:true });

        const albumQuery = query(
            collection(db, "albums"),
            where("userId", "==", currentUser.uid)
        );

        const albumSnap = await getDocs(albumQuery);
        const batch = writeBatch(db);

        albumSnap.forEach((docSnap) => {
            batch.update(docSnap.ref, {
                userName: nickname,
                userPhotoURL: iconUrl
            });
        });

        await batch.commit();

        currentIconUrl = iconUrl;
        updateMobileMyPageIcon(iconUrl);
        resetSelectedFile();

        if(iconUrl){
            avatarPreview.src = iconUrl;
        } else {
            setDefaultAvatar();
        }

        message.textContent = "保存しました。";

    } catch (error) {
        console.error("保存失敗:", error);
        message.textContent = "保存に失敗しました：" + error.message;
    } finally {
        saveBtn.disabled = false;
    }
});

</script>

</body>
</html>
